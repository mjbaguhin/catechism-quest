<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fce7f3"/>
      <stop offset="50%" style="stop-color:#fef3c7"/>
      <stop offset="100%" style="stop-color:#ede9fe"/>
    </linearGradient>
    <linearGradient id="cross" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#b45309"/>
    </linearGradient>
  </defs>
  <!-- Rounded background -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <!-- Decorative circle (chalice/host suggestion) -->
  <circle cx="50" cy="50" r="38" fill="none" stroke="#be185d" stroke-width="2" opacity="0.3"/>
  <!-- Cross -->
  <rect x="44" y="20" width="12" height="55" rx="2" fill="url(#cross)" stroke="#92400e" stroke-width="1.5"/>
  <rect x="28" y="36" width="44" height="12" rx="2" fill="url(#cross)" stroke="#92400e" stroke-width="1.5"/>
  <!-- Heart at bottom (Mary) -->
  <path d="M 50 78 Q 42 72, 42 66 Q 42 60, 47 60 Q 50 60, 50 64 Q 50 60, 53 60 Q 58 60, 58 66 Q 58 72, 50 78 Z" fill="#ec4899" stroke="#be185d" stroke-width="1"/>
  <!-- Sparkles -->
  <text x="22" y="28" font-size="10" fill="#fbbf24">✨</text>
  <text x="72" y="84" font-size="10" fill="#fbbf24">✨</text>
</svg>
