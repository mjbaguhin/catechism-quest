// Start ambient pad on first user interaction (browser autoplay policy)
let firstInteractionDone = false;
function setupFirstInteractionListener() {
  function handler(e) {
    if (firstInteractionDone) return;
    firstInteractionDone = true;

    // Initialize Web Audio (for sound effects)
    if (soundsEnabled) {
      initAudio();
    }

    // Try to start the MP3 music DIRECTLY from this user gesture
    // This is critical for mobile browsers (Android Chrome, iOS Safari)
    if (ambientEnabled && soundsEnabled) {
      const audio = getMp3Audio();
      const p = audio.play();
      if (p && p.then) {
        p.then(() => {
          // Music started successfully — remove banner if any
          const banner = document.getElementById('music-prompt-banner');
          if (banner) banner.remove();
        }).catch(err => {
          // Mobile browser blocked it — show prompt banner
          console.log('First interaction music blocked:', err);
          showMusicPromptBanner();
        });
      }
    }

    document.removeEventListener('click', handler);
    document.removeEventListener('touchstart', handler);
    document.removeEventListener('keydown', handler);
  }
  document.addEventListener('click', handler);
  document.addEventListener('touchstart', handler);
  document.addEventListener('keydown', handler);
}

function saveAmbientPref() {
  try {
    localStorage.setItem('catechism_ambient_volume', String(ambientVolume));
    localStorage.setItem('catechism_ambient_enabled', ambientEnabled ? 'on' : 'off');
    localStorage.setItem('catechism_ambient_style', ambientStyle);
  } catch (e) {}
}

function setAmbientStyle(styleId) {
  if (!AMBIENT_STYLES.some(s => s.id === styleId)) return;
  ambientStyle = styleId;
  saveAmbientPref();
  // Restart with new style
  if (ambientEnabled && soundsEnabled) {
    stopAmbientPad();
    setTimeout(() => {
      const ctx = initAudio();
      if (!ctx) return;
      if (ctx.state === 'suspended') {
        ctx.resume().then(() => _buildAmbientNodes(ctx)).catch(() => {});
      } else {
        _buildAmbientNodes(ctx);
      }
    }, 1700); // wait for fade-out to complete
  }
}

function toggleAmbient() {
  ambientEnabled = !ambientEnabled;
  saveAmbientPref();
  if (ambientEnabled && soundsEnabled) {
    startAmbientPad();
  } else {
    stopAmbientPad();
  }
}

function spawnConfetti(count = 30) {
  const colors = ['#fbb6ce', '#c4b5fd', '#bae6fd', '#a7f3d0', '#fde68a', '#fdba74'];
  const container = document.createElement('div');
  container.className = 'confetti-container';
  document.body.appendChild(container);

  for (let i = 0; i < count; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + '%';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.animationDelay = (Math.random() * 0.4) + 's';
    piece.style.animationDuration = (1.6 + Math.random() * 1.2) + 's';
    piece.style.transform = `rotate(${Math.random() * 360}deg)`;
    container.appendChild(piece);
  }

  setTimeout(() => container.remove(), 3500);
}

function spawnSparkleBurst(x, y, count = 8) {
  const container = document.createElement('div');
  container.className = 'sparkle-burst';
  container.style.left = x + 'px';
  container.style.top = y + 'px';
  document.body.appendChild(container);

  for (let i = 0; i < count; i++) {
    const sparkle = document.createElement('div');
    sparkle.className = 'sparkle-particle';
    const angle = (i / count) * Math.PI * 2;
    const distance = 50 + Math.random() * 30;
    sparkle.style.setProperty('--end-x', (Math.cos(angle) * distance) + 'px');
    sparkle.style.setProperty('--end-y', (Math.sin(angle) * distance) + 'px');
    sparkle.textContent = ['✨', '🌟', '⭐', '💫'][Math.floor(Math.random() * 4)];
    container.appendChild(sparkle);
  }

  setTimeout(() => container.remove(), 1200);
}

  startTime: null,
  currentStreak: 0,  // current streak in this quiz
  maxStreak: 0       // max streak achieved this quiz
};

let allStudents = {};
let activeStudent = '';
let completedChallenges = {}; // shortcut to current student's challenges

// Migrate old data structure to new one (challenges + stats + badges)
function migrateStudent(s) {
  // Old: { 1: {score, total, code, ...}, 2: {...} }  -- lesson IDs as keys
  // New: { challenges: {1: {...}}, stats: {totalPoints, bestStreak, practiceCount, lessonsPracticed: []}, badges: [], maryGarden: {...} }
  if (s.challenges) {
    // Already new format — but ensure maryGarden exists for upgraded students
    if (!s.maryGarden) {
      s.maryGarden = { stickersEarned: [], titlesVisited: [] };
    }
    if (!s.massSection) {
      s.massSection = { stickerEarned: false, lastVisited: null };
    }
    return s;
  }
  const challenges = {};
  for (const key of Object.keys(s)) {
    if (!isNaN(parseInt(key))) {
      challenges[key] = s[key];
    }
  }
  // Calculate initial stats from existing challenges
  let totalPoints = 0;
  for (const c of Object.values(challenges)) {
    totalPoints += calculatePoints(c.score, c.total, 'challenge', 0);
  }
  return {
    challenges,
    stats: {
      totalPoints,
      bestStreak: 0,
      practiceCount: 0,
      lessonsPracticed: [],
      lessonsPerfectedInPractice: []
    },
    badges: [],
    maryGarden: { stickersEarned: [], titlesVisited: [] }
  };
}

function loadAllStudents() {
  try {
    const data = localStorage.getItem('catechism_all_students');
    if (data) {
      const raw = JSON.parse(data);
      // Migrate every student to new structure
      for (const name of Object.keys(raw)) {
        raw[name] = migrateStudent(raw[name]);
      }
      allStudents = raw;
    }
    // IMPORTANT: Do NOT auto-restore active student.
    // Always make the user pick "Who's playing?" each time the app loads.
    // This prevents one kid from accidentally landing in another kid's account
    // on a shared phone (especially when clicking a shared Facebook link).
    activeStudent = '';
    completedChallenges = {};
  } catch (e) {
    console.log('localStorage unavailable');
  }
}

function saveAllStudents() {
  try {
    localStorage.setItem('catechism_all_students', JSON.stringify(allStudents));
    // We still save activeStudent during a session (so refreshes mid-quiz don't lose state)
    // but loadAllStudents ignores it on fresh page load
    if (activeStudent) localStorage.setItem('catechism_active', activeStudent);
  } catch (e) {}
}

// HELPERS
// ============================================
function shuffle(array) {
  const arr = [...array];
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function getTier(percent) {
  if (percent === 100) return { name: 'PERFECT!', emoji: '👑', class: 'tier-perfect', reward: '🎁 BIGGEST REWARD!' };
  if (percent >= 90) return { name: 'GOLD', emoji: '🏆', class: 'tier-gold', reward: '🍫 Chocolate or special treat' };
  if (percent >= 75) return { name: 'SILVER', emoji: '🥈', class: 'tier-silver', reward: '🍬 Candy or biscuit' };
  return { name: 'KEEP TRYING', emoji: '📖', class: 'tier-bronze', reward: 'No reward yet — practice and try again!' };
}

// Get or create a unique device fingerprint stored permanently
// Used to detect when same kid creates multiple names on the same phone
function getDeviceId() {
  try {
    let id = localStorage.getItem('catechism_device_id');
    if (!id) {
      // Generate 4-character random ID (e.g., "A3F7", "B9K2")
      const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; // no confusing chars (no 0/O, 1/I)
      id = '';
      for (let i = 0; i < 4; i++) {
        id += chars[Math.floor(Math.random() * chars.length)];
      }
      localStorage.setItem('catechism_device_id', id);
    }
    return id;
  } catch (e) {
    return 'XXXX';
  }
}

function generateCode(lessonId, score, total, name) {
  const initials = (name || 'XX').replace(/[^a-zA-Z]/g, '').slice(0, 3).toUpperCase() || 'XX';
  const random = Math.floor(100 + Math.random() * 900); // 3-digit random
  const percent = Math.round((score / total) * 100);
  const tier = percent === 100 ? 'PERFECT' : percent >= 90 ? 'GOLD' : percent >= 75 ? 'SILVER' : 'TRY';
  // Date+Time stamp: YYMMDD-HHMM (e.g., 260426-1545 = April 26, 2026 at 3:45 PM)
  // Helps teacher spot duplicate claims and exact timing
  const now = new Date();
  const yy = String(now.getFullYear()).slice(2);
  const mm = String(now.getMonth() + 1).padStart(2, '0');
  const dd = String(now.getDate()).padStart(2, '0');
  const hh = String(now.getHours()).padStart(2, '0');
  const min = String(now.getMinutes()).padStart(2, '0');
  const dateStamp = `${yy}${mm}${dd}`;
  const timeStamp = `${hh}${min}`;
  // Device fingerprint helps detect same kid using multiple names on same phone
  const devId = getDeviceId();
  return `${initials}-L${lessonId}-${score}of${total}-${tier}-${dateStamp}-${timeStamp}-${devId}-${random}`;
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
}

function shootConfetti(small) {

  const count = small ? 15 : 50;
  for (let i = 0; i < count; i++) {

    piece.className = 'confetti';
    piece.style.left = Math.random() * 100 + '%';
    piece.style.top = '-5vh';

// Calculate scoring
function calculatePoints(score, total, mode, maxStreak) {
  if (mode !== 'challenge') return 0; // points only from challenge
  const percent = Math.round((score / total) * 100);
  if (percent < 75) return 0; // No points for failing the challenge (below Silver tier)
  const basePoints = score * 10;
  let bonus = 0;
  if (percent === 100) bonus += 50;       // Perfect bonus
  else if (percent >= 90) bonus += 25;
  else if (percent >= 75) bonus += 10;
  if (maxStreak >= 5) bonus += 15;        // Streak bonus
  if (maxStreak >= 10) bonus += 30;
  return basePoints + bonus;
}

function getCurrentRank(totalPoints) {
  let current = RANKS[0];
  for (const rank of RANKS) {
    if (totalPoints >= rank.minPoints) current = rank;
  }
  return current;
}

function getNextRank(totalPoints) {
  for (const rank of RANKS) {
    if (totalPoints < rank.minPoints) return rank;
  }
  return null; // already max rank
}

function getRankProgress(totalPoints) {
  const current = getCurrentRank(totalPoints);
  const next = getNextRank(totalPoints);
  if (!next) return { percent: 100, current, next: null, pointsToNext: 0 };
  const range = next.minPoints - current.minPoints;
  const earned = totalPoints - current.minPoints;
  return {
    percent: Math.round((earned / range) * 100),
    current, next,
    pointsToNext: next.minPoints - totalPoints
  };
}

function checkBadges(student) {
  // Returns array of badge IDs that student has earned
  const earned = new Set(student.badges || []);
  const stats = student.stats || {};
  const allChallenges = Object.values(student.challenges || {});
  // Only count PASSED challenges (75%+) for completion-based badges
  const passedChallenges = allChallenges.filter(c => (c.percent || 0) >= 75);

  if (passedChallenges.length >= 1) earned.add('first_lesson');
  if ((stats.practiceCount || 0) >= 5) earned.add('practice_5');

  const perfects = passedChallenges.filter(c => c.percent === 100).length;
  if (perfects >= 1) earned.add('perfect_1');
  if (perfects >= 3) earned.add('perfect_3');

  if ((stats.bestStreak || 0) >= 5) earned.add('streak_5');
  if ((stats.bestStreak || 0) >= 10) earned.add('streak_10');

  if (passedChallenges.length >= 4) earned.add('half_done');
  if (passedChallenges.length >= 8) earned.add('all_done');
  if (perfects >= 8) earned.add('all_perfect');

  const totalPts = stats.totalPoints || 0;
  if (totalPts >= 500) earned.add('rosary');
  if (totalPts >= 1000) earned.add('cathedral');

  if ((stats.lessonsPracticed || []).length >= 8) earned.add('angel');

  return Array.from(earned);
}

      </p>
      <div style="display: flex; gap: 10px; justify-content: center; margin-top: 18px; flex-wrap: wrap;">
        <button class="btn btn-secondary" id="del-cancel">No, keep it</button>
        <button class="btn" id="del-confirm" style="background: linear-gradient(180deg, #fff 0%, #fecaca 100%); border-color: var(--pastel-pink-deep); color: var(--pastel-pink-darker); box-shadow: 0 4px 0 var(--pastel-pink-deep);">Yes, remove</button>
      </div>
    </div>
  `;
  document.body.appendChild(backdrop);
  backdrop.querySelector('#del-cancel').onclick = () => backdrop.remove();
  backdrop.querySelector('#del-confirm').onclick = () => {
    backdrop.remove();
    deleteStudent(name);
  };
  backdrop.onclick = (e) => { if (e.target === backdrop) backdrop.remove(); };
}

function deleteStudent(name) {
  try {
    if (allStudents[name]) {
      delete allStudents[name];
      saveAllStudents();
    }
    // If the deleted student was the active one, clear active too
    if (activeStudent === name) {
      activeStudent = '';
      completedChallenges = {};
      try { localStorage.removeItem('catechism_active'); } catch (e) {}
    }
    // Re-render the manage screen (since this is teacher-only now)
    renderManageStudents();
  } catch (e) {
    showModal('❌ Error', 'Could not remove: ' + e.message);
  }
}

function addNewStudent() {
  const input = document.getElementById('nameInput');
  if (!input) return;
  const name = input.value.trim();
  if (!name) {
    showModal('✋ Wait!', 'Please type your name in the box so we can save your progress.');
    return;
  }
  const existing = getStudentList().find(n => n.toLowerCase() === name.toLowerCase());
  if (existing) {
    setActiveStudent(existing);
  } else {
    setActiveStudent(name);
  }
  if (ambientEnabled) startAmbientPad();
  renderHome();
}

function startQuiz(mode) {
  const lesson = state.currentLesson;

  if (mode === 'challenge') {
    // Block if already completed
    if (completedChallenges[lesson.id]) {
      showModal('🔒 Already Done!', 'You have already finished Challenge Mode for this lesson. Practice Mode is always open if you want to keep learning!');
      return;
    }
    // Block if practice not yet perfected
    const student = getCurrentStudent();
    const perfected = (student.stats && student.stats.lessonsPerfectedInPractice) || [];
    if (!perfected.includes(lesson.id)) {
      showModal('🔒 Challenge Locked!', 'You must first get a PERFECT 7/7 in Practice Mode before you can take the Challenge. Keep practicing — you can do it! 💪');
      return;
    }
    // Show prayer/promise screen before Challenge
    renderPrayerScreen();
    return;
  }

  // Practice mode goes straight to quiz
  beginQuiz(mode);
}

function beginQuiz(mode) {
  const lesson = state.currentLesson;
  state.currentMode = mode;
  state.currentQuestionIndex = 0;
  state.answers = [];
  state.startTime = Date.now();
  state.currentStreak = 0;
  state.maxStreak = 0;

  state.shuffledQuestions = shuffle(lesson.questions);
  state.shuffledChoices = state.shuffledQuestions.map(q => {
    const indices = q.choices.map((_, i) => i);
    return shuffle(indices);
  });

  renderQuestion();
}

function renderQuestion() {
  // Keep music playing throughout the quiz
  if (ambientEnabled && soundsEnabled && firstInteractionDone) playMp3Music();

  const q = state.shuffledQuestions[state.currentQuestionIndex];
  const choiceMap = state.shuffledChoices[state.currentQuestionIndex];
  const total = state.shuffledQuestions.length;
  const idx = state.currentQuestionIndex;
  const progress = ((idx) / total) * 100;
  const letters = ['A', 'B', 'C', 'D'];

  const choicesHtml = choiceMap.map((origIdx, displayIdx) => `
    <button class="choice" onclick="answerQuestion(${displayIdx}, ${origIdx})" id="choice-${displayIdx}">
      <span class="letter">${letters[displayIdx]}</span>
      <span class="choice-text">
        <span class="choice-english">${escapeHtml(q.choices[origIdx])}</span>
        ${q.choicesBisaya && q.choicesBisaya[origIdx] ? `<span class="choice-bisaya">${escapeHtml(q.choicesBisaya[origIdx])}</span>` : ''}
      </span>
    </button>
  `).join('');

  const streakBadge = state.currentStreak >= 2
    ? `<span class="streak-display">🔥 ${state.currentStreak} streak!</span>`
    : '';

  const practiceReminder = state.currentMode === 'practice' ? `
    <div style="background: linear-gradient(135deg, var(--pastel-lavender-light), var(--pastel-sky-light)); border: 2px dashed var(--pastel-lavender-deep); border-radius: 16px; padding: 10px 14px; margin-bottom: 14px; text-align: center; font-family: 'Quicksand', sans-serif; font-size: 0.9rem; color: var(--pastel-lavender-darker); font-weight: 700;">
      📖 Practice Mode — no rewards here, but you're learning! Take the ⚔️ Challenge after to earn rewards.
    </div>
  ` : '';

  // Quit button — only available in Practice (Challenge is one-attempt-only)
  const quitButton = state.currentMode === 'practice' ? `
    <div style="text-align: right; margin-bottom: 10px;">
      <button onclick="confirmQuitQuiz()" style="background: rgba(255,255,255,0.9); border: 2px solid var(--pastel-pink); color: var(--pastel-pink-darker); font-family: 'Quicksand', sans-serif; font-weight: 700; padding: 6px 14px; border-radius: 14px; cursor: pointer; font-size: 0.85rem; box-shadow: 0 2px 0 var(--pastel-pink);">
        ✕ Back to Menu
      </button>
    </div>
  ` : '';

  render(`
    <div class="quiz-screen">
      ${quitButton}
      ${practiceReminder}
      <div class="quiz-header">
        <span class="quiz-mode-badge ${state.currentMode}">${state.currentMode === 'practice' ? '📖 Practice' : '⚔️ Challenge'}</span>
        ${streakBadge}
        <span class="progress-text">Q ${idx + 1} of ${total}</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" style="width: ${progress}%"></div>
      </div>
      <div class="question">${escapeHtml(q.q)}</div>
      ${q.qBisaya ? `<div class="q-bisaya">${escapeHtml(q.qBisaya)}</div>` : ''}
      <div class="choices">${choicesHtml}</div>
      <div id="feedback"></div>
      <div id="next-area" style="text-align: center; margin-top: 20px;"></div>
    </div>
  `);
}

function confirmQuitQuiz() {
  // Show a confirmation modal before quitting
  const backdrop = document.createElement('div');
  backdrop.className = 'modal-backdrop';
  backdrop.innerHTML = `
    <div class="modal">
      <div style="font-size: 2.2rem; margin-bottom: 8px;">🤔</div>
      <h3>Quit Practice?</h3>
      <p>Your progress in this lesson won't be saved. Are you sure you want to go back to the menu?</p>
      <p style="font-style: italic; color: var(--pastel-lavender-darker); font-size: 0.85rem; margin-top: 6px;">Sigurado ka nga mobalik sa menu?</p>
      <div style="display: flex; gap: 10px; justify-content: center; margin-top: 16px; flex-wrap: wrap;">
        <button class="btn btn-secondary" id="quit-cancel">No, keep practicing</button>
        <button class="btn" id="quit-confirm" style="background: linear-gradient(180deg, #fff 0%, #fee2e2 100%); border-color: var(--pastel-pink-deep); color: var(--pastel-pink-darker);">Yes, quit</button>
      </div>
    </div>
  `;
  document.body.appendChild(backdrop);
  backdrop.querySelector('#quit-cancel').onclick = () => backdrop.remove();
  backdrop.querySelector('#quit-confirm').onclick = () => {
    backdrop.remove();
    // Reset quiz state and go back to lesson menu
    state.currentLesson = null;
    state.currentMode = null;
    state.shuffledQuestions = [];
    state.answers = [];
    renderCatechismQuestHome();
  };
  backdrop.onclick = (e) => { if (e.target === backdrop) backdrop.remove(); };
}

function answerQuestion(displayIdx, origIdx) {
  const q = state.shuffledQuestions[state.currentQuestionIndex];
  const correctOrigIdx = q.correct;
  const isCorrect = origIdx === correctOrigIdx;

  state.answers.push({
    questionIndex: state.currentQuestionIndex,
    chosen: origIdx,
    correct: correctOrigIdx,
    isCorrect: isCorrect
  });

  // Update streak
  if (isCorrect) {
    state.currentStreak++;
    if (state.currentStreak > state.maxStreak) state.maxStreak = state.currentStreak;
  } else {
    state.currentStreak = 0;
  }

  document.querySelectorAll('.choice').forEach(btn => btn.disabled = true);

  if (state.currentMode === 'practice') {
    const choiceMap = state.shuffledChoices[state.currentQuestionIndex];
    const correctDisplayIdx = choiceMap.indexOf(correctOrigIdx);

    document.getElementById(`choice-${correctDisplayIdx}`).classList.add('correct');
    if (!isCorrect) {
      // WRONG: play boop sound + shake animation
      playWrongSound();
      const wrongBtn = document.getElementById(`choice-${displayIdx}`);
      wrongBtn.classList.add('wrong');
      wrongBtn.classList.add('wrong-flash');
    } else {
      // CORRECT: play ding + sparkle burst + correct flash
      playCorrectSound();
      const correctBtn = document.getElementById(`choice-${correctDisplayIdx}`);
      correctBtn.classList.add('correct-flash');

      // Sparkle burst from the correct button center
      const rect = correctBtn.getBoundingClientRect();
      spawnSparkleBurst(rect.left + rect.width / 2, rect.top + rect.height / 2, 8);

      shootConfetti(true);

      // Streak milestone sound at 3, 5, 10
      if (state.currentStreak === 3 || state.currentStreak === 5 || state.currentStreak === 10) {
        setTimeout(() => playStreakSound(), 350);
      }

      // Practice mode: show encouragement (NOT points - those are only for Challenge Mode)
      const encouragement = state.currentStreak >= 5 ? `🔥 ${state.currentStreak} streak!`
                          : state.currentStreak >= 3 ? `Nice! 🔥${state.currentStreak}`
                          : '✨ Correct! ✨';
      showPointReward(encouragement, displayIdx);
    }

    document.getElementById('feedback').innerHTML = `
      <div class="feedback ${isCorrect ? '' : 'wrong'}">
        <strong>${isCorrect ? '✨ Correct! ✨' : '✗ Not quite...'}</strong>
        ${q.explainBisaya ? `<div class="explain-bisaya">${escapeHtml(q.explainBisaya)}</div>` : ''}
        <div class="explain-english">${escapeHtml(q.explain)}</div>
      </div>
    `;

    document.getElementById('next-area').innerHTML = `
      <button class="btn" onclick="nextQuestion()">${state.currentQuestionIndex < state.shuffledQuestions.length - 1 ? 'Next →' : 'See Results 🎯'}</button>
    `;
  } else {
    // Challenge mode: highlight selection but don't reveal correct/wrong, no points shown yet
    playTapSound();
    document.getElementById(`choice-${displayIdx}`).classList.add('selected-challenge');
    setTimeout(() => nextQuestion(), 600);
  }
}

function showPointReward(text, choiceDisplayIdx) {
  const choice = document.getElementById(`choice-${choiceDisplayIdx}`);
  if (!choice) return;
  const rect = choice.getBoundingClientRect();
  const reward = document.createElement('div');
  reward.className = 'point-reward';
  reward.textContent = text;
  reward.style.left = (rect.left + rect.width / 2) + 'px';
  reward.style.top = (rect.top + rect.height / 2) + 'px';
  document.body.appendChild(reward);
  setTimeout(() => reward.remove(), 1600);
}

function nextQuestion() {
  state.currentQuestionIndex++;
  if (state.currentQuestionIndex >= state.shuffledQuestions.length) {
    renderResults();
  } else {
    renderQuestion();
  }
}

function renderResults() {
  // Keep music playing on results too
  if (ambientEnabled && soundsEnabled && firstInteractionDone) playMp3Music();

  const total = state.shuffledQuestions.length;
  const score = state.answers.filter(a => a.isCorrect).length;
  const percent = Math.round((score / total) * 100);
  const tier = getTier(percent);

  // Play celebration sound + big confetti based on outcome
  setTimeout(() => {
    if (state.currentMode === 'challenge') {
      if (percent === 100) {
        // CROWN tier — applause + heavenly chime + huge confetti
        playApplause(4.0);
        setTimeout(() => playHeavenlyChime(), 500);
        spawnConfetti(80);
      } else if (percent >= 75) {
        playHeavenlyChime();
        spawnConfetti(40);
      } else {
        playFailedChallengeSound();
      }
    } else {
      // Practice mode
      if (percent === 100) {
        // PRACTICE PERFECT — applause + fanfare + confetti
        playApplause(3.5);
        setTimeout(() => playPracticePerfectSound(), 400);
        spawnConfetti(50);
      } else if (percent >= 75) {
        playCorrectSound();
        spawnConfetti(20);
      }
    }
  }, 200);

  let code = '';
  let pointsEarned = 0;
  let oldRank = null;
  let newRank = null;
  let leveledUp = false;
  let newBadges = [];
  let newlyUnlockedMiniGames = []; // Track which games newly unlocked from this quiz

  const student = getCurrentStudent();
  if (!student.stats) student.stats = { totalPoints: 0, bestStreak: 0, practiceCount: 0, lessonsPracticed: [] };

  // Snapshot mini-games unlocked BEFORE this quiz outcome was saved
  const miniGamesBefore = new Set(getUnlockedMiniGames());

  if (state.currentMode === 'challenge') {
    code = generateCode(state.currentLesson.id, score, total, state.studentName);
    pointsEarned = calculatePoints(score, total, 'challenge', state.maxStreak);

    // Capture old rank before adding points
    oldRank = getCurrentRank(student.stats.totalPoints);
    const oldBadges = checkBadges(student);

    // Save the challenge result (only if percent >= 75 — otherwise just record attempt)
    student.challenges[state.currentLesson.id] = {
      score, total, code,
      date: new Date().toISOString().slice(0, 10),
      name: state.studentName,
      percent
    };
    completedChallenges = student.challenges;

    // Update stats
    student.stats.totalPoints = (student.stats.totalPoints || 0) + pointsEarned;
    if (state.maxStreak > (student.stats.bestStreak || 0)) {
      student.stats.bestStreak = state.maxStreak;
    }

    // Check for new rank
    newRank = getCurrentRank(student.stats.totalPoints);
    if (newRank.name !== oldRank.name) leveledUp = true;

    // Check for new badges
    const updatedBadges = checkBadges(student);
    newBadges = updatedBadges.filter(b => !oldBadges.includes(b));
    student.badges = updatedBadges;

    saveAllStudents();
  } else {
    // Practice mode: increment practice count, track lessons practiced
    student.stats.practiceCount = (student.stats.practiceCount || 0) + 1;
    if (!student.stats.lessonsPracticed) student.stats.lessonsPracticed = [];
    if (!student.stats.lessonsPracticed.includes(state.currentLesson.id)) {
      student.stats.lessonsPracticed.push(state.currentLesson.id);
    }
    // NEW: Track lessons perfected in practice (100% score) — unlocks Challenge Mode
    if (!student.stats.lessonsPerfectedInPractice) student.stats.lessonsPerfectedInPractice = [];
    var firstTimeUnlock = false;
    if (percent === 100 && !student.stats.lessonsPerfectedInPractice.includes(state.currentLesson.id)) {
      student.stats.lessonsPerfectedInPractice.push(state.currentLesson.id);
      firstTimeUnlock = true; // FIRST TIME perfecting this lesson
    }
    if (state.maxStreak > (student.stats.bestStreak || 0)) {
      student.stats.bestStreak = state.maxStreak;
    }
    const oldBadges = student.badges || [];
    const updatedBadges = checkBadges(student);
    newBadges = updatedBadges.filter(b => !oldBadges.includes(b));
    student.badges = updatedBadges;
    saveAllStudents();

    // Show big celebration if this is the FIRST time perfecting practice
    if (firstTimeUnlock && !completedChallenges[state.currentLesson.id]) {
      setTimeout(() => showUnlockCelebration(), 600);
    }
  }

  // After all saves: check which mini-games newly unlocked from this quiz
  const miniGamesAfter = new Set(getUnlockedMiniGames());
  newlyUnlockedMiniGames = MINI_GAMES.filter(g => miniGamesAfter.has(g.id) && !miniGamesBefore.has(g.id));

  // Big celebration for high scores
  if (percent >= 90) shootConfetti(false);
  else if (percent >= 60) shootConfetti(true);

  let reviewHtml = '';
  if (state.currentMode === 'practice') {
    reviewHtml = `
      <h3 style="font-family: 'Pacifico', cursive; color: var(--pastel-pink-darker); margin-top: 25px; margin-bottom: 12px; font-size: 1.4rem;">📋 Your Answers</h3>
      <div class="review">
        ${state.answers.map((a, i) => {
          const q = state.shuffledQuestions[i];
          return `
            <div class="review-item ${a.isCorrect ? '' : 'wrong'}">
              <div class="q">${i+1}. ${escapeHtml(q.q)}</div>
              <div class="your-answer">${a.isCorrect ? '✓' : '✗'} You answered: ${escapeHtml(q.choices[a.chosen])}</div>
              ${!a.isCorrect ? `<div class="correct-answer">✨ Correct: ${escapeHtml(q.choices[a.correct])}</div>` : ''}
              ${q.explainBisaya ? `<div class="review-explain-bisaya">📖 ${escapeHtml(q.explainBisaya)}</div>` : ''}
              ${q.explain ? `<div class="review-explain-english">${escapeHtml(q.explain)}</div>` : ''}
            </div>
          `;
        }).join('')}
      </div>
    `;
  }

  // Build new-badges notification
  let newBadgesHtml = '';
  if (newBadges.length > 0) {
    // Play badge sound after celebration
    setTimeout(() => playBadgeSound(), 1200);
    const badgesList = newBadges.map(id => {
      const b = BADGES.find(x => x.id === id);
      return b ? `<span style="display: inline-flex; align-items: center; gap: 6px; background: linear-gradient(135deg, var(--gold-glow), var(--gold)); padding: 6px 12px; border-radius: 20px; margin: 4px; border: 2px solid var(--gold-deep); box-shadow: 0 2px 4px var(--shadow); font-family: 'Fredoka', sans-serif; font-weight: 600;">${b.emoji} ${escapeHtml(b.name)}</span>` : '';
    }).join('');
    newBadgesHtml = `
      <div style="margin: 20px 0; padding: 16px; background: linear-gradient(135deg, rgba(245,200,66,0.2), rgba(245,200,66,0.05)); border: 2px dashed var(--gold-deep); border-radius: 14px;">
        <div style="font-family: 'Quicksand', sans-serif; color: var(--pastel-pink-darker); margin-bottom: 8px; font-weight: 700;">🎉 New Badge${newBadges.length > 1 ? 's' : ''} Unlocked!</div>
        ${badgesList}
      </div>

  }

  // Build new mini-game unlocked notification
  let newMiniGameHtml = '';
  if (newlyUnlockedMiniGames.length > 0) {
    setTimeout(() => playBadgeSound(), 1500);

    // For challenge mode passes, delay until save-code reminder is dismissed

    setTimeout(() => {
      // Don't pile on top of save-code reminder if it's still open

          if (!document.getElementById('save-code-reminder')) {
            clearInterval(checkInterval);
            showMiniGameUnlockPopup(newlyUnlockedMiniGames);

          <span style="font-size: 1.8rem;">${g.icon}</span>

            <span style="display: block; font-style: italic; color: var(--pastel-mint-deep); font-size: 0.78rem;">${isAvailable ? '🎮 Tap home to play!' : '⏳ Coming soon'}</span>

    }).join('');
    newMiniGameHtml = `

        <div style="font-family: 'Pacifico', cursive; color: var(--pastel-mint-deep); font-size: 1.7rem; margin-bottom: 8px;">🎮 Mini-Game${newlyUnlockedMiniGames.length > 1 ? 's' : ''} Unlocked!</div>
        <div style="font-family: 'Quicksand', sans-serif; font-style: italic; color: var(--plum-deep); font-size: 0.9rem; margin-bottom: 10px;">Bag-ong duwa nabuksan!</div>
        ${gamesList}
        <div style="margin-top: 14px;">
          <button class="btn" onclick="renderMiniGamesHub()" style="background: linear-gradient(180deg, var(--pastel-mint), var(--pastel-mint-deep)); color: #fff; border-color: var(--pastel-mint-deep); box-shadow: 0 4px 0 #047857; font-size: 0.95rem; padding: 10px 22px;">▶ Go to Mini-Games</button>
        </div>

  // Build points earned display (challenge mode only)
  let pointsBox = '';
  if (state.currentMode === 'challenge' && pointsEarned > 0) {
    let breakdown = `${score} correct × 10 = ${score * 10} points`;
    if (percent === 100) breakdown += `<br>🌟 Perfect bonus: +50`;
    else if (percent >= 90) breakdown += `<br>🏆 Excellence bonus: +25`;
    else if (percent >= 75) breakdown += `<br>🥈 Good bonus: +10`;
    if (state.maxStreak >= 5) breakdown += `<br>🔥 Streak ${state.maxStreak} bonus: +${state.maxStreak >= 10 ? 30 : 15}`;

    pointsBox = `
      <div style="margin: 20px 0; padding: 18px; background: linear-gradient(135deg, #fff, var(--pastel-yellow)); border: 3px solid #fbbf24; border-radius: 20px; box-shadow: 0 0 30px rgba(251, 191, 36, 0.3), 0 4px 0 #fbbf24;">

  let codeBox = '';
  if (state.currentMode === 'challenge') {
    if (percent >= 75) {
      // PASSED — show reward code FRONT AND CENTER with save/share buttons
      const tierEmoji = percent === 100 ? '👑' : percent >= 90 ? '🏆' : '🥈';
      const tierName = percent === 100 ? 'PERFECT' : percent >= 90 ? 'GOLD' : 'SILVER';

          <div style="font-size: 3rem; margin-bottom: 6px;">${tierEmoji}</div>
          <div style="font-family: 'Quicksand', sans-serif; font-weight: 700; color: #d97706; font-size: 0.85rem; letter-spacing: 0.25em; margin-bottom: 4px;">⭐ YOUR REWARD CODE ⭐</div>

// Generate a beautiful PNG image of the reward code and download it
function saveCodeAsImage(code, tier, score, total) {
  try {
    const tierEmoji = tier === 'PERFECT' ? '👑' : tier === 'GOLD' ? '🏆' : '🥈';
    const tierColor = tier === 'PERFECT' ? '#dc2626' : tier === 'GOLD' ? '#d97706' : '#6b7280';
    const studentName = state.studentName || 'Student';

    // Create a canvas
    const canvas = document.createElement('canvas');
    canvas.width = 800;
    canvas.height = 1000;
    const ctx = canvas.getContext('2d');

    // Background gradient
    const bgGrad = ctx.createLinearGradient(0, 0, 0, 1000);
    bgGrad.addColorStop(0, '#fef3c7');
    bgGrad.addColorStop(0.5, '#fce7f3');
    bgGrad.addColorStop(1, '#e0e7ff');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, 800, 1000);

    // White card
    ctx.fillStyle = '#fff';
    ctx.strokeStyle = '#fbbf24';
    ctx.lineWidth = 8;
    roundRect(ctx, 50, 100, 700, 800, 30);
    ctx.fill();
    ctx.stroke();

    // Big tier emoji
    ctx.font = '160px serif';
    ctx.textAlign = 'center';
    ctx.fillText(tierEmoji, 400, 280);

    // Title "Reward Code"
    ctx.font = 'bold 48px sans-serif';
    ctx.fillStyle = '#d97706';
    ctx.fillText('YOUR REWARD CODE', 400, 360);

    // Tier label
    ctx.font = 'bold 56px serif';
    ctx.fillStyle = tierColor;
    ctx.fillText(tier + ' ' + tierEmoji, 400, 440);

    // Dashed border around code
    ctx.setLineDash([15, 10]);
    ctx.strokeStyle = '#fbbf24';
    ctx.lineWidth = 4;
    roundRect(ctx, 100, 480, 600, 140, 20);
    ctx.stroke();
    ctx.setLineDash([]);

    // Code text (auto-fit if too long)
    ctx.font = 'bold 38px monospace';
    ctx.fillStyle = '#be185d';
    let codeFontSize = 38;
    while (ctx.measureText(code).width > 560 && codeFontSize > 18) {
      codeFontSize -= 2;
      ctx.font = `bold ${codeFontSize}px monospace`;
    }
    ctx.fillText(code, 400, 565);

    // Student name
    ctx.font = 'italic 32px serif';
    ctx.fillStyle = '#6b21a8';
    ctx.fillText('Earned by: ' + studentName, 400, 690);

    // Date
    const today = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
    ctx.font = '26px sans-serif';
    ctx.fillStyle = '#7c3aed';
    ctx.fillText(today, 400, 740);

    // Footer
    ctx.font = 'bold 28px sans-serif';
    ctx.fillStyle = '#be185d';
    ctx.fillText('Catechism Quest', 400, 820);

    ctx.font = 'italic 22px sans-serif';
    ctx.fillStyle = '#9333ea';
    ctx.fillText('SSPX Sunday Class', 400, 855);

    // Crosses corners
    ctx.font = '50px serif';
    ctx.fillStyle = '#fbbf24';
    ctx.fillText('✝', 90, 160);
    ctx.fillText('✝', 710, 160);

    // Convert to blob and download
    canvas.toBlob(function(blob) {
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      const safeCode = code.replace(/[^A-Za-z0-9-]/g, '_');
      link.download = `RewardCode_${safeCode}.png`;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      setTimeout(() => URL.revokeObjectURL(url), 1000);

      // Show confirmation
      showModal('✅ Saved!', `Your code image has been saved to your Downloads. Send it to Ate ${teacherName.split(' ')[0]} on Messenger.`);
    }, 'image/png');
  } catch (e) {
    console.error('Save image error:', e);
    showModal('❌ Error', 'Could not save image. Please take a screenshot instead.');
  }
}

// Helper: rounded rectangle for canvas
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// Share code via native share API (Messenger, Facebook Lite, etc.)
function shareCode(code, tier, score, total) {
  const tierEmoji = tier === 'PERFECT' ? '👑' : tier === 'GOLD' ? '🏆' : '🥈';
  const studentName = state.studentName || 'Student';
  const text = `🎉 ${studentName} earned a reward!\n\n${tierEmoji} ${tier}\n⭐ Code: ${code}\n\nFrom Catechism Quest 📿`;

  if (navigator.share) {
    navigator.share({
      title: 'My Catechism Quest Reward Code',
      text: text
    }).catch(err => {
      // User cancelled or share failed - fallback to copy
      copyCodeToClipboard(text);
    });
  } else {
    // Fallback: copy to clipboard
    copyCodeToClipboard(text);
  }
}

function copyCodeToClipboard(text) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => {
      showModal('📋 Copied!', `Code copied to clipboard. Paste it in your Messenger message to Ate ${teacherName.split(' ')[0]}.`);
    }).catch(() => {
      showModal('📸 Take a Screenshot', 'Please take a screenshot of the code and send it via Messenger.');
    });
  } else {
    showModal('📸 Take a Screenshot', 'Please take a screenshot of the code and send it via Messenger.');
  }
}

// Check which mini-games are unlocked for current student
function getUnlockedMiniGames() {
  const student = getCurrentStudent();
  if (!student) return [];
  const perfected = (student.stats && student.stats.lessonsPerfectedInPractice) || [];
  const allChallenges = student.challenges || {};

  // A lesson counts as "mastered" if EITHER:
  // - Practice was perfected (100% in Practice), OR
  // - Challenge was PASSED (75%+ in Challenge)
  const masteredLessonIds = new Set(perfected);
  Object.keys(allChallenges).forEach(lessonIdStr => {
    const lessonId = parseInt(lessonIdStr, 10);
    const challenge = allChallenges[lessonIdStr];
    // Only count if percent >= 75 (failed challenges don't count)
    if (!isNaN(lessonId) && challenge && (challenge.percent || 0) >= 75) {
      masteredLessonIds.add(lessonId);
    }
  });

  const unlocked = [];
  for (const game of MINI_GAMES) {
    if (masteredLessonIds.has(game.unlockLesson)) {
      unlocked.push(game.id);
    }
  }
  return unlocked;
}

function renderMiniGamesHub() {
  // Music should be playing on the hub (only mini-games themselves silence it)
  if (ambientEnabled && soundsEnabled && firstInteractionDone) playMp3Music();

  const unlocked = getUnlockedMiniGames();
  const student = getCurrentStudent();
  const perfected = (student.stats && student.stats.lessonsPerfectedInPractice) || [];
  const allChallenges = student.challenges || {};
  const passedChallengeLessons = Object.keys(allChallenges)
    .filter(k => (allChallenges[k].percent || 0) >= 75)
    .map(k => parseInt(k, 10))
    .filter(n => !isNaN(n));
  const masteredCount = new Set([...perfected, ...passedChallengeLessons]).size;

  const gamesHtml = MINI_GAMES.map(game => {
    const isUnlocked = unlocked.includes(game.id);
    const isAvailable = game.available;
    const lockText = `🔒 Master Lesson ${game.unlockLesson} to unlock`;

    if (isUnlocked && isAvailable) {
      return `
        <div class="lesson-card" data-color="${game.color}" onclick="startMiniGame('${game.id}')">
          <div class="lesson-icon">${game.icon}</div>
          <div class="lesson-num">Mini-Game</div>

let memoryState = null;

function startMemoryMatch() {
  // Stop background music for mini-games (per MJ's request)
  stopMp3Music();

  // Pick 6 random pairs from MEMORY_PAIRS (12 cards total = 4x3 grid)
  const shuffledPairs = shuffle(MEMORY_PAIRS).slice(0, 6);

  // Build cards array: each pair becomes 2 cards (one EN, one BS)
  const cards = [];
  shuffledPairs.forEach((pair, pairIdx) => {
    cards.push({ id: `card-${pairIdx}-en`, pairId: pairIdx, text: pair.en, lang: 'en', emoji: pair.emoji, bgColor: pair.bgColor, flipped: false, matched: false });
    cards.push({ id: `card-${pairIdx}-bs`, pairId: pairIdx, text: pair.bs, lang: 'bs', emoji: pair.emoji, bgColor: pair.bgColor, flipped: false, matched: false });
  });

  // Shuffle the deck
  const deck = shuffle(cards);

  memoryState = {
    deck: deck,
    flippedCards: [],
    matchedPairs: 0,
    totalPairs: 6,
    moves: 0,
    locked: false,
    startTime: Date.now()
  };

  renderMemoryMatch();
}

function renderMemoryMatch() {
  const s = memoryState;
  if (!s) return;

  const cardsHtml = s.deck.map((card, idx) => {
    const isFlipped = card.flipped || card.matched;
    const isMatched = card.matched;
    const langClass = card.lang === 'en' ? 'mm-card-en' : 'mm-card-bs';
    const theme = MM_COLOR_THEMES[card.bgColor] || MM_COLOR_THEMES.rose;

    // Inline style for theme color when flipped (and not matched - matched uses green)
    const themeStyle = (isFlipped && !isMatched) ? `style="background: ${theme.bg}; border-color: ${theme.border}; box-shadow: 0 4px 0 ${theme.shadow}, 0 6px 14px ${theme.border}33;"` : '';

    return `
      <button class="mm-card ${isFlipped ? 'mm-flipped' : ''} ${isMatched ? 'mm-matched' : ''} ${langClass}"
        ${themeStyle}
        onclick="flipMemoryCard(${idx})"
        ${isMatched || s.locked ? 'disabled' : ''}>
        <span class="mm-card-back">✦</span>
        <span class="mm-card-front">
          <span class="mm-emoji">${card.emoji}</span>
          <span class="mm-text">${escapeHtml(card.text)}</span>
        </span>
      </button>
    `;
  }).join('');

  const progress = Math.round((s.matchedPairs / s.totalPairs) * 100);

  render(`
    <button class="sound-toggle" onclick="toggleSounds(); renderMemoryMatch();" title="Toggle Sounds">${soundsEnabled ? "🔊" : "🔇"}</button>
    <div class="quiz-screen">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; flex-wrap: wrap; gap: 8px;">
        <div style="font-family: 'Pacifico', cursive; font-size: 1.4rem; color: var(--pastel-pink-darker);">🃏 Memory Match</div>
        <div style="font-family: 'Quicksand', sans-serif; font-weight: 700; color: var(--plum-deep); font-size: 0.95rem;">
          Pairs: ${s.matchedPairs}/${s.totalPairs} • Moves: ${s.moves}
        </div>
      </div>

      <div class="progress-bar"><div class="progress-fill" style="width: ${progress}%"></div></div>

      <div style="background: linear-gradient(135deg, var(--pastel-lavender-light), var(--pastel-sky-light)); border: 2px dashed var(--pastel-lavender-deep); border-radius: 14px; padding: 10px 14px; margin: 12px 0; text-align: center; font-family: 'Quicksand', sans-serif; font-size: 0.9rem; color: var(--pastel-lavender-darker); font-weight: 700;">
        Tap two cards to match the English with its Bisaya!<br>
        <span style="font-size: 0.82rem; font-style: italic; font-weight: 500;">Tagboa ang English sa iyang Bisaya nga pulong</span>
      </div>

      <div class="mm-grid">
        ${cardsHtml}
      </div>

      <div style="text-align: center; margin-top: 24px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;">
        <button class="btn btn-secondary" onclick="exitMemoryMatch()">← Quit</button>
        <button class="btn" onclick="startMemoryMatch()" style="background: linear-gradient(180deg, #fff 0%, var(--pastel-sky-light) 100%); border-color: var(--pastel-sky); color: var(--plum-deep); box-shadow: 0 4px 0 var(--pastel-sky), 0 6px 12px rgba(125, 211, 252, 0.3);">🔄 New Game</button>
      </div>
    </div>
  `);
}

function flipMemoryCard(idx) {
  const s = memoryState;
  if (!s || s.locked) return;
  const card = s.deck[idx];
  if (card.flipped || card.matched) return;
  if (s.flippedCards.length >= 2) return;

  // Flip the card
  card.flipped = true;
  s.flippedCards.push(idx);
  playTapSound();

  // ALWAYS render immediately so the user SEES the flip
  renderMemoryMatch();

  // If two cards flipped, check for match (after a moment so user can see them)
  if (s.flippedCards.length === 2) {
    s.moves++;
    s.locked = true;
    const [idx1, idx2] = s.flippedCards;
    const card1 = s.deck[idx1];
    const card2 = s.deck[idx2];

    if (card1.pairId === card2.pairId) {
      // MATCH! Wait so user can see both cards
      setTimeout(() => {
        card1.matched = true;
        card2.matched = true;
        s.matchedPairs++;
        s.flippedCards = [];
        s.locked = false;
        playCorrectSound();

        // Sparkle burst on each matched card
        setTimeout(() => {
          const cardEls = document.querySelectorAll('.mm-card');
          [idx1, idx2].forEach(i => {
            const el = cardEls[i];
            if (el) {
              const rect = el.getBoundingClientRect();
              spawnSparkleBurst(rect.left + rect.width/2, rect.top + rect.height/2, 6);
            }
          });
        }, 50);

        if (s.matchedPairs >= s.totalPairs) {
          // GAME COMPLETE!
          setTimeout(() => {
            playApplause(2.5);
            setTimeout(() => playPracticePerfectSound(), 400);
            spawnConfetti(50);
            setTimeout(() => renderMemoryMatchComplete(), 800);
          }, 600);
        } else {
          renderMemoryMatch();
        }
      }, 900); // Long enough to see both cards
    } else {
      // NO MATCH — give user time to memorize before flipping back
      setTimeout(() => playWrongSound(), 900);
      setTimeout(() => {
        card1.flipped = false;
        card2.flipped = false;
        s.flippedCards = [];
        s.locked = false;
        renderMemoryMatch();
      }, 1800); // Longer so user can memorize the cards
    }
  }
}

function renderMemoryMatchComplete() {
  const s = memoryState;
  if (!s) return;

  const elapsedSec = Math.round((Date.now() - s.startTime) / 1000);
  const minutes = Math.floor(elapsedSec / 60);
  const seconds = elapsedSec % 60;
  const timeText = minutes > 0 ? `${minutes}m ${seconds}s` : `${seconds}s`;

  // Award holy points based on performance
  // Base: 30 points. Less moves = more bonus.
  const perfectMoves = s.totalPairs; // 6 moves = perfect
  const bonusMoves = Math.max(0, perfectMoves * 2 - s.moves);
  const pointsEarned = 30 + (bonusMoves * 5);

  // Save points to student
  const student = getCurrentStudent();
  if (student && student.stats) {
    student.stats.totalPoints = (student.stats.totalPoints || 0) + pointsEarned;
    saveAllStudents();
  }

  let rating = '⭐';
  let ratingText = 'Good!';
  if (s.moves <= 8) { rating = '⭐⭐⭐'; ratingText = 'Excellent!'; }
  else if (s.moves <= 12) { rating = '⭐⭐'; ratingText = 'Very Good!'; }

  render(`
    <div class="result-screen">
      <div class="result-medal">🃏</div>
      <h1 class="result-title">Mini-Game Complete!</h1>
      <div class="result-tier" style="font-family: 'Pacifico', cursive; color: var(--pastel-pink-darker); font-size: 1.6rem;">${rating} ${ratingText}</div>

      <div style="margin: 20px 0; padding: 18px; background: linear-gradient(135deg, #fff 0%, var(--pastel-pink-light) 100%); border: 3px solid var(--pastel-pink); border-radius: 18px; box-shadow: 0 4px 0 var(--pastel-pink);">
        <div style="font-family: 'Quicksand', sans-serif; font-weight: 700; font-size: 1.05rem; color: var(--plum-deep); line-height: 1.8;">
          Pairs Matched: <strong>${s.totalPairs}/${s.totalPairs}</strong> ✨<br>
          Moves Used: <strong>${s.moves}</strong><br>
          Time: <strong>${timeText}</strong>
        </div>
      </div>

      <div style="margin: 20px 0; padding: 18px; background: linear-gradient(135deg, #fff, var(--pastel-yellow, #fef3c7)); border: 3px solid #fbbf24; border-radius: 20px; box-shadow: 0 0 30px rgba(251, 191, 36, 0.3), 0 4px 0 #fbbf24;">
        <div style="font-family: 'Quicksand', sans-serif; font-weight: 700; color: #d97706; font-size: 0.85rem; letter-spacing: 0.2em; margin-bottom: 8px;">✨ HOLY POINTS EARNED ✨</div>
        <div style="font-family: 'Pacifico', cursive; font-size: 3rem; color: #d97706; text-shadow: 2px 2px 0 #fef3c7;">+${pointsEarned}</div>
      </div>

      <div style="text-align: center; margin-top: 24px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;">
        <button class="btn" onclick="startMemoryMatch()">🔄 Play Again</button>
        <button class="btn btn-secondary" onclick="exitMemoryMatch()">← Back to Mini-Games</button>
      </div>
    </div>
  `);
}

  { en: 'Pope',         bs: 'Santo Papa' },

  { en: 'Priest',       bs: 'Pari' },

  { en: 'Soul',         bs: 'Kalag' },

  { en: 'Sin',          bs: 'Sala' }

let wordMatchState = null;

function startWordMatcher() {
  stopMp3Music();
  const pairs = shuffle(WORD_MATCH_PAIRS).slice(0, 6);
  wordMatchState = {
    pairs,
    leftColumn: shuffle(pairs.map((p, i) => ({ id: i, text: p.en }))),
    rightColumn: shuffle(pairs.map((p, i) => ({ id: i, text: p.bs }))),
    selectedLeft: null,
    selectedRight: null,
    matched: new Set(),
    moves: 0,
    startTime: Date.now()
  };
  renderWordMatcher();
}

function renderWordMatcher() {
  const s = wordMatchState;
  if (!s) return;

  const leftHtml = s.leftColumn.map(item => {
    const isMatched = s.matched.has(item.id);
    const isSelected = s.selectedLeft && s.selectedLeft.id === item.id;
    const cls = isMatched ? 'wm-matched' : isSelected ? 'wm-selected' : '';
    return `<button class="wm-card ${cls}" ${isMatched ? 'disabled' : ''} onclick="wmSelectLeft(${item.id})">${escapeHtml(item.text)}</button>`;
  }).join('');

  const rightHtml = s.rightColumn.map(item => {
    const isMatched = s.matched.has(item.id);
    const isSelected = s.selectedRight && s.selectedRight.id === item.id;
    const cls = isMatched ? 'wm-matched' : isSelected ? 'wm-selected wm-right' : 'wm-right';
    return `<button class="wm-card ${cls}" ${isMatched ? 'disabled' : ''} onclick="wmSelectRight(${item.id})">${escapeHtml(item.text)}</button>`;
  }).join('');

  const progress = Math.round((s.matched.size / s.pairs.length) * 100);

  render(`
    <button class="sound-toggle" onclick="toggleSounds(); renderWordMatcher();" title="Toggle Sounds">${soundsEnabled ? "🔊" : "🔇"}</button>
    <div class="quiz-screen">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; flex-wrap: wrap; gap: 8px;">
        <div style="font-family: 'Pacifico', cursive; font-size: 1.4rem; color: var(--pastel-pink-darker);">🔗 Word Matcher</div>
        <div style="font-family: 'Quicksand', sans-serif; font-weight: 700; color: var(--plum-deep); font-size: 0.95rem;">
          Matched: ${s.matched.size}/${s.pairs.length}
        </div>
      </div>

      <div class="progress-bar"><div class="progress-fill" style="width: ${progress}%"></div></div>

      <div style="background: linear-gradient(135deg, var(--pastel-lavender-light), var(--pastel-sky-light)); border: 2px dashed var(--pastel-lavender-deep); border-radius: 14px; padding: 10px 14px; margin: 12px 0; text-align: center; font-family: 'Quicksand', sans-serif; font-size: 0.9rem; color: var(--pastel-lavender-darker); font-weight: 700;">
        Tap an English word, then tap its Bisaya match!<br>
        <span style="font-size: 0.82rem; font-style: italic; font-weight: 500;">Tagboa ang English ug Bisaya</span>
      </div>

      <div class="wm-grid">
        <div class="wm-column">
          <div class="wm-header">English</div>
          ${leftHtml}
        </div>
        <div class="wm-column">
          <div class="wm-header">Bisaya</div>
          ${rightHtml}
        </div>
      </div>

      <div style="text-align: center; margin-top: 24px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;">
        <button class="btn btn-secondary" onclick="exitToMiniGamesHub()">← Quit</button>
        <button class="btn" onclick="startWordMatcher()" style="background: linear-gradient(180deg, #fff 0%, var(--pastel-sky-light) 100%); border-color: var(--pastel-sky); color: var(--plum-deep); box-shadow: 0 4px 0 var(--pastel-sky);">🔄 New Game</button>
      </div>
    </div>
  `);
}

function wmSelectLeft(id) {
  const s = wordMatchState;
  if (!s || s.matched.has(id)) return;
  playTapSound();
  const item = s.leftColumn.find(x => x.id === id);
  s.selectedLeft = item;
  if (s.selectedRight) wmCheckMatch();
  else renderWordMatcher();
}

function wmSelectRight(id) {
  const s = wordMatchState;
  if (!s || s.matched.has(id)) return;
  playTapSound();
  const item = s.rightColumn.find(x => x.id === id);
  s.selectedRight = item;
  if (s.selectedLeft) wmCheckMatch();
  else renderWordMatcher();
}

function wmCheckMatch() {
  const s = wordMatchState;
  if (!s || !s.selectedLeft || !s.selectedRight) return;
  s.moves++;

  if (s.selectedLeft.id === s.selectedRight.id) {
    // MATCH
    s.matched.add(s.selectedLeft.id);
    playCorrectSound();
    s.selectedLeft = null;
    s.selectedRight = null;
    renderWordMatcher();

    if (s.matched.size >= s.pairs.length) {
      // COMPLETE
      setTimeout(() => {
        const perfectMoves = s.pairs.length;
        const bonusMoves = Math.max(0, perfectMoves * 2 - s.moves);
        const points = 30 + bonusMoves * 5;
        renderMiniGameComplete({
          icon: '🔗',
          title: 'Word Matcher Complete!',
          score: s.pairs.length,
          total: s.pairs.length,
          percent: 100,
          points,
          message: `Moves: ${s.moves}`,
          restartFn: 'startWordMatcher'
        });
      }, 800);
    }
  } else {
    // NO MATCH
    playWrongSound();
    setTimeout(() => {
      s.selectedLeft = null;
      s.selectedRight = null;
      renderWordMatcher();
    }, 700);
  }
}

const SOCIETY_PAIRS = [

  { left: 'Members',           right: 'All baptized Catholics' },

  { left: 'Visible Head',      right: 'The Pope' },
  { left: 'Invisible Head',    right: 'Jesus Christ' },
  { left: 'Founded On',        right: 'St. Peter, the Rock' }
];

let societyState = null;

function startSocietyMatch() {
  stopMp3Music();
  const pairs = shuffle(SOCIETY_PAIRS).slice(0, 6);
  societyState = {
    pairs,
    leftColumn: shuffle(pairs.map((p, i) => ({ id: i, text: p.left }))),
    rightColumn: shuffle(pairs.map((p, i) => ({ id: i, text: p.right }))),
    selectedLeft: null,
    selectedRight: null,
    matched: new Set(),
    moves: 0
  };
  renderSocietyMatch();
}

function renderSocietyMatch() {
  const s = societyState;
  if (!s) return;

  const leftHtml = s.leftColumn.map(item => {
    const isMatched = s.matched.has(item.id);
    const isSelected = s.selectedLeft && s.selectedLeft.id === item.id;
    const cls = isMatched ? 'wm-matched' : isSelected ? 'wm-selected' : '';
    return `<button class="wm-card ${cls}" ${isMatched ? 'disabled' : ''} onclick="socSelectLeft(${item.id})">${escapeHtml(item.text)}</button>`;
  }).join('');

  const rightHtml = s.rightColumn.map(item => {
    const isMatched = s.matched.has(item.id);
    const isSelected = s.selectedRight && s.selectedRight.id === item.id;
    const cls = isMatched ? 'wm-matched' : isSelected ? 'wm-selected wm-right' : 'wm-right';
    return `<button class="wm-card ${cls}" ${isMatched ? 'disabled' : ''} onclick="socSelectRight(${item.id})">${escapeHtml(item.text)}</button>`;
  }).join('');

  const progress = Math.round((s.matched.size / s.pairs.length) * 100);

  render(`
    <button class="sound-toggle" onclick="toggleSounds(); renderSocietyMatch();">${soundsEnabled ? "🔊" : "🔇"}</button>
    <div class="quiz-screen">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; flex-wrap: wrap; gap: 8px;">
        <div style="font-family: 'Pacifico', cursive; font-size: 1.4rem; color: var(--pastel-pink-darker);">🛡️ Society Match</div>
        <div style="font-family: 'Quicksand', sans-serif; font-weight: 700;">Matched: ${s.matched.size}/${s.pairs.length}</div>
      </div>

      <div class="progress-bar"><div class="progress-fill" style="width: ${progress}%"></div></div>

      <div style="background: linear-gradient(135deg, var(--pastel-lavender-light), var(--pastel-sky-light)); border: 2px dashed var(--pastel-lavender-deep); border-radius: 14px; padding: 10px 14px; margin: 12px 0; text-align: center; font-family: 'Quicksand', sans-serif; font-size: 0.9rem; color: var(--pastel-lavender-darker); font-weight: 700;">
        Match each part of the Church to its description
      </div>

      <div class="wm-grid">
        <div class="wm-column">
          <div class="wm-header">Part</div>
          ${leftHtml}
        </div>
        <div class="wm-column">
          <div class="wm-header">Description</div>
          ${rightHtml}
        </div>
      </div>

      <div style="text-align: center; margin-top: 24px;">
        <button class="btn btn-secondary" onclick="exitToMiniGamesHub()">← Quit</button>
      </div>
    </div>
  `);
}

function socSelectLeft(id) {
  const s = societyState;
  if (!s || s.matched.has(id)) return;
  playTapSound();
  s.selectedLeft = s.leftColumn.find(x => x.id === id);
  if (s.selectedRight) socCheckMatch();
  else renderSocietyMatch();
}

function socSelectRight(id) {
  const s = societyState;
  if (!s || s.matched.has(id)) return;
  playTapSound();
  s.selectedRight = s.rightColumn.find(x => x.id === id);
  if (s.selectedLeft) socCheckMatch();
  else renderSocietyMatch();
}

function socCheckMatch() {
  const s = societyState;
  s.moves++;
  if (s.selectedLeft.id === s.selectedRight.id) {
    s.matched.add(s.selectedLeft.id);
    playCorrectSound();
    s.selectedLeft = null;
    s.selectedRight = null;
    renderSocietyMatch();

    if (s.matched.size >= s.pairs.length) {
      setTimeout(() => {
        const points = 30 + Math.max(0, (s.pairs.length * 2 - s.moves)) * 5;
        renderMiniGameComplete({
          icon: '🛡️',
          title: 'Society Match Complete!',
          score: s.pairs.length,
          total: s.pairs.length,
          percent: 100,
          points,
          message: `Moves: ${s.moves}`,
          restartFn: 'startSocietyMatch'
        });
      }, 800);
    }
  } else {
    playWrongSound();
    setTimeout(() => {
      s.selectedLeft = null;
      s.selectedRight = null;
      renderSocietyMatch();
    }, 700);
  }
}

}

function renderPrayerBuilder() {
  const s = prayerState;
  if (!s) return;

  const wordsHtml = s.shuffledWords.map(w => {
    if (w.used) {
      return `<button class="pb-word pb-used" disabled>${escapeHtml(w.text)}</button>`;
    }
    return `<button class="pb-word" onclick="pbTapWord(${w.id})">${escapeHtml(w.text)}</button>`;
  }).join(' ');

  const builtHtml = s.builtSentence.length > 0
    ? s.builtSentence.map(w => `<span class="pb-built-word">${escapeHtml(w)}</span>`).join(' ')
    : '<span style="font-style: italic; color: var(--pastel-lavender-darker);">Tap words below to build the prayer...</span>';

  const progress = Math.round((s.builtSentence.length / s.correctOrder.length) * 100);

  render(`
    <button class="sound-toggle" onclick="toggleSounds(); renderPrayerBuilder();">${soundsEnabled ? "🔊" : "🔇"}</button>
    <div class="quiz-screen">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; flex-wrap: wrap; gap: 8px;">
        <div style="font-family: 'Pacifico', cursive; font-size: 1.4rem; color: var(--pastel-pink-darker);">🙏 Prayer Builder</div>
        <div style="font-family: 'Quicksand', sans-serif; font-weight: 700;">Mistakes: ${s.mistakes}</div>
      </div>

      <div class="progress-bar"><div class="progress-fill" style="width: ${progress}%"></div></div>

      <div style="background: linear-gradient(135deg, #fff, var(--pastel-pink-light)); border: 3px solid var(--pastel-pink); border-radius: 18px; padding: 16px; margin: 14px 0; text-align: center;">
        <div style="font-family: 'Pacifico', cursive; color: var(--pastel-pink-darker); font-size: 1.4rem;">${escapeHtml(s.prayer.name)}</div>
        <div style="font-family: 'Quicksand', sans-serif; font-style: italic; color: var(--pastel-lavender-darker); font-size: 0.85rem;">${escapeHtml(s.prayer.nameBs)}</div>
      </div>

      <div style="background: linear-gradient(135deg, var(--pastel-lavender-light), #fff); border: 3px dashed var(--pastel-lavender-deep); border-radius: 18px; padding: 18px; margin: 14px 0; min-height: 80px; line-height: 2; font-family: 'Quicksand', sans-serif; font-weight: 700; color: var(--plum-deep); font-size: 1.05rem;">
        ${builtHtml}
      </div>

      <div style="background: linear-gradient(135deg, #fff, var(--pastel-sky-light)); border: 2px dashed var(--pastel-sky); border-radius: 14px; padding: 14px; margin: 14px 0; line-height: 2.4; text-align: center;">
        ${wordsHtml}
      </div>

      <div style="text-align: center; margin-top: 24px;">
        <button class="btn btn-secondary" onclick="exitToMiniGamesHub()">← Quit</button>
        <button class="btn" onclick="startPrayerBuilder()" style="background: linear-gradient(180deg, #fff 0%, var(--pastel-sky-light) 100%); border-color: var(--pastel-sky); color: var(--plum-deep);">🔄 New Prayer</button>
      </div>
    </div>
  `);
}

function pbTapWord(wordId) {
  const s = prayerState;
  if (!s) return;
  const word = s.shuffledWords.find(w => w.id === wordId);
  if (!word || word.used) return;

  const expectedNext = s.correctOrder[s.builtSentence.length];

  if (word.text === expectedNext) {
    // CORRECT word in order
    word.used = true;
    s.builtSentence.push(word.text);
    playTapSound();
    renderPrayerBuilder();

    if (s.builtSentence.length >= s.correctOrder.length) {
      // COMPLETE
      setTimeout(() => {
        const total = s.correctOrder.length;
        const percent = s.mistakes === 0 ? 100 : Math.max(50, 100 - s.mistakes * 10);
        const points = percent === 100 ? 50 : percent >= 75 ? 30 : 15;
        renderMiniGameComplete({
          icon: '🙏',
          title: 'Prayer Built!',
          score: total - s.mistakes,
          total,
          percent,
          points,
          message: `${s.prayer.name} • Mistakes: ${s.mistakes}`,
          restartFn: 'startPrayerBuilder'
        });
      }, 600);
    }
  } else {
    // WRONG word
    s.mistakes++;
    playWrongSound();
    // Brief shake feedback (just re-render with visual hint)
    renderPrayerBuilder();
  }
}

  { order: 6,  name: 'Moses and the Exodus',       bs: 'Si Moises ug ang Exodo',   emoji: '🐑' },
  { order: 7,  name: 'Ten Commandments',           bs: 'Napulo ka Sugo',           emoji: '📜' },

  { order: 10, name: 'Birth of Jesus',             bs: 'Pagkatawo ni Hesus',       emoji: '👶' }
];

let otState = null;

function startOtTimeline() {
  stopMp3Music();
  // Pick 6 random events, then shuffle them for the player to sort
  const selected = shuffle(OT_EVENTS.slice()).slice(0, 6).sort((a, b) => a.order - b.order);
  otState = {
    correctOrder: selected,
    shuffled: shuffle(selected.slice()).map((e, idx) => ({ ...e, currentIdx: idx })),
    placed: [],
    mistakes: 0
  };
  renderOtTimeline();
}

function renderOtTimeline() {
  const s = otState;
  if (!s) return;

  const remaining = s.shuffled.filter(e => !s.placed.find(p => p.order === e.order));

  const placedHtml = s.placed.length > 0
    ? s.placed.map((e, i) => `
        <div style="display: flex; align-items: center; gap: 12px; background: linear-gradient(135deg, #fff, var(--pastel-mint, #a7f3d0)); border: 2px solid var(--pastel-mint-deep, #10b981); border-radius: 14px; padding: 10px 14px; margin: 6px 0;">
          <span style="font-family: 'Pacifico', cursive; color: var(--pastel-mint-deep, #047857); font-size: 1.4rem; min-width: 32px;">${i + 1}.</span>
          <span style="font-size: 1.6rem;">${e.emoji}</span>
          <span style="flex: 1; font-family: 'Quicksand', sans-serif; font-weight: 700; color: var(--plum-deep);">${escapeHtml(e.name)}</span>
        </div>
      `).join('')
    : '<div style="font-style: italic; color: var(--pastel-lavender-darker); text-align: center; padding: 20px;">Tap events below in chronological order ⬇</div>';

  const remainingHtml = remaining.map(e => `
    <button onclick="otTapEvent(${e.order})" style="display: flex; align-items: center; gap: 10px; padding: 12px 14px; background: linear-gradient(135deg, #fff, var(--pastel-pink-light)); border: 3px solid var(--pastel-pink); border-radius: 14px; cursor: pointer; font-family: 'Quicksand', sans-serif; box-shadow: 0 3px 0 var(--pastel-pink); width: 100%; text-align: left; margin: 6px 0;">
      <span style="font-size: 1.6rem;">${e.emoji}</span>
      <div style="flex: 1;">
        <div style="font-weight: 700; color: var(--plum-deep);">${escapeHtml(e.name)}</div>
        <div style="font-style: italic; color: var(--pastel-lavender-darker); font-size: 0.78rem;">${escapeHtml(e.bs)}</div>
      </div>
    </button>
  `).join('');

  const progress = Math.round((s.placed.length / s.correctOrder.length) * 100);

  render(`
    <button class="sound-toggle" onclick="toggleSounds(); renderOtTimeline();">${soundsEnabled ? "🔊" : "🔇"}</button>
    <div class="quiz-screen">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; flex-wrap: wrap; gap: 8px;">
        <div style="font-family: 'Pacifico', cursive; font-size: 1.4rem; color: var(--pastel-pink-darker);">🌳 OT Timeline</div>
        <div style="font-family: 'Quicksand', sans-serif; font-weight: 700;">Mistakes: ${s.mistakes}</div>
      </div>

      <div class="progress-bar"><div class="progress-fill" style="width: ${progress}%"></div></div>

      <div style="background: linear-gradient(135deg, var(--pastel-lavender-light), var(--pastel-sky-light)); border: 2px dashed var(--pastel-lavender-deep); border-radius: 14px; padding: 10px 14px; margin: 12px 0; text-align: center; font-family: 'Quicksand', sans-serif; font-size: 0.88rem; color: var(--pastel-lavender-darker); font-weight: 700;">
        Tap events in chronological order (oldest first)
      </div>

      <div style="margin: 14px 0;">
        <div style="font-family: 'Quicksand', sans-serif; font-weight: 700; color: var(--plum-deep); margin-bottom: 6px;">📜 Timeline:</div>
        ${placedHtml}
      </div>

      ${remaining.length > 0 ? `
        <div style="margin: 14px 0;">
          <div style="font-family: 'Quicksand', sans-serif; font-weight: 700; color: var(--plum-deep); margin-bottom: 6px;">⬇ Pick what comes next:</div>
          ${remainingHtml}
        </div>
      ` : ''}

      <div style="text-align: center; margin-top: 24px;">
        <button class="btn btn-secondary" onclick="exitToMiniGamesHub()">← Quit</button>
      </div>
    </div>
  `);
}

function otTapEvent(orderNum) {
  const s = otState;
  if (!s) return;
  const event = s.shuffled.find(e => e.order === orderNum);
  if (!event || s.placed.find(p => p.order === orderNum)) return;

  // Determine the next expected event in correct order
  const nextExpected = s.correctOrder[s.placed.length];

  if (event.order === nextExpected.order) {
    // CORRECT
    s.placed.push(event);
    playCorrectSound();
    renderOtTimeline();

    if (s.placed.length >= s.correctOrder.length) {
      setTimeout(() => {
        const total = s.correctOrder.length;
        const percent = s.mistakes === 0 ? 100 : Math.max(50, 100 - s.mistakes * 10);
        const points = percent === 100 ? 50 : percent >= 75 ? 30 : 15;
        renderMiniGameComplete({
          icon: '🌳',
          title: 'Timeline Complete!',
          score: total - s.mistakes,
          total,
          percent,
          points,
          message: `Mistakes: ${s.mistakes}`,
          restartFn: 'startOtTimeline'
        });
      }, 600);
    }
  } else {
    // WRONG
    s.mistakes++;
    playWrongSound();
    renderOtTimeline();
  }
}

// Play Ate MJ's recorded narration of a Mary story
// Looks for files like mary-guadalupe-medium-bs.m4a in the same folder as index.html
let maryStoryAudio = null;
let maryStoryAudioPlaying = null; // tracks which clip is playing

function playMaryStoryAudio(titleId, difficulty, lang) {
  const btnId = `mary-audio-btn-${titleId}-${difficulty}-${lang}`;
  const btn = document.getElementById(btnId);

  // If something is already playing, stop it first
  if (maryStoryAudio && !maryStoryAudio.paused) {
    maryStoryAudio.pause();
    maryStoryAudio.currentTime = 0;
    // Reset previous button label
    if (maryStoryAudioPlaying) {
      const prevBtn = document.getElementById(maryStoryAudioPlaying);
      if (prevBtn) prevBtn.innerHTML = '🔊 Listen';
    }
    // If user tapped the SAME button, just stop and exit
    if (maryStoryAudioPlaying === btnId) {
      maryStoryAudioPlaying = null;
      return;
    }
  }

  // Pause background music while listening to story
  stopMp3Music();

  // Try to load the audio file (try .m4a, .mp3, .wav extensions)
  const filename = `mary-${titleId}-${difficulty}-${lang}`;
  const extensions = ['m4a', 'mp3', 'wav'];

  let extIdx = 0;
  function tryNext() {
    if (extIdx >= extensions.length) {
      // No file found in any format
      showAudioComingSoon();
      // Resume background music since story didn't play
      if (ambientEnabled && soundsEnabled && firstInteractionDone) playMp3Music();
      return;
    }
    const path = `${filename}.${extensions[extIdx]}`;
    maryStoryAudio = new Audio(path);
    maryStoryAudio.volume = 1.0;

    maryStoryAudio.addEventListener('error', () => {
      extIdx++;
      tryNext();
    }, { once: true });

    maryStoryAudio.addEventListener('canplay', () => {
      // File loaded — actually play it
      maryStoryAudioPlaying = btnId;
      if (btn) btn.innerHTML = '⏸ Stop';
      maryStoryAudio.play().catch(err => {
        console.log('Audio play failed:', err);
        showAudioComingSoon();
        if (btn) btn.innerHTML = '🔊 Listen';
        maryStoryAudioPlaying = null;
        if (ambientEnabled && soundsEnabled && firstInteractionDone) playMp3Music();
      });
    }, { once: true });

    maryStoryAudio.addEventListener('ended', () => {
      if (btn) btn.innerHTML = '🔊 Listen';
      maryStoryAudioPlaying = null;
      // Resume background music after story ends
      if (ambientEnabled && soundsEnabled && firstInteractionDone) playMp3Music();
    }, { once: true });
  }
  tryNext();
}

function medMatchSelectFact(id) {
  const s = window.medMatchState;
  if (!s || s.matched.has(id)) return;
  playTapSound();
  // Clear previous fact selection
  document.querySelectorAll('.med-mary-fact').forEach(el => el.style.transform = '');
  const el = document.getElementById('med-fact-' + id);
  if (el) el.style.transform = 'scale(1.04)';
  s.selectedFact = id;
  if (s.selectedIcon !== null) medMatchCheck();
}

function medMatchSelectIcon(id) {
  const s = window.medMatchState;
  if (!s || s.matched.has(id)) return;
  playTapSound();
  document.querySelectorAll('.med-mary-icon').forEach(el => el.style.transform = '');
  const el = document.getElementById('med-icon-' + id);
  if (el) el.style.transform = 'scale(1.1)';
  s.selectedIcon = id;
  if (s.selectedFact !== null) medMatchCheck();
}

function medMatchCheck() {
  const s = window.medMatchState;
  if (s.selectedFact === s.selectedIcon) {
    s.matched.add(s.selectedFact);
    playCorrectSound();
    const factEl = document.getElementById('med-fact-' + s.selectedFact);
    const iconEl = document.getElementById('med-icon-' + s.selectedIcon);
    if (factEl) { factEl.style.opacity = '0.5'; factEl.style.background = '#d1fae5'; factEl.disabled = true; }
    if (iconEl) { iconEl.style.opacity = '0.5'; iconEl.style.background = '#d1fae5'; iconEl.disabled = true; }
    s.selectedFact = null;
    s.selectedIcon = null;
    if (s.matched.size >= s.items.length) {
      setTimeout(() => awardSticker(s.titleId, 'medium'), 600);
    }
  } else {
    playWrongSound();
    setTimeout(() => {
      document.querySelectorAll('.med-mary-fact, .med-mary-icon').forEach(el => el.style.transform = '');
      s.selectedFact = null;
      s.selectedIcon = null;
    }, 700);
  }
}

// HARD: Multiple choice quiz
function renderMaryActivityHard(title) {
  // Build 4 questions from facts
  const questions = [
    {
      q: `Where did ${title.name} appear or originate?`,
      qBs: `Asa mipakita o naggikan ang ${title.nameBs}?`,
      correct: title.location,
      distractors: MARY_TITLES.filter(t => t.id !== title.id).map(t => t.location).slice(0, 3)
    },
    {
      q: title.facts[0].replace(/^[^a-zA-Z]*/, '').replace(/^(.*?)(?:[A-Z][a-z]+\s)?(?=[A-Z])/, '').includes('appeared')
        ? `Who saw ${title.name}?`
        : `Which of these is true about ${title.name}?`,
      qBs: '',
      correct: title.facts[0],
      distractors: MARY_TITLES.filter(t => t.id !== title.id).map(t => t.facts[0]).slice(0, 3)
    },
    {
      q: `What is the feast day of ${title.name}?`,
      qBs: '',
      correct: title.facts.find(f => f.includes('Feast Day')) || title.facts[3],
      distractors: MARY_TITLES.filter(t => t.id !== title.id).map(t => t.facts.find(f => f.includes('Feast Day')) || t.facts[3]).slice(0, 3)
    }
  ];

  // Initialize state
  window.maryHardState = {
    titleId: title.id,
    questions,
    currentIdx: 0,
    score: 0
  };
  renderMaryHardQuestion();
}

function renderMaryHardQuestion() {
  const s = window.maryHardState;
  if (!s) return;
  const title = MARY_TITLES.find(t => t.id === s.titleId);

  if (s.currentIdx >= s.questions.length) {
    // Complete
    const passed = s.score >= Math.ceil(s.questions.length * 0.66);
    if (passed) {
      setTimeout(() => awardSticker(s.titleId, 'hard'), 400);
    } else {
      // Did not pass — show retry
      render(`
        <div class="home" style="background: linear-gradient(180deg, #fff 0%, ${title.bgColor} 100%); border-radius: 22px; padding: 22px 16px; text-align: center;">
          <div style="font-size: 3rem;">📖 ✨</div>
          <h1 style="font-family: 'Pacifico', cursive; color: ${title.accentColor}; font-size: 1.6rem;">Almost there!</h1>
          <p style="font-family: 'Quicksand', sans-serif; color: var(--plum-deep); margin: 14px 0;">Score: ${s.score}/${s.questions.length}</p>
          <p style="font-family: 'Caveat', cursive; color: var(--pastel-lavender-darker); font-size: 1.3rem;">Read the story again and try once more!</p>
          <button onclick="renderMaryTitleStory('${s.titleId}')" class="btn" style="margin: 14px 8px;">📖 Read Story</button>
          <button onclick="renderMaryActivityHard(MARY_TITLES.find(t => t.id === '${s.titleId}'))" class="btn">🔄 Try Again</button>
        </div>
      `);
    }
    return;
  }

  const q = s.questions[s.currentIdx];
  const choices = shuffle([q.correct, ...q.distractors]);

  const choicesHtml = choices.map(c => `
    <button onclick="answerMaryHard('${escapeHtml(c).replace(/'/g, "\\'")}')" style="display: block; width: 100%; padding: 14px; background: linear-gradient(135deg, #fff, ${title.bgColor}); border: 3px solid ${title.accentColor}; border-radius: 14px; margin: 6px 0; cursor: pointer; font-family: 'Quicksand', sans-serif; font-weight: 700; color: var(--plum-deep); font-size: 0.92rem; text-align: left; box-shadow: 0 3px 0 ${title.accentColor};">
      ${escapeHtml(c)}
    </button>
  `).join('');

  render(`
    <div class="home" style="background: linear-gradient(180deg, #fff 0%, ${title.bgColor} 100%); border-radius: 22px; padding: 22px 16px;">
      <button onclick="renderMaryTitleStory('${title.id}')" style="background: rgba(255,255,255,0.85); border: 2px solid ${title.accentColor}; color: ${title.accentColor}; font-family: 'Quicksand', sans-serif; font-weight: 700; padding: 8px 14px; border-radius: 14px; cursor: pointer; font-size: 0.85rem; margin-bottom: 12px;">← Back to Story</button>

      <div style="text-align: center; margin-bottom: 12px;">
        <div style="font-size: 2.5rem;">⭐ ${title.emoji}</div>
        <p style="font-family: 'Quicksand', sans-serif; font-weight: 700; color: ${title.accentColor};">Question ${s.currentIdx + 1} of ${s.questions.length}</p>
      </div>

      <div style="background: linear-gradient(135deg, #fff, var(--pastel-lavender-light)); border: 3px solid var(--pastel-lavender-deep); border-radius: 16px; padding: 18px; margin: 14px 0; text-align: center;">
        <p style="font-family: 'Quicksand', sans-serif; font-weight: 700; color: var(--plum-deep); font-size: 1.05rem; line-height: 1.5;">${escapeHtml(q.q)}</p>
      </div>

      ${choicesHtml}
    </div>
  `);
}

function answerMaryHard(answer) {
  const s = window.maryHardState;
  if (!s) return;
  const q = s.questions[s.currentIdx];
  const correct = answer === q.correct;
  if (correct) {
    s.score++;
    playCorrectSound();
  } else {
    playWrongSound();
  }
  // Quick feedback then next
  const fb = document.createElement('div');
  fb.innerHTML = `
    <div style="position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 200; background: ${correct ? '#d1fae5' : '#fee2e2'}; border: 4px solid ${correct ? '#10b981' : '#dc2626'}; border-radius: 20px; padding: 20px 28px; text-align: center; box-shadow: 0 0 40px rgba(0,0,0,0.3); font-family: 'Quicksand', sans-serif;">
      <div style="font-size: 3rem; margin-bottom: 6px;">${correct ? '✅' : '❌'}</div>
      <div style="font-weight: 700; color: ${correct ? '#047857' : '#b91c1c'}; font-size: 1.1rem;">${correct ? 'Correct!' : 'Not quite!'}</div>
    </div>
  `;
  document.body.appendChild(fb);
  setTimeout(() => {
    fb.remove();
    s.currentIdx++;
    renderMaryHardQuestion();
  }, 1100);
}

  if (!activeStudent) return renderWhoIsPlaying();

function shareToWhatsApp() {
  const text = encodeURIComponent(SHARE_TEXT + '\n\n' + SHARE_URL);
  window.open(`https://wa.me/?text=${text}`, '_blank');
}

function copyShareLink() {
  copyToClipboard(SHARE_TEXT + '\n\n' + SHARE_URL);
  showShareToast('Link copied! Paste anywhere 📋');
}

function copyToClipboard(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).catch(() => fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); } catch(e) {}
  document.body.removeChild(ta);
}

function showShareToast(msg) {
  // Remove any existing toast
  const existing = document.querySelector('.share-toast');
  if (existing) existing.remove();

  const toast = document.createElement('div');
  toast.className = 'share-toast';
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => {
    toast.style.transition = 'opacity 0.4s ease';
    toast.style.opacity = '0';
    setTimeout(() => toast.remove(), 400);
  }, 2400);
}
