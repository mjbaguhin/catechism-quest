<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#5a0e0e" />
<title>Catechism Quest ✨ Sunday Class Adventure</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=Caveat:wght@600;700&family=Fredoka:wght@400;600&family=Pacifico&family=Quicksand:wght@400;500;600;700&family=Comfortaa:wght@400;700&display=swap" rel="stylesheet">
<style>
/* ============================================
   CATECHISM QUEST — Kids' Edition
   Stained-glass cathedral aesthetic + playful kid energy
============================================ */

:root {
  /* Soft Pastel Sky theme - sweet, gentle, princess-meets-chapel */
  --pastel-pink: #f9a8d4;
  --pastel-pink-light: #fce7f3;
  --pastel-pink-deep: #ec4899;
  --pastel-pink-darker: #be185d;
  --pastel-lavender: #c4b5fd;
  --pastel-lavender-light: #ede9fe;
  --pastel-lavender-deep: #a855f7;
  --pastel-lavender-darker: #7e22ce;
  --pastel-sky: #bfdbfe;
  --pastel-sky-light: #dbeafe;
  --pastel-sky-deep: #3b82f6;
  --pastel-sky-darker: #1d4ed8;
  --pastel-mint: #a7f3d0;
  --pastel-mint-deep: #10b981;
  --pastel-peach: #fed7aa;
  --pastel-peach-deep: #fb923c;
  --pastel-yellow: #fef3c7;
  --pastel-yellow-deep: #fbbf24;
  --plum-deep: #581c87;
  --plum: #9d174d;
  --rose-text: #be185d;
  --cream-bg: #fefcff;
  --cream-warm: #fff5fa;

  /* Backwards-compat aliases */
  --night-deepest: #fef9ff;
  --night-deep: #fdf2f8;
  --night-mid: #fce7f3;
  --night-light: #f9a8d4;
  --indigo-glow: #c4b5fd;
  --gold: #fbbf24;
  --gold-deep: #d97706;
  --gold-glow: #fde68a;
  --gold-pale: #581c87;
  --cream: #581c87;
  --crimson: #ec4899;
  --crimson-deep: #be185d;
  --ruby: #ec4899;
  --sapphire: #3b82f6;
  --sapphire-light: #93c5fd;
  --emerald: #10b981;
  --emerald-light: #6ee7b7;
  --amethyst: #a855f7;
  --amethyst-light: #c4b5fd;
  --rose: #ec4899;
  --rose-light: #f9a8d4;
  --orange: #fb923c;
  --orange-deep: #ea580c;
  --parchment: #fefcff;
  --parchment-dark: #fce7f3;
  --ink: #581c87;
  --ink-soft: #9d174d;
  --sky: #60a5fa;
  --sky-deep: #2563eb;
  --sky-light: #bfdbfe;
  --leaf: #10b981;
  --leaf-deep: #047857;
  --leaf-light: #a7f3d0;
  --violet: #a855f7;
  --violet-deep: #7e22ce;
  --violet-light: #c4b5fd;
  --shadow: rgba(190, 24, 93, 0.15);
  --shadow-strong: rgba(124, 58, 237, 0.25);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  overflow-x: hidden;
}

body {
  font-family: 'Quicksand', 'Fredoka', sans-serif;
  color: var(--plum-deep);
  min-height: 100vh;
  padding: 16px;
  position: relative;
  /* Soft pastel sky gradient */
  background:
    radial-gradient(ellipse at 20% 10%, rgba(249, 168, 212, 0.5) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 90%, rgba(191, 219, 254, 0.6) 0%, transparent 50%),
    radial-gradient(ellipse at 60% 30%, rgba(196, 181, 253, 0.4) 0%, transparent 50%),
    linear-gradient(135deg, #fce7f3 0%, #ede9fe 50%, #dbeafe 100%);
  background-attachment: fixed;
}

/* Floating sparkle dots */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    radial-gradient(2px 2px at 15% 25%, rgba(236, 72, 153, 0.5), transparent),
    radial-gradient(1.5px 1.5px at 35% 45%, rgba(168, 85, 247, 0.5), transparent),
    radial-gradient(2px 2px at 55% 15%, rgba(96, 165, 250, 0.5), transparent),
    radial-gradient(1.5px 1.5px at 75% 35%, rgba(236, 72, 153, 0.4), transparent),
    radial-gradient(2px 2px at 88% 55%, rgba(168, 85, 247, 0.4), transparent),
    radial-gradient(1px 1px at 25% 75%, rgba(96, 165, 250, 0.5), transparent),
    radial-gradient(2px 2px at 65% 85%, rgba(236, 72, 153, 0.4), transparent),
    radial-gradient(1.5px 1.5px at 45% 65%, rgba(168, 85, 247, 0.5), transparent),
    radial-gradient(2px 2px at 90% 90%, rgba(96, 165, 250, 0.4), transparent);
  pointer-events: none;
  z-index: 0;
  animation: sparkleFloat 5s ease-in-out infinite;
}

@keyframes sparkleFloat {
  0%, 100% { opacity: 0.6; transform: translateY(0); }
  50% { opacity: 1; transform: translateY(-8px); }
}

/* Soft cloud-like glow */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at 30% 70%, rgba(255, 255, 255, 0.4) 0%, transparent 30%),
    radial-gradient(circle at 70% 20%, rgba(255, 255, 255, 0.3) 0%, transparent 25%);
  pointer-events: none;
  z-index: 0;
  animation: cloudDrift 12s ease-in-out infinite alternate;
}

@keyframes cloudDrift {
  from { transform: translate(0, 0); }
  to { transform: translate(-30px, 15px); }
}

.app {
  position: relative;
  z-index: 2;
  max-width: 800px;
  margin: 0 auto;
}

/* ============================================
   FLOATING SPARKLES (background animation)
============================================ */
.sparkle {
  position: fixed;
  pointer-events: none;
  z-index: 1;
  font-size: 1.2rem;
  animation: floatUp 8s linear infinite;
  opacity: 0;
}

@keyframes floatUp {
  0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 1; }
  100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
}

/* ============================================
   HOME SCREEN
============================================ */
.home {
  text-align: center;
  padding: 20px 10px;
  animation: fadeInUp 0.6s ease-out;
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* CREST/LOGO with animated rays */
.crest-container {
  position: relative;
  width: 180px;
  height: 180px;
  margin: 10px auto 20px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.crest-rays {
  position: absolute;
  inset: -20px;
  z-index: 0;
  animation: rotateRays 30s linear infinite;
}

@keyframes rotateRays {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

.crest-svg {
  position: relative;
  z-index: 1;
  filter: drop-shadow(0 6px 12px var(--shadow-strong));
  animation: gentleBob 4s ease-in-out infinite;
}

@keyframes gentleBob {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}

/* TITLE */
.title {
  font-family: 'Pacifico', cursive;
  font-weight: 400;
  font-size: clamp(2.4rem, 8vw, 4rem);
  background: linear-gradient(90deg, var(--pastel-pink-deep) 0%, var(--pastel-lavender-deep) 50%, var(--pastel-sky-deep) 100%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: 0.01em;
  margin-bottom: 8px;
  line-height: 1.2;
  filter: drop-shadow(0 2px 4px rgba(190, 24, 93, 0.2));
  animation: titleGlow 3s ease-in-out infinite alternate;
}

@keyframes titleGlow {
  from {
    filter: drop-shadow(0 2px 4px rgba(190, 24, 93, 0.2)) drop-shadow(0 0 8px rgba(236, 72, 153, 0.3));
    transform: scale(1);
  }
  to {
    filter: drop-shadow(0 4px 8px rgba(190, 24, 93, 0.3)) drop-shadow(0 0 16px rgba(236, 72, 153, 0.5));
    transform: scale(1.02);
  }
}

.subtitle {
  font-family: 'Caveat', cursive;
  font-weight: 700;
  font-size: 1.7rem;
  color: var(--pastel-pink-darker);
  margin-bottom: 25px;
  text-shadow: 0 2px 4px rgba(190, 24, 93, 0.15);
}

/* ORNAMENTAL DIVIDER */
.divider {
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 25px auto;
  max-width: 320px;
  gap: 12px;
}

.divider::before, .divider::after {
  content: '';
  flex: 1;
  height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold-deep), transparent);
}

.divider-icon {
  font-size: 1.4rem;
  color: var(--gold-deep);
  filter: drop-shadow(0 1px 2px var(--shadow));
}

/* COMPACT HEADER — crest INLINE with title for desktop categories home */
.compact-header {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  margin: 0 auto;
  max-width: 700px;
  padding: 0;
}
.compact-crest {
  display: inline-block;
  transform: scale(0.32);
  transform-origin: center;
  width: 60px;
  height: 60px;
  margin: -55px -30px;
  flex-shrink: 0;
}
.compact-titles {
  text-align: left;
  flex: 1;
  min-width: 0;
}
.compact-title {
  font-size: clamp(1.5rem, 3vw, 2rem) !important;
  margin: 0 !important;
  line-height: 1.1 !important;
}
.compact-subtitle {
  font-size: 0.82rem !important;
  margin: 0 !important;
  opacity: 0.85;
}
@media (max-width: 480px) {
  .compact-header { flex-direction: column; gap: 0; }
  .compact-titles { text-align: center; }
  .compact-crest { margin: -50px 0 -25px; }
}

/* CATEGORY GRID — responsive 2-column on desktop, 1-column mobile */
.category-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 14px;
  max-width: 1100px;
  margin: 0 auto;
}

@media (min-width: 760px) {
  .category-grid {
    grid-template-columns: 1fr 1fr;
  }
  .category-grid > button,
  .category-grid > div {
    margin: 0 !important;
  }
}

/* ============================================
   UNIVERSAL DESKTOP COMPACT OVERRIDES
   Mobile (< 760px) keeps existing sizes
   Desktop (>= 760px) gets compact treatment
   Goal: content visible without scrolling, no oversized headers
============================================ */

/* Remove ugly bullet dots from all lists — emojis ARE the bullets */
.home ul {
  list-style: none !important;
  padding-left: 0 !important;
}
.home ul li {
  padding-left: 4px;
  margin-bottom: 4px;
}

@media (min-width: 760px) {
  /* Reduce top padding everywhere */
  .home {
    padding: 12px 18px !important;
    max-width: 1100px;
    margin: 0 auto;
  }

  /* Cap large emoji rows (those big 4rem emoji headers) */
  .home > div > div[style*="font-size: 4rem"],
  .home > div[style*="font-size: 4rem"] {
    font-size: 2.4rem !important;
    margin-bottom: 4px !important;
  }

  /* Big inline emoji-row decorations like 🌹💙✨ or 🕰️⛪📿 */
  .home div[style*="font-size: 4rem"] {
    font-size: 2.2rem !important;
  }

  /* Sub-page Pacifico titles inside .home (the big script titles) */
  .home h1[style*="font-family: 'Pacifico'"],
  .home h1[style*="Pacifico"] {
    font-size: 1.8rem !important;
    margin: 4px 0 !important;
    line-height: 1.15 !important;
  }
  .home h2[style*="font-family: 'Pacifico'"],
  .home h2[style*="Pacifico"] {
    font-size: 1.4rem !important;
    margin: 8px 0 4px !important;
  }

  /* Caveat subtitles */
  .home p[style*="font-family: 'Caveat'"] {
    font-size: 1.05rem !important;
  }

  /* "What Will I Learn?" / intro boxes — reduce padding */
  .home > div[style*="margin: 18px 0"] {
    margin: 10px 0 !important;
  }

  /* Difficulty card grid — Bunso / Manghud / Magulang side-by-side */
  /* These cards have margin: 12px 0 + flex column display by default */
  .difficulty-grid {
    display: grid !important;
    grid-template-columns: repeat(3, 1fr) !important;
    gap: 12px !important;
    margin: 12px 0 !important;
  }
  .difficulty-grid > button {
    margin: 0 !important;
    padding: 16px 12px !important;
  }

  /* Reduce huge emoji on difficulty cards */
  .difficulty-grid > button > div[style*="font-size: 3rem"] {
    font-size: 2rem !important;
  }

  /* Reduce padding on inner content cards */
  .home button[style*="padding: 22px 18px"] {
    padding: 16px 14px !important;
  }

  /* Section dividers: reduce visual weight */
  .home > div[style*="margin: 16px 0"] {
    margin: 10px 0 !important;
  }
  .home > div[style*="margin: 14px 0"] {
    margin: 10px 0 !important;
  }

  /* Tighten sub-page back buttons */
  .home > div[style*="text-align: center; margin-bottom: 14px"] {
    margin-bottom: 8px !important;
  }
}

/* On VERY wide desktops, prevent content from sprawling too wide */
@media (min-width: 1200px) {
  .home {
    max-width: 1100px;
  }
}

/* WELCOME CARD */
.welcome-card {
  background: linear-gradient(135deg, #fff 0%, var(--pastel-pink-light) 100%);
  border: 3px solid var(--pastel-pink);
  border-radius: 24px;
  padding: 26px 22px;
  margin: 20px auto;
  max-width: 520px;
  box-shadow:
    0 0 0 4px rgba(255, 255, 255, 0.6) inset,
    0 8px 24px rgba(236, 72, 153, 0.15),
    0 0 30px rgba(196, 181, 253, 0.2);
  position: relative;
  overflow: hidden;
  color: var(--plum-deep);
}

.welcome-card::before {
  content: '';
  position: absolute;
  top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: radial-gradient(circle, rgba(245, 200, 66, 0.15) 0%, transparent 50%);
  animation: cardShimmer 6s ease-in-out infinite;
  pointer-events: none;
}

@keyframes cardShimmer {
  0%, 100% { transform: translate(-50%, -50%) rotate(0deg); }
  50% { transform: translate(-50%, -50%) rotate(180deg); }
}

.welcome-card > * { position: relative; z-index: 1; }

.welcome-card .corner {
  position: absolute;
  font-size: 1.5rem;
  color: var(--gold-deep);
  z-index: 0;
}
.welcome-card .corner.tl { top: 8px; left: 12px; }
.welcome-card .corner.tr { top: 8px; right: 12px; }
.welcome-card .corner.bl { bottom: 8px; left: 12px; }
.welcome-card .corner.br { bottom: 8px; right: 12px; }

/* NAME INPUT */
.name-input {
  width: 100%;
  max-width: 400px;
  padding: 14px 20px;
  font-family: 'Quicksand', sans-serif;
  font-size: 1.15rem;
  font-weight: 600;
  border: 3px solid var(--pastel-pink);
  border-radius: 20px;
  background: #fff;
  color: var(--plum-deep);
  margin: 12px 0;
  text-align: center;
  transition: all 0.2s ease;
  box-shadow: inset 0 2px 4px rgba(236, 72, 153, 0.1), 0 0 12px rgba(249, 168, 212, 0.3);
}

.name-input::placeholder {
  color: var(--pastel-lavender-deep);
  opacity: 0.6;
  font-weight: 400;
}

.name-input:focus {
  outline: none;
  border-color: var(--pastel-pink-deep);
  box-shadow: 0 0 0 4px rgba(249, 168, 212, 0.4), inset 0 2px 4px rgba(236, 72, 153, 0.1), 0 0 20px rgba(249, 168, 212, 0.5);
  transform: scale(1.02);
}

/* ============================================
   LESSON CARDS
============================================ */
.lesson-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 16px;
  margin: 30px 0;
}

.lesson-card {
  background: linear-gradient(135deg, #fff 0%, var(--pastel-pink-light) 100%);
  border: 3px solid var(--pastel-pink);
  border-radius: 22px;
  padding: 20px 16px;
  cursor: pointer;
  transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  position: relative;
  overflow: hidden;
  box-shadow:
    0 4px 0 var(--pastel-pink),
    0 8px 16px rgba(236, 72, 153, 0.15);
  user-select: none;
  color: var(--plum-deep);
}

/* Each lesson gets a unique pastel color */
.lesson-card[data-color="rose"] {
  background: linear-gradient(135deg, #fff 0%, #fce7f3 100%);
  border-color: var(--pastel-pink);
  box-shadow: 0 4px 0 var(--pastel-pink), 0 8px 16px rgba(236, 72, 153, 0.15);
}
.lesson-card[data-color="sky"] {
  background: linear-gradient(135deg, #fff 0%, var(--pastel-sky-light) 100%);
  border-color: var(--pastel-sky);
  box-shadow: 0 4px 0 var(--pastel-sky), 0 8px 16px rgba(96, 165, 250, 0.15);
}
.lesson-card[data-color="leaf"] {
  background: linear-gradient(135deg, #fff 0%, #d1fae5 100%);
  border-color: var(--pastel-mint);
  box-shadow: 0 4px 0 var(--pastel-mint), 0 8px 16px rgba(110, 231, 183, 0.2);
}
.lesson-card[data-color="violet"] {
  background: linear-gradient(135deg, #fff 0%, var(--pastel-lavender-light) 100%);
  border-color: var(--pastel-lavender);
  box-shadow: 0 4px 0 var(--pastel-lavender), 0 8px 16px rgba(168, 85, 247, 0.15);
}
.lesson-card[data-color="orange"] {
  background: linear-gradient(135deg, #fff 0%, #fed7aa 100%);
  border-color: var(--pastel-peach);
  box-shadow: 0 4px 0 var(--pastel-peach), 0 8px 16px rgba(251, 146, 60, 0.2);
}
.lesson-card[data-color="crimson"] {
  background: linear-gradient(135deg, #fff 0%, #fecaca 100%);
  border-color: #fca5a5;
  box-shadow: 0 4px 0 #fca5a5, 0 8px 16px rgba(248, 113, 113, 0.2);
}
.lesson-card[data-color="gold"] {
  background: linear-gradient(135deg, #fff 0%, var(--pastel-yellow) 100%);
  border-color: #fcd34d;
  box-shadow: 0 4px 0 #fcd34d, 0 8px 16px rgba(251, 191, 36, 0.2);
}
.lesson-card[data-color="teal"] {
  background: linear-gradient(135deg, #fff 0%, #ccfbf1 100%);
  border-color: #5eead4;
  box-shadow: 0 4px 0 #5eead4, 0 8px 16px rgba(94, 234, 212, 0.25);
}

.lesson-card:hover {
  transform: translateY(-5px) scale(1.03) rotate(-1deg);
  filter: brightness(1.05);
}

.lesson-card:active {
  transform: translateY(2px) scale(0.97);
}

.lesson-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 4px;
  background: linear-gradient(90deg, transparent, var(--pastel-pink), var(--pastel-lavender), var(--pastel-sky), transparent);
  background-size: 200% 100%;
  animation: rainbowShift 4s linear infinite;
}

/* Cute heart sparkle in corner */
.lesson-card::after {
  content: '✨';
  position: absolute;
  top: 8px;
  right: 12px;
  font-size: 1rem;
  opacity: 0.6;
  pointer-events: none;
}

@keyframes rainbowShift {
  to { background-position: 200% 0; }
}

.lesson-icon {
  font-size: 3rem;
  margin-bottom: 10px;
  display: inline-block;
  animation: iconWiggle 3s ease-in-out infinite;
  filter: drop-shadow(0 3px 5px rgba(236, 72, 153, 0.2));
  position: relative;
  z-index: 1;
}

.lesson-card:nth-child(2n) .lesson-icon { animation-delay: 0.5s; }
.lesson-card:nth-child(3n) .lesson-icon { animation-delay: 1s; }
.lesson-card:nth-child(4n) .lesson-icon { animation-delay: 1.5s; }

@keyframes iconWiggle {
  0%, 100% { transform: rotate(-5deg) scale(1); }
  25% { transform: rotate(5deg) scale(1.05); }
  50% { transform: rotate(-3deg) scale(1); }
  75% { transform: rotate(3deg) scale(1.05); }
}

.lesson-num {
  font-family: 'Quicksand', sans-serif;
  font-size: 0.75rem;
  letter-spacing: 0.2em;
  color: var(--pastel-pink-darker);
  text-transform: uppercase;
  margin-bottom: 4px;
  font-weight: 700;
  position: relative;
  z-index: 1;
}

.lesson-title {
  font-family: 'Quicksand', sans-serif;
  font-weight: 700;
  font-size: 1rem;
  color: var(--plum-deep);
  margin-bottom: 8px;
  line-height: 1.25;
  min-height: 2.5em;
  position: relative;
  z-index: 1;
}

.lesson-status {
  font-family: 'Quicksand', sans-serif;
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--pastel-lavender-darker);
  margin-top: 8px;
  position: relative;
  z-index: 1;
}

.lesson-status.completed {
  color: var(--pastel-mint-deep);
  font-weight: 700;
}

.medal-corner {
  position: absolute;
  top: 12px;
  right: 12px;
  font-size: 2rem;
  filter: drop-shadow(0 2px 4px rgba(236, 72, 153, 0.3));
  animation: medalSpin 3s ease-in-out infinite;
  z-index: 2;
}

@keyframes medalSpin {
  0%, 100% { transform: rotate(-8deg) scale(1); }
  50% { transform: rotate(8deg) scale(1.1); }
}

/* ============================================
   BUTTONS
============================================ */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  font-family: 'Quicksand', sans-serif;
  font-weight: 700;
  font-size: 1.05rem;
  letter-spacing: 0.02em;
  padding: 14px 28px;
  border: 3px solid var(--pastel-pink-deep);
  border-radius: 24px;
  background: linear-gradient(180deg, #fff 0%, var(--pastel-pink) 100%);
  color: var(--pastel-pink-darker);
  cursor: pointer;
  transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
  box-shadow:
    0 5px 0 var(--pastel-pink-deep),
    0 7px 14px rgba(236, 72, 153, 0.25),
    inset 0 2px 0 rgba(255,255,255,0.8);
  margin: 6px;
  text-shadow: 0 1px 0 rgba(255,255,255,0.8);
  user-select: none;
}

.btn:hover {
  transform: translateY(-3px);
  box-shadow:
    0 8px 0 var(--pastel-pink-deep),
    0 12px 24px rgba(236, 72, 153, 0.35),
    inset 0 2px 0 rgba(255,255,255,0.8);
  filter: brightness(1.05);
}

.btn:active {
  transform: translateY(3px);
  box-shadow:
    0 1px 0 var(--pastel-pink-deep),
    0 2px 4px rgba(236, 72, 153, 0.2),
    inset 0 2px 0 rgba(255,255,255,0.8);
}

.btn-secondary {
  background: linear-gradient(180deg, #fff 0%, var(--pastel-lavender-light) 100%);
  border-color: var(--pastel-lavender-deep);
  color: var(--pastel-lavender-darker);
  text-shadow: 0 1px 0 rgba(255,255,255,0.8);
  box-shadow:
    0 4px 0 var(--pastel-lavender-deep),
    0 6px 12px rgba(168, 85, 247, 0.2);
}

.btn-secondary:hover {
  background: linear-gradient(180deg, #fff 0%, var(--pastel-lavender) 100%);
  box-shadow:
    0 6px 0 var(--pastel-lavender-deep),
    0 10px 20px rgba(168, 85, 247, 0.3);
}

.btn-secondary:active {
  box-shadow:
    0 2px 0 var(--pastel-lavender-deep),
    0 3px 6px rgba(168, 85, 247, 0.2);
}

.btn-crimson {
  background: linear-gradient(180deg, #f87171 0%, var(--crimson) 50%, var(--crimson-deep) 100%);
  border-color: var(--crimson-deep);
  color: #fff;
  text-shadow: 0 1px 2px rgba(0,0,0,0.5);
  box-shadow:
    0 5px 0 var(--crimson-deep),
    0 7px 14px var(--shadow-strong),
    inset 0 2px 0 rgba(255,255,255,0.3);
}

.btn-crimson:hover {
  box-shadow:
    0 8px 0 var(--crimson-deep),
    0 12px 24px var(--shadow-strong),
    inset 0 2px 0 rgba(255,255,255,0.3);
}

.btn-crimson:active {
  box-shadow:
    0 1px 0 var(--crimson-deep),
    0 2px 4px var(--shadow),
    inset 0 2px 0 rgba(255,255,255,0.3);
}

.btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
  transform: none !important;
}

.btn-small {
  padding: 8px 16px;
  font-size: 0.85rem;
}

/* Existing kid buttons */
.kid-btn {
  background: linear-gradient(180deg, #fff 0%, var(--pastel-lavender-light) 100%);
  border: 2px solid var(--pastel-lavender);
  color: var(--pastel-lavender-darker);
  border-radius: 20px;
  padding: 10px 20px;
  font-family: 'Quicksand', sans-serif;
  font-weight: 600;
  font-size: 1rem;
  cursor: pointer;
  margin: 4px;
  transition: all 0.2s ease;
  box-shadow: 0 3px 0 var(--pastel-lavender), 0 0 12px rgba(168, 85, 247, 0.15);
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.kid-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 5px 0 var(--pastel-lavender), 0 0 20px rgba(168, 85, 247, 0.3);
  background: linear-gradient(180deg, var(--pastel-lavender), var(--pastel-lavender-deep));
  color: #fff;
}

.kid-btn:active { transform: translateY(1px); box-shadow: 0 2px 0 var(--pastel-lavender); }

/* ============================================
   MODE SELECT SCREEN
============================================ */
.mode-screen {
  text-align: center;
  padding: 10px;
  animation: fadeInUp 0.5s;
}

.mode-card {
  background: linear-gradient(135deg, #fff 0%, var(--pastel-pink-light) 100%);
  border: 3px solid var(--pastel-pink);
  border-radius: 22px;
  padding: 24px 20px;
  margin: 16px auto;
  max-width: 500px;
  box-shadow:
    0 8px 24px rgba(236, 72, 153, 0.15),
    0 0 30px rgba(196, 181, 253, 0.15);
  text-align: left;
  position: relative;
  transition: transform 0.3s ease;
  color: var(--plum-deep);
}

.mode-card:hover {
  transform: translateY(-3px);
}

.mode-card h3 {
  font-family: 'Quicksand', sans-serif;
  color: var(--pastel-pink-darker);
  font-size: 1.4rem;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 12px;
  font-weight: 700;
}

.mode-icon {
  font-size: 2rem;
}

.mode-card p {
  font-size: 1.05rem;
  line-height: 1.5;
  margin-bottom: 12px;
  color: var(--plum-deep);
}

.mode-card.warning {
  border-color: var(--pastel-lavender-deep);
  background: linear-gradient(135deg, #fff 0%, var(--pastel-lavender-light) 100%);
  box-shadow:
    0 8px 24px rgba(168, 85, 247, 0.15),
    0 0 30px rgba(196, 181, 253, 0.2);
}

.warning-text {
  font-family: 'Caveat', cursive;
  font-size: 1.25rem;
  color: var(--pastel-lavender-darker);
  font-weight: 700;
  padding: 12px 14px;
  border-left: 4px solid var(--pastel-lavender-deep);
  background: rgba(196, 181, 253, 0.15);
  margin: 12px 0;
  border-radius: 0 8px 8px 0;
}

.tier-list {
  list-style: none;
  padding: 0;
  margin: 12px 0;
}

.tier-list li {
  padding: 6px 0;
  font-family: 'Quicksand', sans-serif;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 0.98rem;
  color: var(--plum-deep);
}

/* ============================================
   QUIZ SCREEN
============================================ */
.quiz-screen {
  background: linear-gradient(135deg, #fff 0%, var(--pastel-pink-light) 100%);
  border: 3px solid var(--pastel-pink);
  border-radius: 22px;
  padding: 24px 20px;
  box-shadow:
    0 8px 24px rgba(236, 72, 153, 0.15),
    0 0 30px rgba(196, 181, 253, 0.2);
  position: relative;
  animation: fadeInUp 0.4s;
  color: var(--plum-deep);
}

.quiz-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
  padding-bottom: 14px;
  border-bottom: 2px dashed var(--gold);
  flex-wrap: wrap;
  gap: 10px;
}

.quiz-mode-badge {
  font-family: 'Fredoka', sans-serif;
  font-weight: 600;
  font-size: 0.85rem;
  padding: 6px 14px;
  border-radius: 20px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}

.quiz-mode-badge.practice {
  background: linear-gradient(180deg, var(--leaf), var(--leaf-deep));
  color: #fff;
  box-shadow: 0 2px 4px var(--shadow);
}

.quiz-mode-badge.challenge {
  background: linear-gradient(180deg, var(--crimson), var(--crimson-deep));
  color: #fff;
  box-shadow: 0 2px 4px var(--shadow);
}

.progress-text {
  font-family: 'Caveat', cursive;
  font-weight: 700;
  font-size: 1.3rem;
  color: var(--pastel-pink-darker);
}

.progress-bar {
  height: 14px;
  background: var(--pastel-pink-light);
  border-radius: 8px;
  overflow: hidden;
  margin-bottom: 24px;
  border: 2px solid var(--pastel-pink);
  position: relative;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--pastel-pink) 0%, var(--pastel-lavender) 50%, var(--pastel-sky) 100%);
  background-size: 200% 100%;
  animation: progressShine 2s linear infinite;
  transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  border-radius: 6px;
  position: relative;
  overflow: hidden;
  box-shadow: 0 0 8px rgba(236, 72, 153, 0.3);
}

.progress-fill::after {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.5), transparent);
  animation: progressGlimmer 2s linear infinite;
}

@keyframes progressShine {
  to { background-position: 200% 0; }
}

@keyframes progressGlimmer {
  to { left: 200%; }
}

.question {
  font-family: 'Quicksand', sans-serif;
  font-size: 1.25rem;
  font-weight: 700;
  color: var(--plum-deep);
  line-height: 1.4;
  min-height: 0;
  text-align: center;
  padding: 18px 14px 8px;
  background: linear-gradient(135deg, var(--pastel-lavender-light), var(--pastel-sky-light));
  border-radius: 20px 20px 0 0;
  border: 3px solid var(--pastel-lavender);
  border-bottom: none;
  box-shadow: 0 -4px 12px rgba(168, 85, 247, 0.1);
  position: relative;
}

.q-bisaya {
  font-family: 'Quicksand', sans-serif;
  font-size: 1rem;
  font-weight: 600;
  font-style: italic;
  color: var(--pastel-lavender-darker);
  line-height: 1.4;
  text-align: center;
  padding: 4px 14px 16px;
  margin-bottom: 24px;
  background: linear-gradient(135deg, var(--pastel-lavender-light), var(--pastel-sky-light));
  border-radius: 0 0 20px 20px;
  border: 3px solid var(--pastel-lavender);
  border-top: 1px dashed var(--pastel-lavender-deep);
  box-shadow: 0 4px 0 var(--pastel-lavender), 0 6px 12px rgba(168, 85, 247, 0.2);
  opacity: 0.95;
}

/* When no qBisaya present, restore original question styling */
.question:not(:has(+ .q-bisaya)) {
  border-radius: 20px;
  border-bottom: 3px solid var(--pastel-lavender);
  box-shadow: 0 4px 0 var(--pastel-lavender), 0 6px 12px rgba(168, 85, 247, 0.2);
  margin-bottom: 24px;
  padding: 18px 14px;
  min-height: 60px;
}

.question::before {
  display: none;
}

.choices {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.choice {
  background: linear-gradient(135deg, #fff 0%, var(--pastel-pink-light) 100%);
  border: 3px solid var(--pastel-pink);
  border-radius: 18px;
  padding: 16px 18px;
  font-family: 'Quicksand', sans-serif;
  font-weight: 600;
  font-size: 1.05rem;
  text-align: left;
  cursor: pointer;
  transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
  display: flex;
  align-items: flex-start;
  gap: 14px;
  color: var(--plum-deep);
  box-shadow: 0 4px 0 var(--pastel-pink), 0 6px 12px rgba(236, 72, 153, 0.15);
  user-select: none;
  position: relative;
}

.choice-text {
  display: flex;
  flex-direction: column;
  gap: 4px;
  flex: 1;
}

.choice-english {
  display: block;
  line-height: 1.35;
}

.choice-bisaya {
  display: block;
  font-size: 0.82rem;
  font-style: italic;
  font-weight: 500;
  color: var(--pastel-lavender-darker);
  opacity: 0.85;
  line-height: 1.3;
  margin-top: 2px;
}

/* Each choice gets a unique pastel color */
.choice:nth-child(1) {
  background: linear-gradient(135deg, #fff 0%, var(--pastel-pink-light) 100%);
  border-color: var(--pastel-pink);
  box-shadow: 0 4px 0 var(--pastel-pink), 0 6px 12px rgba(236, 72, 153, 0.15);
}
.choice:nth-child(2) {
  background: linear-gradient(135deg, #fff 0%, var(--pastel-sky-light) 100%);
  border-color: var(--pastel-sky);
  box-shadow: 0 4px 0 var(--pastel-sky), 0 6px 12px rgba(96, 165, 250, 0.2);
}
.choice:nth-child(3) {
  background: linear-gradient(135deg, #fff 0%, #d1fae5 100%);
  border-color: var(--pastel-mint);
  box-shadow: 0 4px 0 var(--pastel-mint), 0 6px 12px rgba(110, 231, 183, 0.25);
}
.choice:nth-child(4) {
  background: linear-gradient(135deg, #fff 0%, var(--pastel-lavender-light) 100%);
  border-color: var(--pastel-lavender);
  box-shadow: 0 4px 0 var(--pastel-lavender), 0 6px 12px rgba(168, 85, 247, 0.2);
}

.choice:hover:not(:disabled) {
  transform: translateX(6px) translateY(-2px);
  filter: brightness(1.05);
}

.choice:active:not(:disabled) {
  transform: translateX(2px) translateY(2px);
}

.choice .letter {
  font-family: 'Quicksand', sans-serif;
  font-weight: 700;
  font-size: 1.4rem;
  color: #fff;
  min-width: 38px;
  height: 38px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--pastel-pink-deep);
  border: 3px solid #fff;
  border-radius: 50%;
  flex-shrink: 0;
  box-shadow: 0 2px 4px rgba(236, 72, 153, 0.3);
}

.choice:nth-child(1) .letter { background: var(--pastel-pink-deep); }
.choice:nth-child(2) .letter { background: var(--pastel-sky-deep); }
.choice:nth-child(3) .letter { background: var(--pastel-mint-deep); }
.choice:nth-child(4) .letter { background: var(--pastel-lavender-deep); }

.choice.correct {
  background: linear-gradient(135deg, #d1fae5 0%, var(--pastel-mint) 100%) !important;
  border-color: var(--pastel-mint-deep) !important;
  animation: pulseGreen 0.6s ease;
  box-shadow: 0 4px 0 var(--pastel-mint-deep), 0 0 30px rgba(110, 231, 183, 0.6) !important;
}

.choice.correct .letter {
  background: var(--pastel-mint-deep) !important;
  color: #fff !important;
}

.choice.wrong {
  background: linear-gradient(135deg, #fee2e2 0%, #fca5a5 100%) !important;
  border-color: var(--pastel-pink-deep) !important;
  animation: shakeWrong 0.5s ease;
  box-shadow: 0 4px 0 var(--pastel-pink-darker), 0 0 25px rgba(236, 72, 153, 0.4) !important;
}

.choice.wrong .letter {
  background: var(--pastel-pink-darker) !important;
  color: #fff !important;
}

.choice.selected-challenge {
  background: linear-gradient(135deg, var(--pastel-yellow) 0%, #fcd34d 100%) !important;
  border-color: #fbbf24 !important;
  animation: pulseGold 0.4s ease;
  transform: scale(0.98);
}

@keyframes pulseGreen {
  0% { transform: scale(1); }
  50% { transform: scale(1.04); }
  100% { transform: scale(1); }
}

@keyframes pulseGold {
  0% { transform: scale(1); }
  50% { transform: scale(1.03); }
  100% { transform: scale(1); }
}

@keyframes shakeWrong {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-8px); }
  40% { transform: translateX(8px); }
  60% { transform: translateX(-5px); }
  80% { transform: translateX(5px); }
}

.choice:disabled {
  cursor: default;
}

.feedback {
  margin-top: 18px;
  padding: 16px 18px;
  border-radius: 16px;
  background: linear-gradient(135deg, #d1fae5, var(--pastel-mint));
  border-left: 5px solid var(--pastel-mint-deep);
  font-family: 'Quicksand', sans-serif;
  font-size: 1rem;
  line-height: 1.5;
  animation: fadeInUp 0.4s;
  color: var(--plum-deep);
}

.feedback.wrong {
  background: linear-gradient(135deg, #fee2e2, #fecaca);
  border-left-color: var(--pastel-pink-deep);
}

.feedback strong {
  color: var(--pastel-pink-darker);
  font-weight: 700;
  display: block;
  margin-bottom: 6px;
  font-size: 1.1rem;
}

/* Bisaya appears prominently first, English smaller below */
.explain-bisaya {
  font-family: 'Quicksand', sans-serif;
  font-weight: 700;
  font-size: 1.05rem;
  color: var(--plum-deep);
  line-height: 1.5;
  margin-bottom: 6px;
}

.explain-english {
  font-family: 'Quicksand', sans-serif;
  font-weight: 500;
  font-size: 0.85rem;
  color: var(--pastel-lavender-darker);
  line-height: 1.4;
  font-style: italic;
  opacity: 0.85;
  border-top: 1px dashed rgba(168, 85, 247, 0.3);
  padding-top: 6px;
}

.review-explain-bisaya {
  font-family: 'Quicksand', sans-serif;
  font-weight: 700;
  font-size: 0.95rem;
  color: var(--plum-deep);
  line-height: 1.4;
  margin-top: 8px;
  padding: 8px 10px;
  background: rgba(255, 255, 255, 0.6);
  border-radius: 8px;
  border-left: 3px solid var(--pastel-pink-deep);
}

.review-explain-english {
  font-family: 'Quicksand', sans-serif;
  font-weight: 500;
  font-size: 0.8rem;
  color: var(--pastel-lavender-darker);
  line-height: 1.35;
  font-style: italic;
  opacity: 0.8;
  margin-top: 4px;
  padding: 0 10px;
}

/* ============================================
   RESULT SCREEN
============================================ */
.result-screen {
  text-align: center;
  background: linear-gradient(135deg, #fff 0%, var(--pastel-pink-light) 100%);
  border: 4px solid var(--pastel-pink);
  border-radius: 24px;
  padding: 30px 22px;
  box-shadow:
    0 12px 40px rgba(236, 72, 153, 0.2),
    0 0 60px rgba(196, 181, 253, 0.3);
  position: relative;
  overflow: hidden;
  animation: fadeInUp 0.5s;
  color: var(--plum-deep);
}

.result-screen::before {
  content: '';
  position: absolute;
  inset: -50%;
  background: radial-gradient(circle, rgba(249, 168, 212, 0.2) 0%, transparent 50%);
  animation: cardShimmer 4s ease-in-out infinite;
  pointer-events: none;
}

.result-screen > * { position: relative; z-index: 1; }

.result-medal {
  font-size: 6rem;
  margin-bottom: 8px;
  animation: medalReveal 1s cubic-bezier(0.34, 1.56, 0.64, 1);
  display: inline-block;
  filter: drop-shadow(0 4px 8px var(--shadow-strong));
}

@keyframes medalReveal {
  0% { transform: scale(0) rotate(-720deg); opacity: 0; }
  60% { transform: scale(1.3) rotate(20deg); }
  100% { transform: scale(1) rotate(0); opacity: 1; }
}

.result-title {
  font-family: 'Pacifico', cursive;
  font-weight: 400;
  font-size: 2.4rem;
  background: linear-gradient(90deg, var(--pastel-pink-deep), var(--pastel-lavender-deep), var(--pastel-sky-deep));
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 8px;
  filter: drop-shadow(0 2px 4px rgba(236, 72, 153, 0.25));
}

.result-tier {
  font-family: 'Caveat', cursive;
  font-weight: 700;
  font-size: 2rem;
  margin-bottom: 16px;
}

.tier-bronze { color: #c2410c; text-shadow: 1px 1px 0 #fed7aa; }
.tier-silver { color: #6b7280; text-shadow: 1px 1px 0 #e5e7eb; }
.tier-gold { color: #d97706; text-shadow: 1px 1px 0 var(--pastel-yellow); }
.tier-perfect { color: var(--pastel-pink-darker); text-shadow: 1px 1px 0 var(--pastel-yellow), 2px 2px 0 var(--pastel-pink); font-weight: 900; }

.score-display {
  font-family: 'Pacifico', cursive;
  font-size: 3rem;
  font-weight: 400;
  color: var(--pastel-pink-darker);
  margin: 12px 0;
  display: inline-block;
  padding: 10px 30px;
  background: linear-gradient(135deg, #fff, var(--pastel-pink-light));
  border: 3px solid var(--pastel-pink);
  border-radius: 24px;
  box-shadow: 0 4px 0 var(--pastel-pink), 0 8px 16px rgba(236, 72, 153, 0.25), 0 0 30px rgba(249, 168, 212, 0.4);
  animation: scorePop 0.6s ease 0.4s both;
}

@keyframes scorePop {
  0% { transform: scale(0.5); opacity: 0; }
  60% { transform: scale(1.1); }
  100% { transform: scale(1); opacity: 1; }
}

.completion-code {
  background: linear-gradient(135deg, var(--pastel-lavender-light) 0%, #fff 100%);
  color: var(--pastel-pink-darker);
  padding: 20px 16px;
  font-family: 'Courier New', monospace;
  font-size: 1.25rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  border-radius: 16px;
  margin: 18px 0;
  word-break: break-all;
  border: 3px solid var(--pastel-pink);
  position: relative;
  box-shadow:
    0 0 25px rgba(249, 168, 212, 0.5),
    0 4px 0 var(--pastel-pink),
    inset 0 1px 0 rgba(255,255,255,0.8);
  user-select: none;
  -webkit-user-select: none;
  -moz-user-select: none;
  -ms-user-select: none;
  -webkit-touch-callout: none;
}

.completion-code::before {
  content: '';
  position: absolute;
  inset: 4px;
  border: 1px dashed var(--pastel-pink-deep);
  border-radius: 12px;
  pointer-events: none;
  opacity: 0.5;
}

.code-label {
  font-family: 'Quicksand', sans-serif;
  font-size: 0.75rem;
  letter-spacing: 0.25em;
  color: var(--pastel-pink-deep);
  text-transform: uppercase;
  display: block;
  margin-bottom: 10px;
  font-weight: 700;
}

.reward-info {
  background: linear-gradient(135deg, #fff, var(--pastel-pink-light));
  border: 2px solid var(--pastel-pink);
  border-radius: 18px;
  padding: 18px;
  margin: 16px 0;
  text-align: left;
  box-shadow: 0 4px 12px rgba(236, 72, 153, 0.15), 0 0 20px rgba(249, 168, 212, 0.2);
  color: var(--plum-deep);
}

.reward-info h4 {
  font-family: 'Quicksand', sans-serif;
  color: var(--pastel-pink-darker);
  margin-bottom: 12px;
  font-size: 1.15rem;
  font-weight: 700;
}

.reward-info p {
  margin-bottom: 8px;
  font-family: 'Quicksand', sans-serif;
  line-height: 1.5;
  color: var(--plum-deep);
}

.instructions {
  font-family: 'Caveat', cursive;
  font-weight: 700;
  font-size: 1.3rem;
  color: var(--pastel-lavender-darker);
  line-height: 1.4;
  margin: 18px 0;
}

/* ============================================
   ANSWER REVIEW (Practice Mode)
============================================ */
.review {
  margin-top: 20px;
  text-align: left;
}

.review-item {
  background: linear-gradient(135deg, #fff 0%, #d1fae5 100%);
  border-left: 5px solid var(--pastel-mint-deep);
  padding: 14px 16px;
  margin-bottom: 10px;
  border-radius: 0 14px 14px 0;
  box-shadow: 0 2px 6px rgba(110, 231, 183, 0.2);
  color: var(--plum-deep);
}

.review-item.wrong {
  background: linear-gradient(135deg, #fff 0%, #fee2e2 100%);
  border-left-color: var(--pastel-pink-deep);
  box-shadow: 0 2px 6px rgba(236, 72, 153, 0.2);
}

.review-item .q {
  font-family: 'Quicksand', sans-serif;
  font-weight: 700;
  color: var(--pastel-pink-darker);
  margin-bottom: 8px;
  font-size: 1rem;
}

.review-item .your-answer {
  font-family: 'Quicksand', sans-serif;
  font-style: italic;
  color: var(--plum-deep);
  margin-bottom: 4px;
  opacity: 0.85;
}

.review-item .correct-answer {
  font-family: 'Quicksand', sans-serif;
  color: var(--pastel-mint-deep);
  font-weight: 700;
  margin-top: 4px;
}

/* ============================================
   MODAL
============================================ */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(124, 58, 237, 0.4);
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  animation: fadeIn 0.2s;
  backdrop-filter: blur(4px);
}

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal {
  background: linear-gradient(135deg, #fff 0%, var(--pastel-pink-light) 100%);
  border: 4px solid var(--pastel-pink);
  border-radius: 24px;
  padding: 28px 22px;
  max-width: 450px;
  box-shadow: 0 16px 50px rgba(236, 72, 153, 0.3), 0 0 30px rgba(249, 168, 212, 0.5);
  text-align: center;
  animation: modalPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  color: var(--plum-deep);
}

@keyframes modalPop {
  from { transform: scale(0.7); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.modal h3 {
  font-family: 'Pacifico', cursive;
  color: var(--pastel-pink-darker);
  margin-bottom: 16px;
  font-size: 1.7rem;
}

.modal p {
  margin-bottom: 16px;
  line-height: 1.5;
  font-family: 'Quicksand', sans-serif;
  font-size: 1.05rem;
  color: var(--plum-deep);
}

/* ============================================
   CELEBRATION CONFETTI (for correct answers)
============================================ */
.confetti-container {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 1000;
  overflow: hidden;
}

.confetti {
  position: absolute;
  width: 12px;
  height: 12px;
  animation: confettiFall 2.5s cubic-bezier(0.5, 0, 0.5, 1) forwards;
}

@keyframes confettiFall {
  0% {
    transform: translateY(-20vh) rotate(0deg) scale(1);
    opacity: 1;
  }
  100% {
    transform: translateY(110vh) rotate(720deg) scale(0.5);
    opacity: 0;
  }
}

/* ============================================
   HELPERS & MEDIA QUERIES
============================================ */
.text-center { text-align: center; }
.muted { color: rgba(124, 58, 237, 0.6); font-style: italic; }
.small { font-size: 0.85rem; }

/* ============================================
   RANK & HOLY POINTS DISPLAY
============================================ */
.rank-banner {
  background: linear-gradient(135deg, #fff 0%, var(--pastel-pink-light) 50%, var(--pastel-lavender-light) 100%);
  border: 3px solid var(--pastel-pink);
  border-radius: 20px;
  padding: 16px 18px;
  margin: 16px auto 20px;
  max-width: 520px;
  box-shadow:
    0 0 30px rgba(249, 168, 212, 0.4),
    0 6px 20px rgba(236, 72, 153, 0.2);
  position: relative;
  overflow: hidden;
}

.rank-banner::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -100%;
  width: 100%;
  height: 200%;
  background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.5), transparent);
  animation: rankShine 4s linear infinite;
}

@keyframes rankShine {
  to { left: 200%; }
}

.rank-content {
  position: relative;
  z-index: 1;
  display: flex;
  align-items: center;
  gap: 16px;
}

.rank-emblem {
  font-size: 3.5rem;
  filter: drop-shadow(0 2px 6px rgba(236, 72, 153, 0.4));
  animation: emblemGlow 2.5s ease-in-out infinite;
  flex-shrink: 0;
}

@keyframes emblemGlow {
  0%, 100% { transform: scale(1); filter: drop-shadow(0 2px 6px rgba(236, 72, 153, 0.4)); }
  50% { transform: scale(1.08); filter: drop-shadow(0 2px 12px rgba(236, 72, 153, 0.6)); }
}

.rank-info {
  flex: 1;
  text-align: left;
}

.rank-label {
  font-family: 'Quicksand', sans-serif;
  font-size: 0.7rem;
  letter-spacing: 0.25em;
  color: var(--pastel-pink-darker);
  text-transform: uppercase;
  margin-bottom: 2px;
  font-weight: 700;
  opacity: 0.85;
}

.rank-name {
  font-family: 'Pacifico', cursive;
  font-weight: 400;
  font-size: 1.6rem;
  background: linear-gradient(90deg, var(--pastel-pink-deep), var(--pastel-lavender-deep));
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  line-height: 1.1;
  margin-bottom: 4px;
}

.points-row {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  margin-top: 6px;
}

.points-pill {
  font-family: 'Quicksand', sans-serif;
  font-weight: 700;
  font-size: 0.95rem;
  color: var(--plum-deep);
  display: inline-flex;
  align-items: center;
  gap: 4px;
}

.rank-progress {
  margin-top: 10px;
  height: 8px;
  background: rgba(255, 255, 255, 0.6);
  border-radius: 4px;
  border: 1px solid var(--pastel-pink);
  overflow: hidden;
  position: relative;
}

.rank-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--pastel-pink), var(--pastel-lavender), var(--pastel-sky));
  background-size: 200% 100%;
  animation: progressShine 3s linear infinite;
  transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.rank-progress-text {
  font-family: 'Quicksand', sans-serif;
  font-size: 0.75rem;
  color: var(--pastel-pink-darker);
  margin-top: 4px;
  font-weight: 600;
  opacity: 0.9;
}

/* ============================================
   PRAYER / PROMISE SCREEN (before Challenge)
============================================ */
.prayer-screen {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: calc(100vh - 32px);
  animation: fadeInUp 0.5s;
  padding: 16px 0;
}

.prayer-card {
  background: linear-gradient(135deg, #fff 0%, var(--pastel-pink-light) 50%, var(--pastel-lavender-light) 100%);
  border: 4px solid var(--pastel-pink);
  border-radius: 28px;
  padding: 32px 24px;
  max-width: 540px;
  width: 100%;
  box-shadow:
    0 16px 50px rgba(236, 72, 153, 0.25),
    0 0 60px rgba(196, 181, 253, 0.4);
  text-align: center;
  position: relative;
  overflow: hidden;
}

.prayer-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 6px;
  background: linear-gradient(90deg, var(--pastel-pink), var(--pastel-lavender), var(--pastel-sky), var(--pastel-pink));
  background-size: 200% 100%;
  animation: rainbowShift 4s linear infinite;
}

.prayer-icon {
  font-size: 4.5rem;
  margin-bottom: 8px;
  animation: prayerPulse 3s ease-in-out infinite;
  filter: drop-shadow(0 4px 8px rgba(236, 72, 153, 0.3));
}

@keyframes prayerPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.08); }
}

.prayer-title {
  font-family: 'Pacifico', cursive;
  font-size: 2.2rem;
  background: linear-gradient(90deg, var(--pastel-pink-deep), var(--pastel-lavender-deep));
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 4px;
  filter: drop-shadow(0 2px 4px rgba(236, 72, 153, 0.2));
}

.prayer-subtitle {
  font-family: 'Caveat', cursive;
  font-weight: 700;
  font-size: 1.5rem;
  color: var(--pastel-lavender-darker);
  margin-bottom: 24px;
}

.prayer-section {
  background: rgba(255, 255, 255, 0.7);
  border: 2px solid var(--pastel-pink);
  border-radius: 20px;
  padding: 18px 16px;
  margin: 20px 0;
  text-align: left;
}

.prayer-line {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 12px 0;
  border-bottom: 1px dashed var(--pastel-pink);
}

.prayer-line:last-child {
  border-bottom: none;
}

.prayer-emoji {
  font-size: 2rem;
  flex-shrink: 0;
  filter: drop-shadow(0 2px 4px rgba(236, 72, 153, 0.2));
}

.prayer-text {
  flex: 1;
}

.prayer-bisaya {
  font-family: 'Quicksand', sans-serif;
  font-weight: 700;
  color: var(--plum-deep);
  font-size: 1.08rem;
  line-height: 1.4;
  margin-bottom: 4px;
}

.prayer-english {
  font-family: 'Quicksand', sans-serif;
  font-weight: 500;
  color: var(--pastel-lavender-darker);
  font-size: 0.88rem;
  line-height: 1.4;
  font-style: italic;
  opacity: 0.85;
}

.prayer-divider {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 14px;
  margin: 20px 0;
  color: var(--pastel-pink-deep);
  font-size: 1.2rem;
  opacity: 0.7;
}

.prayer-promise-text {
  font-family: 'Quicksand', sans-serif;
  font-size: 1.15rem;
  margin: 18px 0;
  line-height: 1.5;
  color: var(--plum-deep);
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.prayer-promise-text .prayer-bisaya {
  font-size: 1.2rem;
  margin-bottom: 0;
}

.prayer-promise-text .prayer-english {
  font-size: 0.95rem;
  font-weight: 600;
}

.prayer-buttons {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
  margin-top: 24px;
}

.prayer-promise-btn {
  background: linear-gradient(180deg, var(--pastel-mint) 0%, var(--pastel-mint-deep) 100%) !important;
  border-color: var(--pastel-mint-deep) !important;
  color: #fff !important;
  font-size: 1.1rem !important;
  padding: 16px 28px !important;
  box-shadow:
    0 5px 0 #047857,
    0 7px 14px rgba(16, 185, 129, 0.3),
    inset 0 2px 0 rgba(255,255,255,0.4) !important;
  text-shadow: 0 1px 2px rgba(0,0,0,0.2) !important;
}

.prayer-promise-btn:hover {
  box-shadow:
    0 8px 0 #047857,
    0 12px 24px rgba(16, 185, 129, 0.4),
    inset 0 2px 0 rgba(255,255,255,0.4) !important;
}

.prayer-footnote {
  font-family: 'Caveat', cursive;
  font-weight: 600;
  font-size: 1.1rem;
  color: var(--pastel-pink-darker);
  margin-top: 18px;
  opacity: 0.9;
}

/* ============================================
   CONFETTI + SPARKLE ANIMATIONS
============================================ */
.confetti-container {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 9999;
  overflow: hidden;
}

.confetti-piece {
  position: absolute;
  top: -20px;
  width: 10px;
  height: 14px;
  border-radius: 2px;
  animation: confettiFall linear forwards;
  opacity: 0.9;
  box-shadow: 0 0 4px rgba(0, 0, 0, 0.1);
}

@keyframes confettiFall {
  0% {
    transform: translateY(0) rotate(0deg);
    opacity: 1;
  }
  100% {
    transform: translateY(110vh) rotate(720deg);
    opacity: 0.6;
  }
}

.sparkle-burst {
  position: fixed;
  pointer-events: none;
  z-index: 9999;
  width: 0;
  height: 0;
}

.sparkle-particle {
  position: absolute;
  font-size: 1.3rem;
  animation: sparkleFly 0.9s cubic-bezier(0.4, 0, 0.2, 1) forwards;
  filter: drop-shadow(0 0 4px rgba(255, 200, 100, 0.8));
}

@keyframes sparkleFly {
  0% {
    transform: translate(0, 0) scale(0.5) rotate(0deg);
    opacity: 1;
  }
  60% {
    opacity: 1;
    transform: translate(calc(var(--end-x) * 0.8), calc(var(--end-y) * 0.8)) scale(1.2) rotate(180deg);
  }
  100% {
    transform: translate(var(--end-x), var(--end-y)) scale(0.4) rotate(360deg);
    opacity: 0;
  }
}

/* Choice button feedback animations */
.choice.correct-flash {
  animation: correctPulse 0.6s ease-out;
  background: linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%) !important;
  border-color: #10b981 !important;
  box-shadow: 0 4px 0 #10b981, 0 8px 20px rgba(16, 185, 129, 0.4) !important;
}

@keyframes correctPulse {
  0% { transform: scale(1); }
  35% { transform: scale(1.06); }
  70% { transform: scale(0.98); }
  100% { transform: scale(1); }
}

.choice.wrong-flash {
  animation: wrongShake 0.5s ease-out;
  background: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%) !important;
  border-color: #f87171 !important;
}

@keyframes wrongShake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-6px); }
  40% { transform: translateX(6px); }
  60% { transform: translateX(-4px); }
  80% { transform: translateX(4px); }
}

/* Smooth screen transitions */
.fade-enter {
  animation: fadeSlideIn 0.4s ease-out;
}

@keyframes fadeSlideIn {
  from {
    opacity: 0;
    transform: translateY(12px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* Sound toggle button */
.sound-toggle {
  position: fixed;
  top: 14px;
  right: 72px;
  z-index: 100;
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: linear-gradient(135deg, #fff 0%, var(--pastel-sky-light) 100%);
  border: 3px solid var(--pastel-sky);
  font-size: 1.3rem;
  cursor: pointer;
  box-shadow: 0 3px 0 var(--pastel-sky), 0 5px 12px rgba(125, 211, 252, 0.25);
  transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
  font-family: inherit;
  user-select: none;
}

.sound-toggle:hover {
  transform: scale(1.1);
  box-shadow: 0 5px 0 var(--pastel-sky), 0 8px 18px rgba(125, 211, 252, 0.35);
}

.sound-toggle:active {
  transform: scale(0.95);
}

/* ============================================
   MEMORY MATCH GAME
============================================ */
.mm-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin: 18px 0;
}

@media (min-width: 600px) {
  .mm-grid {
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
  }
}

.mm-card {
  position: relative;
  aspect-ratio: 0.82;
  border-radius: 16px;
  border: 3px solid var(--pastel-pink);
  background: linear-gradient(135deg, #fff 0%, var(--pastel-pink-light) 100%);
  box-shadow: 0 4px 0 var(--pastel-pink), 0 6px 14px rgba(236, 72, 153, 0.2);
  cursor: pointer;
  font-family: 'Quicksand', sans-serif;
  font-weight: 700;
  padding: 8px;
  user-select: none;
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.92rem;
  color: var(--plum-deep);
  overflow: hidden;
  text-align: center;
  line-height: 1.2;
  word-break: break-word;
}

.mm-card:not(:disabled):hover {
  transform: translateY(-3px);
  box-shadow: 0 6px 0 var(--pastel-pink), 0 10px 18px rgba(236, 72, 153, 0.3);
}

.mm-card:not(:disabled):active {
  transform: translateY(2px);
  box-shadow: 0 2px 0 var(--pastel-pink), 0 3px 8px rgba(236, 72, 153, 0.2);
}

.mm-card-back {
  font-family: 'Pacifico', cursive;
  font-size: 2.2rem;
  background: linear-gradient(90deg, var(--pastel-pink-deep), var(--pastel-lavender-deep));
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
}

.mm-card-front {
  display: none;
  font-family: 'Quicksand', sans-serif;
  font-weight: 700;
  font-size: 0.85rem;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  line-height: 1.1;
}

.mm-emoji {
  font-size: 2.4rem;
  line-height: 1;
  filter: drop-shadow(0 2px 3px rgba(0,0,0,0.15));
  margin-bottom: 2px;
}

.mm-text {
  display: block;
  font-size: 0.78rem;
  font-weight: 700;
  text-align: center;
  word-break: break-word;
  max-width: 100%;
}

@media (min-width: 600px) {
  .mm-emoji { font-size: 3rem; }
  .mm-text { font-size: 0.88rem; }
}

.mm-card.mm-flipped .mm-card-back {
  display: none;
}

.mm-card.mm-flipped .mm-card-front {
  display: flex;
}

/* English cards (default theme color used when no inline style) */
.mm-card.mm-card-en.mm-flipped:not([style]) {
  background: linear-gradient(135deg, var(--pastel-pink-light) 0%, #fff 100%);
}

/* Bisaya cards — italic text only */
.mm-card.mm-card-bs.mm-flipped .mm-text {
  font-style: italic;
}

.mm-card.mm-matched {
  background: linear-gradient(135deg, #d1fae5 0%, #a7f3d0 100%) !important;
  border-color: #10b981 !important;
  box-shadow: 0 4px 0 #10b981, 0 0 20px rgba(16, 185, 129, 0.4) !important;
  animation: mmMatchPulse 0.5s ease-out;
}

.mm-card.mm-matched .mm-text {
  color: #047857 !important;
  font-style: normal !important;
}

@keyframes mmMatchPulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.08); }
  100% { transform: scale(1); }
}

@keyframes codePulse {
  0%, 100% {
    box-shadow: 0 0 40px rgba(251, 191, 36, 0.5), 0 6px 0 #f59e0b;
    transform: scale(1);
  }
  50% {
    box-shadow: 0 0 60px rgba(251, 191, 36, 0.8), 0 6px 0 #f59e0b;
    transform: scale(1.01);
  }
}

.mm-card:disabled {
  cursor: not-allowed;
}

/* ============================================
   WORD MATCHER + SOCIETY MATCH (two-column tap)
============================================ */
.wm-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin: 14px 0;
}

.wm-column {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.wm-header {
  font-family: 'Pacifico', cursive;
  color: var(--pastel-pink-darker);
  font-size: 1.1rem;
  text-align: center;
  margin-bottom: 4px;
}

.wm-card {
  padding: 12px 10px;
  background: linear-gradient(135deg, #fff, var(--pastel-pink-light));
  border: 3px solid var(--pastel-pink);
  border-radius: 14px;
  font-family: 'Quicksand', sans-serif;
  font-weight: 700;
  color: var(--plum-deep);
  cursor: pointer;
  font-size: 0.88rem;
  text-align: center;
  word-break: break-word;
  box-shadow: 0 3px 0 var(--pastel-pink);
  transition: all 0.15s;
  min-height: 50px;
}

.wm-card.wm-right {
  background: linear-gradient(135deg, #fff, var(--pastel-lavender-light));
  border-color: var(--pastel-lavender-deep);
  font-style: italic;
  box-shadow: 0 3px 0 var(--pastel-lavender-deep);
}

.wm-card.wm-selected {
  background: linear-gradient(135deg, #fef3c7, #fde68a) !important;
  border-color: #fbbf24 !important;
  box-shadow: 0 3px 0 #f59e0b, 0 0 16px rgba(251, 191, 36, 0.4) !important;
  transform: scale(1.04);
}

.wm-card.wm-matched {
  background: linear-gradient(135deg, #d1fae5, #a7f3d0) !important;
  border-color: #10b981 !important;
  color: #047857 !important;
  box-shadow: 0 3px 0 #10b981 !important;
  font-style: normal !important;
  cursor: not-allowed;
  opacity: 0.85;
}

.wm-card:not(:disabled):hover {
  transform: translateY(-2px);
}

/* ============================================
   PRAYER BUILDER
============================================ */
.pb-word {
  display: inline-block;
  padding: 8px 14px;
  margin: 4px;
  background: linear-gradient(135deg, #fff, var(--pastel-lavender-light));
  border: 2px solid var(--pastel-lavender-deep);
  border-radius: 14px;
  font-family: 'Quicksand', sans-serif;
  font-weight: 700;
  color: var(--plum-deep);
  cursor: pointer;
  font-size: 0.95rem;
  box-shadow: 0 2px 0 var(--pastel-lavender-deep);
  transition: all 0.15s;
}

.pb-word:hover:not(:disabled) {
  transform: translateY(-2px);
  background: linear-gradient(135deg, #fff, var(--pastel-pink-light));
  border-color: var(--pastel-pink-deep);
}

.pb-word:disabled,
.pb-word.pb-used {
  background: #f3f4f6 !important;
  border-color: #d1d5db !important;
  color: #9ca3af !important;
  box-shadow: none !important;
  cursor: not-allowed;

/* ============================================
   BADGES / ACHIEVEMENTS
============================================ */
.badges-section {
  background: linear-gradient(135deg, #fff 0%, var(--pastel-pink-light) 100%);

  border-radius: 18px;
  padding: 14px 16px;
  margin: 16px auto;
  max-width: 520px;
  box-shadow: 0 4px 12px rgba(236, 72, 153, 0.15);
}

.badges-title {
  font-family: 'Quicksand', sans-serif;
  font-weight: 700;
  color: var(--pastel-pink-darker);
  font-size: 1rem;
  margin-bottom: 10px;
  text-align: left;
}

.badges-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(60px, 1fr));
  gap: 10px;
}

.badge {
  aspect-ratio: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.8rem;
  background: linear-gradient(135deg, var(--pastel-yellow), #fcd34d);
  border: 2px solid #fbbf24;
  border-radius: 16px;
  cursor: pointer;
  position: relative;
  box-shadow: 0 3px 0 #fbbf24, 0 5px 10px rgba(251, 191, 36, 0.3);
  transition: all 0.2s ease;
}

.badge:hover {
  transform: translateY(-3px) rotate(5deg);
  box-shadow: 0 6px 0 #fbbf24, 0 8px 16px rgba(251, 191, 36, 0.4);
}

.badge.locked {
  background: linear-gradient(135deg, #e5e7eb, #d1d5db);
  border-color: #9ca3af;
  box-shadow: 0 3px 0 #9ca3af, 0 5px 10px rgba(0, 0, 0, 0.1);
  opacity: 0.6;
  filter: grayscale(80%);
}

.badge.locked::after {
  content: '🔒';
  position: absolute;
  bottom: -4px;
  right: -4px;
  font-size: 0.7rem;
  background: var(--ink);
  color: var(--gold);
  border-radius: 50%;
  padding: 2px;
}

.badge-tooltip {
  position: absolute;
  bottom: calc(100% + 8px);
  left: 50%;
  transform: translateX(-50%);
  background: var(--ink);
  color: var(--gold-glow);
  padding: 8px 12px;
  border-radius: 8px;
  font-size: 0.75rem;
  font-family: 'Fredoka', sans-serif;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
  z-index: 10;
  box-shadow: 0 4px 8px var(--shadow-strong);
}

.badge:hover .badge-tooltip {
  opacity: 1;
}

   STREAK COUNTER (shown during quiz)
============================================ */
.streak-display {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  background: linear-gradient(135deg, #ee4444, var(--crimson));
  color: #fff8e8;
  padding: 4px 10px;
  border-radius: 12px;
  font-family: 'Fredoka', sans-serif;
  font-weight: 600;
  font-size: 0.85rem;
  box-shadow: 0 2px 4px var(--shadow);
  animation: streakPulse 1s ease-in-out infinite;
}

@keyframes streakPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}

/* ============================================
   FLOATING POINT REWARDS (during quiz)
============================================ */
.point-reward {
  position: fixed;
  font-family: 'Cinzel Decorative', serif;
  font-weight: 900;
  font-size: 2rem;
  color: var(--gold-deep);
  text-shadow: 2px 2px 0 var(--crimson-deep), 0 0 20px var(--gold-glow);
  pointer-events: none;
  z-index: 999;
  animation: floatReward 1.5s ease-out forwards;
  white-space: nowrap;
}

@keyframes floatReward {
  0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
  20% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
  60% { transform: translate(-50%, -120%) scale(1); opacity: 1; }
  100% { transform: translate(-50%, -200%) scale(0.8); opacity: 0; }
}

/* ============================================
   LEVEL UP NOTIFICATION
============================================ */
.levelup-overlay {
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at center, rgba(245, 200, 66, 0.4), rgba(0, 0, 0, 0.8));
  z-index: 1001;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: fadeIn 0.4s;
  padding: 20px;
}

.levelup-content {
  background: linear-gradient(135deg, #1a0e05 0%, #2a1a0e 100%);
  border: 4px solid var(--gold);
  border-radius: 24px;
  padding: 36px 28px;
  text-align: center;
  max-width: 400px;
  box-shadow:
    0 0 0 2px var(--gold-deep) inset,
    0 0 60px rgba(245, 200, 66, 0.6),
    0 20px 60px rgba(0, 0, 0, 0.7);
  animation: levelupPop 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
}

@keyframes levelupPop {
  0% { transform: scale(0.3) rotate(-10deg); opacity: 0; }
  60% { transform: scale(1.1) rotate(2deg); }
  100% { transform: scale(1) rotate(0); opacity: 1; }
}

.levelup-label {
  font-family: 'Cinzel', serif;
  font-weight: 700;
  font-size: 0.85rem;
  letter-spacing: 0.3em;
  color: var(--gold-glow);
  text-transform: uppercase;
  margin-bottom: 12px;
  animation: shimmer 2s ease-in-out infinite;
}

@keyframes shimmer {
  0%, 100% { opacity: 0.7; }
  50% { opacity: 1; }
}

.levelup-emblem {
  font-size: 6rem;
  margin: 12px 0;
  filter: drop-shadow(0 0 30px var(--gold));
  animation: emblemSpin 1.5s ease-out;
}

@keyframes emblemSpin {
  from { transform: scale(0) rotate(-720deg); }
  to { transform: scale(1) rotate(0); }
}

.levelup-rank {
  font-family: 'Cinzel Decorative', serif;
  font-weight: 900;
  font-size: 2rem;
  color: var(--gold-glow);
  text-shadow: 2px 2px 0 var(--crimson-deep), 0 0 20px var(--gold);
  margin-bottom: 14px;
  line-height: 1.1;
}

.levelup-tagline {
  font-family: 'Caveat', cursive;
  font-weight: 700;
  font-size: 1.4rem;
  color: var(--gold-glow);
  margin-bottom: 24px;
  opacity: 0.9;
}

@media (max-width: 600px) {
  body { padding: 10px; }

  .question { font-size: 1.1rem; padding: 12px; }
  .completion-code { font-size: 1rem; }
  .title { font-size: 2rem; }

  .lesson-grid { grid-template-columns: 1fr 1fr; gap: 10px; }

// ============================================
// AVE MARIA BACKGROUND MUSIC (embedded MP3)
// ============================================
const AVE_MARIA_DATA = "ave_maria.mp3";  // Separate file in same folder as index.html
let mp3Audio = null;
let mp3Loaded = false;
let musicStarted = false; // tracks if music has ever successfully played

function getMp3Audio() {
  if (mp3Audio) return mp3Audio;
  mp3Audio = new Audio(AVE_MARIA_DATA);
  mp3Audio.loop = true;
  mp3Audio.volume = ambientVolume * 2; // double the slider value, capped at 1
  if (mp3Audio.volume > 1) mp3Audio.volume = 1;
  mp3Audio.preload = 'auto';
  mp3Audio.addEventListener('canplaythrough', () => { mp3Loaded = true; }, { once: true });
  mp3Audio.addEventListener('playing', () => {
    musicStarted = true;
    // Hide the music prompt if showing
    const banner = document.getElementById('music-prompt-banner');
    if (banner) banner.remove();
  });
  mp3Audio.addEventListener('error', (e) => { console.log('MP3 error:', e); });
  return mp3Audio;
}

function playMp3Music() {
  if (!soundsEnabled || !ambientEnabled) return;
  const audio = getMp3Audio();
  audio.volume = Math.min(1, ambientVolume * 2);
  // If already playing, don't restart from beginning
  if (!audio.paused && !audio.ended) return;
  const p = audio.play();
  if (p && p.catch) {
    p.catch(err => {
      console.log('Music blocked by browser:', err);
      // Show the music prompt banner if not already shown
      showMusicPromptBanner();
    });
  }
}

// Show a friendly banner asking user to tap to start music (mobile autoplay fix)
function showMusicPromptBanner() {
  if (document.getElementById('music-prompt-banner')) return; // already shown
  if (!soundsEnabled || !ambientEnabled) return;

  const banner = document.createElement('div');
  banner.id = 'music-prompt-banner';
  banner.style.cssText = `
    position: fixed;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 200;
    background: linear-gradient(135deg, #fff 0%, var(--pastel-pink-light) 100%);
    border: 3px solid var(--pastel-pink-deep);
    border-radius: 24px;
    padding: 12px 20px;
    box-shadow: 0 6px 0 var(--pastel-pink), 0 10px 24px rgba(236, 72, 153, 0.35);
    font-family: 'Quicksand', sans-serif;
    font-weight: 700;
    color: var(--plum-deep);
    font-size: 0.95rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    animation: musicBannerPulse 1.5s ease-in-out infinite;
    max-width: calc(100vw - 40px);
  `;
  banner.innerHTML = `
    <span style="font-size: 1.5rem;">🎵</span>
    <span>Tap to start Ave Maria music 🙏</span>
  `;
  banner.onclick = () => {
    const audio = getMp3Audio();
    const p = audio.play();
    if (p && p.then) {
      p.then(() => {
        banner.remove();
      }).catch(err => {
        console.log('Still blocked:', err);
      });
    }
  };

  // Add pulsing animation
  if (!document.getElementById('music-prompt-styles')) {
    const style = document.createElement('style');
    style.id = 'music-prompt-styles';
    style.textContent = `
      @keyframes musicBannerPulse {
        0%, 100% { transform: translateX(-50%) scale(1); }
        50% { transform: translateX(-50%) scale(1.04); }
      }
    `;
    document.head.appendChild(style);
  }

  document.body.appendChild(banner);
}

function stopMp3Music() {
  if (!mp3Audio) return;
  // Smooth fade out
  const startVol = mp3Audio.volume;
  let v = startVol;
  const fade = setInterval(() => {
    v -= startVol / 10;
    if (v <= 0) {
      clearInterval(fade);
      try { mp3Audio.pause(); mp3Audio.currentTime = 0; } catch(e) {}
      if (mp3Audio) mp3Audio.volume = startVol;
    } else {
      try { mp3Audio.volume = v; } catch(e) {}
    }
  }, 80);
}

function setMp3Volume(vol) {
  if (mp3Audio) {
    try { mp3Audio.volume = Math.min(1, Math.max(0, vol * 2)); } catch(e) {}
  }
}

// Play a tone with envelope
function playTone(frequency, duration, type = 'sine', volume = 0.15, delay = 0) {
  if (!soundsEnabled) return;
  const ctx = initAudio();
  if (!ctx) return;
  // Resume if suspended (browser autoplay policy)
  if (ctx.state === 'suspended') ctx.resume();

  const startTime = ctx.currentTime + delay;
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(frequency, startTime);
  gain.gain.setValueAtTime(0, startTime);
  gain.gain.linearRampToValueAtTime(volume, startTime + 0.01);
  gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
  osc.connect(gain);
  gain.connect(ctx.destination);
  osc.start(startTime);
  osc.stop(startTime + duration);
}

// ============================================
// APPLAUSE (synthesized clapping using filtered noise bursts)
// ============================================
function playApplause(duration = 3.5) {
  if (!soundsEnabled) return;
  const ctx = initAudio();
  if (!ctx) return;
  if (ctx.state === 'suspended') ctx.resume();

  const startTime = ctx.currentTime;

  // Create a single clap burst (filtered noise with quick envelope)
  function makeClap(when, volume = 0.25) {
    // Generate short white noise buffer
    const noiseLen = 0.08;
    const sampleRate = ctx.sampleRate;
    const buffer = ctx.createBuffer(1, sampleRate * noiseLen, sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < data.length; i++) {
      data[i] = (Math.random() * 2 - 1);
    }

    const noise = ctx.createBufferSource();
    noise.buffer = buffer;

    // Bandpass filter to give it a "clap" character (mid-high frequencies)
    const filter = ctx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = 1500 + Math.random() * 1500;
    filter.Q.value = 1.2;

    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0, when);
    gain.gain.linearRampToValueAtTime(volume, when + 0.005);
    gain.gain.exponentialRampToValueAtTime(0.001, when + 0.06);

    noise.connect(filter);
    filter.connect(gain);
    gain.connect(ctx.destination);
    noise.start(when);
    noise.stop(when + noiseLen);
  }

  // Build crowd of claps - many overlapping with random timing for realism
  const totalClaps = 60;
  for (let i = 0; i < totalClaps; i++) {
    // Distribute across duration, with a slight build-up and tail-off
    const progress = i / totalClaps;
    const envelope = Math.sin(progress * Math.PI); // 0 -> 1 -> 0
    const baseTime = progress * duration;
    const jitter = (Math.random() - 0.5) * 0.15;
    const clapTime = startTime + baseTime + jitter;
    const volume = (0.10 + Math.random() * 0.20) * (0.5 + envelope * 0.5);
    makeClap(clapTime, volume);
  }
}

// ============================================
// AMBIENT BACKGROUND PAD (Soft holy strings)
// Persistent looping pad that plays during home/lesson screens
// ============================================
let ambientNodes = null;

function startAmbientPad() {
  // Now plays the embedded Ave Maria MP3 instead of synthesized ambient
  if (!soundsEnabled || !ambientEnabled) return;
  playMp3Music();
}

function _buildAmbientNodes(ctx) {
  if (ambientNodes) return; // guard against double-build

  // Master volume control for ambient (very soft)
  const masterGain = ctx.createGain();
  masterGain.gain.value = ambientVolume;
  masterGain.connect(ctx.destination);

  // Soft lowpass filter for warmth
  const filter = ctx.createBiquadFilter();
  filter.type = 'lowpass';
  filter.frequency.value = 2200;
  filter.Q.value = 0.5;
  filter.connect(masterGain);

  ambientNodes = {
    masterGain,
    filter,
    oscillators: [],
    lfos: [],
    intervalIds: [],
    timeoutIds: [],
    ctx
  };

  // Route to the chosen style
  switch (ambientStyle) {
    case 'chimes':    _buildChimesPad(ctx, filter); break;
    case 'musicbox':  _buildMusicBoxPad(ctx, filter); break;
    case 'ocean':     _buildOceanDrone(ctx, filter); break;
    case 'sparkle':   _buildSparkleArpeggio(ctx, filter); break;
    case 'pad':
    default:          _buildHolyPad(ctx, filter); break;
  }
}

// ---------- STYLE 1: Soft Holy Pad (sustained strings) ----------
function _buildHolyPad(ctx, filter) {
  const chordFreqs = [130.81, 164.81, 196.00, 261.63, 329.63]; // C E G C E
  chordFreqs.forEach((freq, idx) => {
    [0, 5].forEach(detune => {
      const osc = ctx.createOscillator();
      osc.type = 'sine';
      osc.frequency.value = freq;
      osc.detune.value = detune;
      const oscGain = ctx.createGain();
      const target = 0.04 + (Math.random() * 0.02);
      oscGain.gain.value = 0;
      oscGain.gain.linearRampToValueAtTime(target, ctx.currentTime + 3);
      const lfo = ctx.createOscillator();
      lfo.frequency.value = 0.08 + (idx * 0.03);
      const lfoGain = ctx.createGain();
      lfoGain.gain.value = 0.015;
      lfo.connect(lfoGain);
      lfoGain.connect(oscGain.gain);
      osc.connect(oscGain);
      oscGain.connect(filter);
      osc.start();
      lfo.start();
      ambientNodes.oscillators.push(osc);
      ambientNodes.lfos.push(lfo);
    });
  });
}

// ---------- STYLE 2: Gentle Chimes (random bell-like notes) ----------
function _buildChimesPad(ctx, filter) {
  // Pentatonic scale (C major pentatonic) so any random note sounds peaceful
  const notes = [
    523.25, 587.33, 659.25, 783.99, 880.00, // C5 D5 E5 G5 A5
    1046.50, 1174.66, 1318.51, 1567.98       // C6 D6 E6 G6
  ];

  function ringBell() {
    if (!ambientNodes) return;
    const freq = notes[Math.floor(Math.random() * notes.length)];
    const now = ctx.currentTime;
    const duration = 3.5 + Math.random() * 2.0;

    // Bell = fundamental + harmonic
    [1, 2.01].forEach((mult, i) => {
      const osc = ctx.createOscillator();
      osc.type = 'sine';
      osc.frequency.value = freq * mult;
      const g = ctx.createGain();
      const peak = (i === 0 ? 0.18 : 0.06);
      g.gain.setValueAtTime(0, now);
      g.gain.linearRampToValueAtTime(peak, now + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, now + duration);
      osc.connect(g);
      g.connect(filter);
      osc.start(now);
      osc.stop(now + duration + 0.1);
    });

    // Schedule next bell
    const nextDelay = 2500 + Math.random() * 3500; // 2.5–6 sec
    const id = setTimeout(ringBell, nextDelay);
    if (ambientNodes) ambientNodes.timeoutIds.push(id);
  }

  // Start first bell after a moment
  const id = setTimeout(ringBell, 600);
  ambientNodes.timeoutIds.push(id);
}

// ---------- STYLE 3: Music Box (sweet twinkly melody) ----------
function _buildMusicBoxPad(ctx, filter) {
  // Simple lullaby in C major - "Twinkle Twinkle"-like loopable phrase
  // Note frequencies in Hz, duration in seconds, gap before next
  const phrase = [
    {f: 523.25, d: 0.4}, // C5
    {f: 523.25, d: 0.4},
    {f: 783.99, d: 0.4}, // G5
    {f: 783.99, d: 0.4},
    {f: 880.00, d: 0.4}, // A5
    {f: 880.00, d: 0.4},
    {f: 783.99, d: 0.8}, // G5
    {f: 698.46, d: 0.4}, // F5
    {f: 698.46, d: 0.4},
    {f: 659.25, d: 0.4}, // E5
    {f: 659.25, d: 0.4},
    {f: 587.33, d: 0.4}, // D5
    {f: 587.33, d: 0.4},
    {f: 523.25, d: 0.8}, // C5
  ];

  function pluck(freq, when, duration) {
    if (!ambientNodes) return;
    const osc = ctx.createOscillator();
    osc.type = 'triangle';
    osc.frequency.value = freq;
    const g = ctx.createGain();
    g.gain.setValueAtTime(0, when);
    g.gain.linearRampToValueAtTime(0.20, when + 0.005);
    g.gain.exponentialRampToValueAtTime(0.001, when + duration * 1.5);
    // Add a sine harmonic at 2x for sparkle
    const harm = ctx.createOscillator();
    harm.type = 'sine';
    harm.frequency.value = freq * 2;
    const hg = ctx.createGain();
    hg.gain.setValueAtTime(0, when);
    hg.gain.linearRampToValueAtTime(0.05, when + 0.01);
    hg.gain.exponentialRampToValueAtTime(0.001, when + duration);
    osc.connect(g);
    g.connect(filter);
    harm.connect(hg);
    hg.connect(filter);
    osc.start(when);
    osc.stop(when + duration * 1.6);
    harm.start(when);
    harm.stop(when + duration * 1.2);
  }

  function playPhrase() {
    if (!ambientNodes) return;
    let t = ctx.currentTime + 0.3;
    phrase.forEach(note => {
      pluck(note.f, t, note.d);
      t += note.d;
    });
    // Loop with a 2 second pause between phrases
    const totalMs = (phrase.reduce((s, n) => s + n.d, 0) + 2.0) * 1000;
    const id = setTimeout(playPhrase, totalMs);
    if (ambientNodes) ambientNodes.timeoutIds.push(id);
  }

  playPhrase();
}

// ---------- STYLE 4: Ocean Drone (deep peaceful minimal) ----------
function _buildOceanDrone(ctx, filter) {
  // Just two very low sustained tones with slow filter sweep
  const drones = [65.41, 98.00]; // C2 and G2 — perfect fifth, very low
  drones.forEach((freq, idx) => {
    // Triangle wave for a bit more body than pure sine
    const osc = ctx.createOscillator();
    osc.type = 'triangle';
    osc.frequency.value = freq;
    const g = ctx.createGain();
    g.gain.value = 0;
    g.gain.linearRampToValueAtTime(0.10, ctx.currentTime + 4);

    // Very slow LFO on filter for "wave" motion
    const lfo = ctx.createOscillator();
    lfo.frequency.value = 0.05 + (idx * 0.02); // 20-25 second cycles
    const lfoGain = ctx.createGain();
    lfoGain.gain.value = 200;
    lfo.connect(lfoGain);
    lfoGain.connect(filter.frequency);

    osc.connect(g);
    g.connect(filter);
    osc.start();
    lfo.start();
    ambientNodes.oscillators.push(osc);
    ambientNodes.lfos.push(lfo);
  });

  // Optional very soft high shimmer that drifts in occasionally
  function addShimmer() {
    if (!ambientNodes) return;
    const freq = 523.25 * Math.pow(2, Math.floor(Math.random() * 3)); // C5, C6, or C7
    const now = ctx.currentTime;
    const osc = ctx.createOscillator();
    osc.type = 'sine';
    osc.frequency.value = freq;
    const g = ctx.createGain();
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(0.025, now + 2);
    g.gain.linearRampToValueAtTime(0, now + 5);
    osc.connect(g);
    g.connect(filter);
    osc.start(now);
    osc.stop(now + 5.2);
    const id = setTimeout(addShimmer, 8000 + Math.random() * 5000);
    if (ambientNodes) ambientNodes.timeoutIds.push(id);
  }
  const id = setTimeout(addShimmer, 5000);
  ambientNodes.timeoutIds.push(id);
}

// ---------- STYLE 5: Sparkle Arpeggio (ascending harp-like) ----------
function _buildSparkleArpeggio(ctx, filter) {
  // C major arpeggio across 3 octaves
  const arp = [
    261.63, 329.63, 392.00, 523.25,  // C4 E4 G4 C5
    659.25, 783.99, 1046.50, 1318.51 // E5 G5 C6 E6
  ];

  function pluck(freq, when, vol = 0.13) {
    if (!ambientNodes) return;
    const osc = ctx.createOscillator();
    osc.type = 'sine';
    osc.frequency.value = freq;
    const g = ctx.createGain();
    g.gain.setValueAtTime(0, when);
    g.gain.linearRampToValueAtTime(vol, when + 0.01);
    g.gain.exponentialRampToValueAtTime(0.001, when + 1.4);
    osc.connect(g);
    g.connect(filter);
    osc.start(when);
    osc.stop(when + 1.5);
  }

  function playArp() {
    if (!ambientNodes) return;
    const noteGap = 0.25; // seconds between notes
    arp.forEach((freq, i) => {
      pluck(freq, ctx.currentTime + (i * noteGap));
    });
    // Schedule next arpeggio after this one finishes + pause
    const totalMs = (arp.length * noteGap + 3.0) * 1000;
    const id = setTimeout(playArp, totalMs);
    if (ambientNodes) ambientNodes.timeoutIds.push(id);
  }

  playArp();
}

function stopAmbientPad() {
  // Stops the embedded Ave Maria MP3 (with smooth fade)
  stopMp3Music();
  // Also clean up any old synthesized nodes if they happen to exist
  if (ambientNodes) {
    if (ambientNodes.timeoutIds) ambientNodes.timeoutIds.forEach(id => clearTimeout(id));
    if (ambientNodes.intervalIds) ambientNodes.intervalIds.forEach(id => clearInterval(id));
    try { ambientNodes.oscillators.forEach(o => o.stop()); } catch(e) {}
    try { ambientNodes.lfos.forEach(o => o.stop()); } catch(e) {}
    ambientNodes = null;
  }
}

function setAmbientVolume(vol) {
  ambientVolume = Math.max(0, Math.min(0.5, vol));
  saveAmbientPref();
  setMp3Volume(ambientVolume);
}
