function shareToFacebook() {
  // Facebook share dialog
  const url = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(SHARE_URL)}&quote=${encodeURIComponent(SHARE_TEXT)}`;
  window.open(url, '_blank', 'width=600,height=500');
}

function shareToMessenger() {
  // Messenger share — uses m.me link with app id, falls back to copying
  // Since we don't have a Facebook App ID, we'll copy and direct user to Messenger
  copyToClipboard(SHARE_TEXT + ' ' + SHARE_URL);
  showShareToast('Link copied! Open Messenger and paste 📋');
  // Try opening Messenger app
  setTimeout(() => {
    window.open('https://www.messenger.com/', '_blank');
  }, 500);
}

function shareToWhatsApp() {
  const text = encodeURIComponent(SHARE_TEXT + '\n\n' + SHARE_URL);
  window.open(`https://wa.me/?text=${text}`, '_blank');
}

function copyShareLink() {
  copyToClipboard(SHARE_TEXT + '\n\n' + SHARE_URL);
  showShareToast('Link copied! Paste anywhere 📋');
}

function copyToClipboard(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).catch(() => fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.select();
  try { document.execCommand('copy'); } catch(e) {}
  document.body.removeChild(ta);
}

function showShareToast(msg) {
  // Remove any existing toast
  const existing = document.querySelector('.share-toast');
  if (existing) existing.remove();

  const toast = document.createElement('div');
  toast.className = 'share-toast';
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => {
    toast.style.transition = 'opacity 0.4s ease';
    toast.style.opacity = '0';
    setTimeout(() => toast.remove(), 400);
  }, 2400);
}

function buildMassPrintContent() {
  let html = `
    <h2>📖 What This Guide Teaches</h2>
    <p>This guide explains why there are <strong>two ways</strong> to celebrate Holy Mass today — the <strong>Old Mass</strong> (Traditional Latin Mass) and the <strong>New Mass</strong> (Novus Ordo). It includes lessons for three different age groups so the whole family can read together.</p>

    <h2 class="section-break">🌱 For Bunso (Ages 5-7) — Simple Lesson</h2>

    <h3>⛪ What is the Mass?</h3>
    <p>The Holy Mass is when Jesus comes down to us! 💕 The priest changes bread and wine into Jesus's Body and Blood. It is the most special prayer in the whole world!</p>
    <div class="bisaya">~ Ang Banal nga Misa mao ang pag-anhi ni Hesus kanato! Ang pari mag-usab sa pan ug bino nga mahimong Lawas ug Dugo ni Hesus. ~</div>

    <h3>🕰️ Two Ways</h3>
    <p>Today there are <strong>two ways</strong> to do Mass:</p>
    <ul>
      <li><strong>📜 The Old Mass</strong> (Karaan) — In Latin 🙏</li>
      <li><strong>📖 The New Mass</strong> (Bag-o) — In English 🗣️</li>
    </ul>

    <h3>💕 Our Family Loves the Old Mass!</h3>
    <p>The Old Mass is what <strong>all the saints prayed</strong> long ago. 👼 It's like a special gift from heaven that never changes. We love it because:</p>
    <ul style="list-style: none; padding-left: 12px;">
      <li>🤫 It is very quiet and holy</li>
      <li>🙏 We kneel a lot to show love</li>
      <li>👼 The saints prayed it</li>
      <li>📜 It uses the special Latin words</li>
      <li>💫 Jesus is the most important — not us</li>
    </ul>

    <h3>🤲 How I Act at Mass</h3>
    <ul style="list-style: none; padding-left: 12px;">
      <li>🤐 I am very quiet — Jesus is here!</li>
      <li>🙇 I kneel when others kneel</li>
      <li>🙏 I make the sign of the cross</li>
      <li>👀 I watch the priest carefully</li>
      <li>💕 I tell Jesus I love Him</li>
    </ul>

    <h2 class="section-break">🌷 For Manghud (Ages 7-9) — Clear Differences</h2>

    <h3>📜 A Little History</h3>
    <p>For more than <strong>1,500 years</strong>, all Catholics in the world prayed the same Holy Mass. It was in <strong>Latin</strong> — a beautiful, holy language. All the saints prayed it: <strong>St. Padre Pio, St. Therese, St. Maximilian Kolbe, St. Pius X</strong> — they all said the same Mass.</p>
    <p>Then in the <strong>1960s</strong>, a big meeting called <strong>Vatican II</strong> happened. After that, a <strong>new way</strong> of doing Mass was made. This is called the <strong>"Novus Ordo"</strong> (which means "New Order").</p>
    <p>Some Catholics kept praying the <strong>Old Mass</strong> (that's us!). Others use the <strong>New Mass</strong>. Both groups are still Catholics — but our family treasures the Old Mass.</p>

    <h3>🔍 How Are They Different?</h3>
    <table style="width:100%; border-collapse: collapse; margin: 12px 0; font-size: 11pt;">
      <tr style="background: #fef3c7;"><th style="border: 1px solid #d97706; padding: 8px; text-align: left;">Aspect</th><th style="border: 1px solid #d97706; padding: 8px;">📜 OLD MASS</th><th style="border: 1px solid #d97706; padding: 8px;">📖 NEW MASS</th></tr>
      <tr><td style="border: 1px solid #ccc; padding: 6px; font-weight: bold;">Language</td><td style="border: 1px solid #ccc; padding: 6px;">Latin (sacred, never changes)</td><td style="border: 1px solid #ccc; padding: 6px;">English / local language</td></tr>
      <tr><td style="border: 1px solid #ccc; padding: 6px; font-weight: bold;">Priest faces</td><td style="border: 1px solid #ccc; padding: 6px;">Toward God (ad orientem)</td><td style="border: 1px solid #ccc; padding: 6px;">Toward the people</td></tr>
      <tr><td style="border: 1px solid #ccc; padding: 6px; font-weight: bold;">Communion</td><td style="border: 1px solid #ccc; padding: 6px;">Kneeling, on the tongue</td><td style="border: 1px solid #ccc; padding: 6px;">Often standing, in the hand</td></tr>
      <tr><td style="border: 1px solid #ccc; padding: 6px; font-weight: bold;">Music</td><td style="border: 1px solid #ccc; padding: 6px;">Gregorian chant</td><td style="border: 1px solid #ccc; padding: 6px;">Sometimes modern songs</td></tr>
      <tr><td style="border: 1px solid #ccc; padding: 6px; font-weight: bold;">Silence</td><td style="border: 1px solid #ccc; padding: 6px;">Lots of holy silence 🤫</td><td style="border: 1px solid #ccc; padding: 6px;">More talking and activity</td></tr>
      <tr><td style="border: 1px solid #ccc; padding: 6px; font-weight: bold;">Altar</td><td style="border: 1px solid #ccc; padding: 6px;">High altar, tabernacle in center</td><td style="border: 1px solid #ccc; padding: 6px;">A table, tabernacle often to side</td></tr>
    </table>

    <h3>💕 Why is the Old Mass Special?</h3>
    <ul>
      <li><strong>It's the same Mass St. Padre Pio prayed</strong> — with tears!</li>
      <li><strong>It uses Latin</strong> — the Church's holy language</li>
      <li><strong>The priest faces God, not us</strong> — leading us to Heaven</li>
      <li><strong>It's full of reverence</strong> — every gesture is sacred</li>
      <li><strong>It never changes</strong> — kids in the year 600 prayed the same Mass!</li>
      <li><strong>It made saints</strong> — every saint until 1960s prayed this Mass</li>
    </ul>

    <div class="quote">
      "The Mass is the most beautiful thing this side of Heaven."<br>
      <em>— St. Padre Pio</em>
    </div>

    <h3>🙏 We Love All Catholics</h3>
    <p>Catholics who go to the New Mass are still our brothers and sisters in Christ! ❤️ We don't fight with them. We pray that one day, all Catholics will rediscover the beauty of the Old Mass. <strong>Be kind</strong> to your cousins, aunties, and uncles who go to a different Mass. We are <strong>one family</strong> in the Church.</p>

    <h2 class="section-break">⭐ For Magulang (Ages 8-13) — Full History</h2>

    <h3>📜 The Traditional Latin Mass</h3>
    <p><em>Also called: TLM, Tridentine Mass, Old Mass</em></p>
    <p>The Traditional Latin Mass was <strong>codified by Pope St. Pius V in 1570</strong> — but its prayers go back to the very early Church, to the time of the Apostles. For nearly <strong>2,000 years</strong>, this is the Mass that Catholics celebrated all over the world.</p>
    <p>Pope St. Pius V issued the bull <em>Quo Primum</em> declaring this Mass should be used "in perpetuity" — forever. Every saint until the 1960s prayed this Mass: St. Thomas Aquinas, St. Francis of Assisi, St. Therese of Lisieux, St. Padre Pio, and millions of martyrs gave their lives clinging to it.</p>

    <h3>📖 The Novus Ordo Mass</h3>
    <p><em>Also called: New Mass, Mass of Paul VI, NO</em></p>
    <p>After the <strong>Second Vatican Council (1962-1965)</strong>, Pope Paul VI introduced a <strong>new Mass</strong> in 1969. This new Mass made many big changes: the language switched from Latin to local languages, the priest now usually faces the people instead of God, and many sacred prayers and gestures were removed or changed.</p>

    <h3>⚔️ Archbishop Lefebvre & the SSPX</h3>
    <p>A holy French Archbishop named <strong>Marcel Lefebvre</strong> (1905-1991) saw what was happening to the Mass and the Catholic faith. He wanted to <strong>preserve the Old Mass</strong> and the traditional teachings of the Church. So in <strong>1970</strong>, he founded the <strong>Society of Saint Pius X (SSPX)</strong> — named after the great Pope who fought against modernism.</p>
    <p>The SSPX trains priests, builds chapels, and offers the Traditional Latin Mass to faithful Catholics around the world. <strong>Your family attends an SSPX chapel</strong> — that's why you go to the Old Mass! 🙏</p>

    <div class="quote">
      "The Mass is the same yesterday, today, and forever, like Christ Himself."<br>
      <em>— Archbishop Marcel Lefebvre</em>
    </div>

    <h3>💎 Why Does Tradition Matter?</h3>
    <p>Catholic Tradition is <strong>the deposit of faith</strong> handed down from Jesus to the Apostles, and from them to every generation of Catholics. The Old Mass embodies this Tradition perfectly. Every prayer, every gesture, every silence has deep meaning developed over centuries by saints and theologians.</p>
    <p>When we attend the Old Mass, we are praying <strong>exactly</strong> what St. Thomas Aquinas prayed, what St. Francis prayed, what St. Joan of Arc prayed. <strong>This is our inheritance.</strong> Our duty is to love it, learn it, and pass it on.</p>

    <h3>🙏 Always with Charity</h3>
    <p>Faithful Catholics differ on the New Mass. Some see it as valid but inferior. Others see deeper problems. As traditional Catholics, we love and defend the Old Mass. But we never speak unkindly of Catholics who attend the Novus Ordo — most go in good faith, doing their best to love God. We pray for the day when <strong>all Catholics will rediscover the treasure of the Old Mass</strong>.</p>

    <h2 class="section-break">📜 Latin Prayers — Pray Like the Saints</h2>
    <p>Latin is the holy language of the Catholic Church. For nearly 2,000 years, all Catholics — saints and sinners, kings and farmers, in every country — prayed the same prayers in the same Latin words. When you pray in Latin, you join your voice with St. Padre Pio, St. Therese, St. Joan of Arc, and millions of saints!</p>
    <p><em>~ Don't try to learn all of these at once! Start with the Sign of the Cross, then the Glory Be, then the Hail Mary. One prayer per week is enough. Pray with your family! ~</em></p>

    <div class="story-block" style="page-break-inside: avoid;">
      <h3>✝️ The Sign of the Cross</h3>
      <p style="font-style: italic;"><strong>Latin:</strong> In nómine Patris, et Fílii, et Spíritus Sancti. Amen.</p>
      <p><em>(Pronunciation: In NO-mee-nay PAH-trees, et FEE-lee-ee, et SPEE-ree-toos SAHNK-tee. AH-men.)</em></p>
      <p><strong>English:</strong> In the name of the Father, and of the Son, and of the Holy Spirit. Amen.</p>
      <p><strong>Bisaya:</strong> Sa ngalan sa Amahan, ug sa Anak, ug sa Espiritu Santo. Amen.</p>
    </div>

    <div class="story-block" style="page-break-inside: avoid;">
      <h3>🙏 The Our Father (Pater Noster)</h3>
      <p style="font-style: italic; white-space: pre-line;"><strong>Latin:</strong>
Pater noster, qui es in cælis,
sanctificétur nomen tuum.
Advéniat regnum tuum.
Fiat volúntas tua,
sicut in cælo et in terra.
Panem nostrum quotidiánum da nobis hódie,
et dimítte nobis débita nostra,
sicut et nos dimíttimus debitóribus nostris.
Et ne nos indúcas in tentatiónem,
sed líbera nos a malo. Amen.</p>
      <p style="white-space: pre-line;"><strong>English:</strong>
Our Father, who art in Heaven, hallowed be Thy name; Thy Kingdom come, Thy will be done, on earth as it is in Heaven. Give us this day our daily bread, and forgive us our trespasses, as we forgive those who trespass against us. And lead us not into temptation, but deliver us from evil. Amen.</p>
      <p style="white-space: pre-line;"><strong>Bisaya:</strong>
Amahan namo, nga anaa sa langit, balaanon ang imong ngalan. Moabot kanamo ang imong gingharian, matuman ang imong pagbuot dinhi sa yuta maingon sa langit. Hatagi kami karon sa pagkaon namo sa matag adlaw, ug pasayloa kami sa among mga sala sama nga nagapasaylo kami sa mga nakasala kanamo. Ug ayaw kami itugyan sa panulay, hinunoa luwasa kami sa dautan. Amen.</p>
    </div>

    <div class="story-block" style="page-break-inside: avoid;">
      <h3>🌹 The Hail Mary (Ave Maria)</h3>
      <p style="font-style: italic; white-space: pre-line;"><strong>Latin:</strong>
Ave María, grátia plena, Dóminus tecum.
Benedícta tu in muliéribus,
et benedíctus fructus ventris tui, Iesus.
Sancta María, Mater Dei,
ora pro nobis peccatóribus,
nunc et in hora mortis nostræ. Amen.</p>
      <p><strong>English:</strong> Hail Mary, full of grace, the Lord is with thee. Blessed art thou amongst women, and blessed is the fruit of thy womb, Jesus. Holy Mary, Mother of God, pray for us sinners, now and at the hour of our death. Amen.</p>
      <p><strong>Bisaya:</strong> Maghimaya ka Maria, napuno ka sa grasya, ang Ginoo anaa kanimo. Bulahan ka sa babaye nga tanan, ug bulahan ang bunga sa imong tiyan, si Hesus. Santa Maria, Inahan sa Diyos, ig-ampo mo kaming mga makasasala, karon ug sa oras sa among ikamatay. Amen.</p>
    </div>

    <div class="story-block" style="page-break-inside: avoid;">
      <h3>✨ The Glory Be (Gloria Patri)</h3>
      <p style="font-style: italic;"><strong>Latin:</strong> Glória Patri, et Fílio, et Spirítui Sancto. Sicut erat in princípio, et nunc, et semper, et in sǽcula sæculórum. Amen.</p>
      <p><strong>English:</strong> Glory be to the Father, and to the Son, and to the Holy Spirit. As it was in the beginning, is now, and ever shall be, world without end. Amen.</p>
      <p><strong>Bisaya:</strong> Himaya sa Amahan, sa Anak, ug sa Espiritu Santo. Maingon sa sinugdan, karon, ug sa kanunay, ug hangtod sa walay kataposan. Amen.</p>
    </div>

    <div class="story-block" style="page-break-inside: avoid;">
      <h3>👑 Hail Holy Queen (Salve Regina)</h3>
      <p style="font-style: italic; white-space: pre-line;"><strong>Latin:</strong>
Salve, Regína, Mater misericórdiæ,
vita, dulcédo, et spes nostra, salve.
Ad te clamámus, éxsules fílii Hevæ.
Ad te suspirámus, geméntes et flentes
in hac lacrimárum valle.
Eia ergo, Advocáta nostra,
illos tuos misericórdes óculos ad nos convérte.
Et Iesum, benedíctum fructum ventris tui,
nobis post hoc exsílium osténde.
O clemens, o pia, o dulcis Virgo María.</p>
      <p><strong>English:</strong> Hail, Holy Queen, Mother of Mercy, our life, our sweetness, and our hope. To thee do we cry, poor banished children of Eve. To thee do we send up our sighs, mourning and weeping in this valley of tears. Turn then, most gracious Advocate, thine eyes of mercy toward us. And after this our exile, show unto us the blessed fruit of thy womb, Jesus. O clement, O loving, O sweet Virgin Mary.</p>
    </div>

    <div class="story-block" style="page-break-inside: avoid;">
      <h3>🔔 The Angelus</h3>
      <p style="font-style: italic; white-space: pre-line;"><strong>Latin:</strong>
V. Ángelus Dómini nuntiávit Maríæ.
R. Et concépit de Spíritu Sancto. (Hail Mary)

V. Ecce ancílla Dómini.
R. Fiat mihi secúndum verbum tuum. (Hail Mary)

V. Et Verbum caro factum est.
R. Et habitávit in nobis. (Hail Mary)

V. Ora pro nobis, sancta Dei Génitrix.
R. Ut digni efficiámur promissiónibus Christi.</p>
      <p style="white-space: pre-line;"><strong>English:</strong>
V. The Angel of the Lord declared unto Mary.
R. And she conceived of the Holy Spirit. (Hail Mary)
V. Behold the handmaid of the Lord.
R. Be it done unto me according to thy word. (Hail Mary)
V. And the Word was made flesh.
R. And dwelt among us. (Hail Mary)
V. Pray for us, O holy Mother of God.
R. That we may be made worthy of the promises of Christ.</p>
    </div>

    <div class="story-block" style="page-break-inside: avoid;">
      <h3>💕 The Memorare</h3>
      <p style="font-style: italic;"><strong>Latin:</strong> Memoráre, O piíssima Virgo María, non esse audítum a sǽculo, quemquam ad tua curréntem præsídia, tua implorántem auxília, tua peténtem suffrágia, esse derelíctum. Ego tali animátus confidéntia, ad te, Virgo Vírginum, Mater, curro, ad te vénio, coram te gemens peccátor assísto. Noli, Mater Verbi, verba mea despícere; sed áudi propítia et exáudi. Amen.</p>
      <p><strong>English:</strong> Remember, O most gracious Virgin Mary, that never was it known that anyone who fled to thy protection, implored thy help, or sought thy intercession, was left unaided. Inspired by this confidence, I fly unto thee, O Virgin of virgins, my Mother; to thee do I come; before thee I stand, sinful and sorrowful. O Mother of the Word Incarnate, despise not my petitions, but in thy mercy hear and answer me. Amen.</p>
    </div>

    <div class="story-block" style="page-break-inside: avoid;">
      <h3>😇 Prayer to the Guardian Angel (Angele Dei)</h3>
      <p style="font-style: italic; white-space: pre-line;"><strong>Latin:</strong>
Ángele Dei, qui custos es mei,
me, tibi commíssum pietáte supérna,
illúmina, custódi, rege et gubérna. Amen.</p>
      <p style="white-space: pre-line;"><strong>English:</strong>
Angel of God, my guardian dear,
to whom God's love commits me here.
Ever this day be at my side,
to light and guard, to rule and guide. Amen.</p>
      <p><strong>Bisaya:</strong> Anghel sa Diyos, akong mahal nga magbalantay, nga kanako gitugyan sa gugma sa Diyos, karong adlawa hatagi ako og kahayag, panalipdi, dumalaha, ug giyahi ako. Amen.</p>
    </div>

    <h2 class="section-break">📜 The Ten Commandments — Detailed Guide</h2>
    <p><strong>Why include this here?</strong> Before receiving Holy Communion, we must be in a state of grace. That means knowing God's Commandments, examining our conscience, and going to Confession when we sin!</p>
    <p>God gave Moses the Ten Commandments on Mount Sinai over 3,000 years ago. They are <strong>God's rules of love</strong> — the first 3 teach us how to love God, and the last 7 teach us how to love our neighbor.</p>
    <p><em>~ Ang Napulo ka Sugo dili para magsubo kanato — kini magtabang nga magmalipayon ug magbalaan kita! ~</em></p>

    <div class="facts">
      <strong>📋 Two Tables of the Law</strong>
      <p style="margin: 6px 0 0;"><strong>1st Table (Commandments 1-3):</strong> Love God ❤️</p>
      <p style="margin: 0;"><strong>2nd Table (Commandments 4-10):</strong> Love your neighbor 🤝</p>
    </div>
  `;

          </ul>

      `;
    });
  }

  html += `
    <div class="quote" style="background: #fce7f3; border-left: 4px solid #ec4899; padding: 14px 18px; margin: 16px 0;">
      <strong>💕 Jesus' Summary (Matthew 22:37-40):</strong><br>
      "Thou shalt love the Lord thy God with thy whole heart, and with thy whole soul, and with thy whole mind. This is the greatest and the first commandment. And the second is like to this: Thou shalt love thy neighbor as thyself. On these two commandments dependeth the whole law and the prophets."
    </div>

    <h2 class="section-break">🙏 Guide to Confession — Step by Step</h2>
    <p><em>~ Giya sa Pagkumpisal ~</em></p>

    <h3>💕 Why Do We Go to Confession?</h3>
    <p>When we sin, we hurt our friendship with Jesus. Confession (also called <strong>Penance</strong> or <strong>Reconciliation</strong>) is a beautiful Sacrament where Jesus washes away our sins through the priest! It's like a big spiritual bath — we come out clean and white as snow!</p>
    <p>Jesus gave the priests this power on Easter Sunday: <em>"Whose sins you shall forgive, they are forgiven them" (John 20:23)</em>. The priest acts <strong>"in persona Christi"</strong> — in the person of Christ. <strong>Jesus Himself forgives you</strong> through the priest!</p>
    <p><strong>Connection to the Mass:</strong> A person in mortal sin must go to Confession before receiving Holy Communion. To receive Jesus worthily, we must be in His friendship — clean of serious sin.</p>

    <h3>⚖️ Two Kinds of Sin</h3>
    <div class="facts">
      <p style="margin: 0 0 8px;"><strong>💛 Venial Sin (Small Sin):</strong> Small sins that hurt our friendship with Jesus but don't break it. Examples: telling a small lie, saying a mean word, being lazy with prayers.</p>
      <p style="margin: 0;"><strong>❤️‍🩹 Mortal Sin (Big Sin):</strong> Serious sins that <strong>break</strong> our friendship with Jesus. Three things make a sin mortal: (1) Serious matter, (2) You knew it was wrong, (3) You did it anyway with full will. <strong>A person in mortal sin must NOT receive Holy Communion until going to Confession!</strong></p>
    </div>

    <h3>1️⃣ Examination of Conscience</h3>
    <p>Before going to Confession, find a quiet place and think back. Ask yourself questions based on the Ten Commandments:</p>
    <ul>
      <li>🙏 Did I skip my prayers? Did I miss Mass on Sunday?</li>
      <li>✝️ Did I say "Oh my God" or use Jesus' name carelessly?</li>
      <li>👨‍👩‍👧 Did I disobey or talk back to my parents?</li>
      <li>💚 Did I hit, bully, or hate someone?</li>
      <li>💝 Did I look at bad pictures or watch bad shows?</li>
      <li>🤝 Did I steal or cheat in school or games?</li>
      <li>🗣️ Did I lie or gossip?</li>
      <li>🎁 Was I jealous or greedy?</li>
      <li>🙏 Did I miss my Easter duty (yearly Confession + Communion)?</li>
    </ul>
    <p><em>💡 Tip: Try to remember <strong>how many times</strong> for each sin (e.g., "I lied about 3 times").</em></p>

    <h3>2️⃣ Be Sorry (Contrition)</h3>
    <p>Tell Jesus you are sorry — not because you got caught, but because <strong>you love Him</strong> and don't want to hurt Him anymore. <strong>Promise to try not to sin again</strong>, with God's help.</p>

    <h3>3️⃣ In the Confessional</h3>
    <p>Walk to the priest. You can <strong>kneel behind the screen</strong> (traditional way) or sit face-to-face. Then say:</p>
    <div class="quote" style="background: #d1fae5; border-left: 4px solid #10b981;">
      <strong>"Bless me Father, for I have sinned. It has been [time] since my last Confession."</strong><br>
      <em>(Example: "...one week since my last Confession")</em>
    </div>
    <p><strong>Then tell your sins clearly with how many times. Tell ALL mortal sins — don't hide any!</strong></p>
    <ul>
      <li>"I disobeyed my parents 4 times."</li>
      <li>"I lied 2 times."</li>
      <li>"I missed Mass on Sunday 1 time."</li>
    </ul>
    <p>Then say: <strong>"For these and all the sins of my past life, I am heartily sorry."</strong></p>

    <h3>4️⃣ Listen to the Priest</h3>
    <p>The priest may give you advice. Then he will give you a <strong>penance</strong> — usually some prayers to say (like 3 Hail Marys or 1 Our Father). Listen carefully and remember it!</p>

    <h3>5️⃣ Pray the Act of Contrition</h3>
    <div class="quote" style="background: #ede9fe; border-left: 4px solid #7c3aed;">
      <strong>Act of Contrition (English):</strong><br>
      O my God, I am heartily sorry for having offended Thee, and I detest all my sins because of Thy just punishments, but most of all because they offend Thee, my God, who art all good and deserving of all my love. I firmly resolve, with the help of Thy grace, to confess my sins, to do penance, and to amend my life. Amen.
    </div>
    <div class="quote" style="background: #ede9fe; border-left: 4px solid #7c3aed;">
      <strong>Act of Contrition (Bisaya):</strong><br>
      O Diyos ko, masulub-on gayud ako sa akong nahimong kasaypanan Kanimo, ug akong gikalain ang akong mga sala tungod sa Imong matarong nga silot, apan labaw sa tanan tungod kay nakahatag silag kasakit Kanimo, akong Diyos, nga puno sa kaayo ug takus sa tanan kong gugma. Naghimo ako og lig-on nga tinguha, pinaagi sa Imong grasya, sa pagkumpisal sa akong mga sala, sa pagpenitensiya, ug sa pag-usab sa akong kinabuhi. Amen.
    </div>

    <h3>6️⃣ ✨ Absolution! ✨</h3>
    <p>The priest will raise his hand and say: <em>"...and I absolve you from your sins, in the name of the Father, and of the Son, and of the Holy Spirit. Amen."</em></p>
    <p><strong>This is the moment Jesus forgives ALL your sins!</strong> Make the sign of the cross. You can answer: "Amen." The priest may say: <em>"Go in peace."</em> You answer: <strong>"Thanks be to God"</strong> (or "Salamat sa Diyos").</p>

    <h3>7️⃣ Do Your Penance</h3>
    <p>Right after Confession, kneel before the Tabernacle (or near the altar) and <strong>pray your penance</strong>. Don't forget! Then thank Jesus for the beautiful gift of forgiveness.</p>

    <h3>💡 Helpful Tips</h3>
    <ul>
      <li>🌹 <strong>Go often!</strong> Once a month is great. Saints went weekly.</li>
      <li>📓 Write your sins down on paper (then tear it up after).</li>
      <li>😌 Don't be afraid! The priest cannot tell anyone — it's the <strong>Seal of Confession</strong>.</li>
      <li>👼 If you forget a sin, that's okay! Mention it next time.</li>
      <li>💕 Ask Mama Mary to help you make a good confession before you go.</li>
      <li>✨ After Confession, your soul is whiter than snow!</li>
    </ul>

    <div class="quote" style="background: #fce7f3; border-left: 4px solid #ec4899; padding: 14px 18px; margin: 16px 0;">
      <strong>💕 Jesus is Waiting for You!</strong><br>
      Don't be afraid! Jesus loves you SO much that He waits in the confessional just for YOU. Even if your sins are big, His mercy is BIGGER. Come back to Him often, especially before receiving Holy Communion!<br><br>
      <em>~ Si Hesus naghulat kanimo. Ayaw kahadlok — labaw pa kadako ang iyang kalooy kay sa imong sala! ~</em>
    </div>
  `;
  return html;
}

        <em>— St. Padre Pio</em>
      </div>
      <div class="quote" style="background: #fce7f3; border-left: 4px solid #be185d;">
        "Some people are so foolish that they think they can go through life without the help of the Blessed Mother."<br>
        <em>— St. Padre Pio</em>
      </div>
    </div>

    <div class="story-block" style="page-break-inside: avoid;">
      <h3>🛡️ St. Maximilian Kolbe</h3>
      <p style="margin: 0 0 6px;"><strong>1894–1941 • Poland • Martyr of Auschwitz</strong></p>

      <div class="quote" style="background: #ede9fe; border-left: 4px solid #7c3aed;">
        "Never be afraid of loving the Blessed Virgin too much. You can never love her more than Jesus did."<br>
        <em>— St. Maximilian Kolbe</em>
      </div>
    </div>

    <div class="story-block" style="page-break-inside: avoid;">
      <h3>👑 Pope St. Pius X</h3>
      <p style="margin: 0 0 6px;"><strong>1835–1914 • Italy • SSPX Patron Saint</strong></p>
      <p>Our Society's holy patron, Pope St. Pius X, wrote a beautiful encyclical on Mary called <em>Ad Diem Illum</em> (1904). He taught that <strong>Mary is the Mediatrix of all graces</strong> — every grace from Jesus passes through her hands to us. He fought against the heresy of Modernism and worked tirelessly to restore Catholic Tradition. He is the saint after whom the Society of St. Pius X (SSPX) is named — the order that preserves the Traditional Latin Mass for us today!</p>
      <div class="quote" style="background: #d1fae5; border-left: 4px solid #047857;">
        "She is the Mediatrix of every grace which Jesus has won for us by His death and Blood."<br>
        <em>— Pope St. Pius X, Ad Diem Illum</em>
      </div>
    </div>

    <h3 class="section-break">📿 More Marian Saints to Honor</h3>
    <p>The saints who loved Mama Mary are countless! Here are a few more to know and ask for their prayers:</p>
    <ul>
      <li>👑 <strong>St. Joan of Arc</strong> — French warrior maiden devoted to Mary</li>
      <li>🌷 <strong>St. Maria Goretti</strong> — young martyr who forgave her killer</li>
      <li>🇵🇭 <strong>San Lorenzo Ruiz</strong> — first Filipino saint, prayed Rosary at his death</li>
      <li>🌳 <strong>St. Juan Diego</strong> — Mexican peasant chosen by Our Lady of Guadalupe</li>
      <li>👼 <strong>Bl. Jacinta & Francisco Marto</strong> — child seers of Fatima</li>
      <li>📚 <strong>St. Anthony of Padua</strong> — held the Christ Child in his arms</li>
      <li>⚔️ <strong>St. Anthony Mary Claret</strong> — apostle of the Heart of Mary</li>
    </ul>

    <div class="quote" style="background: #fef3c7; border-left: 4px solid #d97706; padding: 14px 18px; margin: 16px 0;">
      <strong>Total Consecration to Mary</strong> (Simple version)<br>
      O Mary, my Mother, I give myself entirely to you today. I give you my body, my soul, my heart, and all that I am. Lead me to Jesus. Help me to love Him more. Keep me always in your motherly care. Amen.
    </div>
  `;
  return html;
}

    <h3>💕 Why Do We Go to Confession?</h3>
    <p>When we sin, we hurt our friendship with Jesus. Confession (also called <strong>Penance</strong> or <strong>Reconciliation</strong>) is a beautiful Sacrament where Jesus washes away our sins through the priest! It's like a big spiritual bath — we come out clean and white as snow!</p>
    <p>Jesus gave the priests this power on Easter Sunday: <em>"Whose sins you shall forgive, they are forgiven them" (John 20:23)</em>. The priest acts <strong>"in persona Christi"</strong> — in the person of Christ. <strong>Jesus Himself forgives you</strong> through the priest!</p>

    <h3>⚖️ Two Kinds of Sin</h3>
    <div class="facts">

    </div>

    <h3>1️⃣ Examination of Conscience</h3>
    <p>Before going to Confession, find a quiet place and think back. Ask yourself questions based on the Ten Commandments:</p>

      <li>🤝 Did I steal or cheat in school or games?</li>
      <li>🗣️ Did I lie or gossip?</li>
      <li>🎁 Was I jealous or greedy?</li>
      <li>🙏 Did I miss my Easter duty (yearly Confession + Communion)?</li>

    <p><em>💡 Tip: Try to remember <strong>how many times</strong> for each sin (e.g., "I lied about 3 times").</em></p>

    <h3>2️⃣ Be Sorry (Contrition)</h3>
    <p>Tell Jesus you are sorry — not because you got caught, but because <strong>you love Him</strong> and don't want to hurt Him anymore. <strong>Promise to try not to sin again</strong>, with God's help.</p>

    <h3>3️⃣ In the Confessional</h3>
    <p>Walk to the priest. You can <strong>kneel behind the screen</strong> (traditional way) or sit face-to-face. Then say:</p>
    <div class="quote" style="background: #d1fae5; border-left: 4px solid #10b981;">
      <strong>"Bless me Father, for I have sinned. It has been [time] since my last Confession."</strong><br>
      <em>(Example: "...one week since my last Confession")</em>
    </div>
    <p><strong>Then tell your sins clearly with how many times. Tell ALL mortal sins — don't hide any!</strong></p>
    <ul>
      <li>"I disobeyed my parents 4 times."</li>
      <li>"I lied 2 times."</li>
      <li>"I missed Mass on Sunday 1 time."</li>
    </ul>
    <p>Then say: <strong>"For these and all the sins of my past life, I am heartily sorry."</strong></p>

    <h3>4️⃣ Listen to the Priest</h3>
    <p>The priest may give you advice. Then he will give you a <strong>penance</strong> — usually some prayers to say (like 3 Hail Marys or 1 Our Father). Listen carefully and remember it!</p>

    <h3>5️⃣ Pray the Act of Contrition</h3>
    <div class="quote" style="background: #ede9fe; border-left: 4px solid #7c3aed;">
      <strong>Act of Contrition (English):</strong><br>
      O my God, I am heartily sorry for having offended Thee, and I detest all my sins because of Thy just punishments, but most of all because they offend Thee, my God, who art all good and deserving of all my love. I firmly resolve, with the help of Thy grace, to confess my sins, to do penance, and to amend my life. Amen.
    </div>
    <div class="quote" style="background: #ede9fe; border-left: 4px solid #7c3aed;">
      <strong>Act of Contrition (Bisaya):</strong><br>
      O Diyos ko, masulub-on gayud ako sa akong nahimong kasaypanan Kanimo, ug akong gikalain ang akong mga sala tungod sa Imong matarong nga silot, apan labaw sa tanan tungod kay nakahatag silag kasakit Kanimo, akong Diyos, nga puno sa kaayo ug takus sa tanan kong gugma. Naghimo ako og lig-on nga tinguha, pinaagi sa Imong grasya, sa pagkumpisal sa akong mga sala, sa pagpenitensiya, ug sa pag-usab sa akong kinabuhi. Amen.
    </div>

    <h3>6️⃣ ✨ Absolution! ✨</h3>
    <p>The priest will raise his hand and say: <em>"...and I absolve you from your sins, in the name of the Father, and of the Son, and of the Holy Spirit. Amen."</em></p>
    <p><strong>This is the moment Jesus forgives ALL your sins!</strong> Make the sign of the cross. You can answer: "Amen." The priest may say: <em>"Go in peace."</em> You answer: <strong>"Thanks be to God"</strong> (or "Salamat sa Diyos").</p>

    <h3>7️⃣ Do Your Penance</h3>
    <p>Right after Confession, kneel before the Tabernacle (or near the altar) and <strong>pray your penance</strong>. Don't forget! Then thank Jesus for the beautiful gift of forgiveness.</p>

    <h3>💡 Helpful Tips</h3>
    <ul>
      <li>🌹 <strong>Go often!</strong> Once a month is great. Saints went weekly.</li>
      <li>📓 Write your sins down on paper (then tear it up after).</li>
      <li>😌 Don't be afraid! The priest cannot tell anyone — it's the <strong>Seal of Confession</strong>.</li>

      <em>~ Si Hesus naghulat kanimo. Ayaw kahadlok — labaw pa kadako ang iyang kalooy kay sa imong sala! ~</em>
    </div>
  `;

  return html;
}

let bibleStoriesState = { selectedStory: null };

function renderBibleStories() {
  if (!activeStudent) return renderWhoIsPlaying();
  const oldTestament = BIBLE_STORIES.filter(s => s.testament === 'Old');
  const newTestament = BIBLE_STORIES.filter(s => s.testament === 'New');

  const buildCard = (s, color) => `
    <button onclick="renderBibleStory('${s.id}')" style="display: block; width: 100%; background: linear-gradient(135deg, #fff, ${color}); border: 3px solid ${color === '#fef3c7' ? '#d97706' : '#7c3aed'}; border-radius: 18px; padding: 14px 12px; margin: 8px 0; cursor: pointer; font-family: 'Quicksand', sans-serif; box-shadow: 0 4px 0 ${color === '#fef3c7' ? '#92400e' : '#5b21b6'}; text-align: left;">
      <div style="display: flex; align-items: center; gap: 12px;">
        <div style="font-size: 2.4rem;">${s.icon}</div>
        <div style="flex: 1;">
          <h3 style="font-family: 'Pacifico', cursive; color: ${color === '#fef3c7' ? '#92400e' : '#5b21b6'}; margin: 0; font-size: 1.2rem; line-height: 1.1;">${escapeHtml(s.name)}</h3>
          <p style="font-family: 'Caveat', cursive; color: #be185d; font-size: 0.95rem; margin: 2px 0;">~ ${escapeHtml(s.nameBs)} ~</p>
          <p style="font-family: 'Quicksand', sans-serif; color: var(--plum-deep); font-size: 0.78rem; margin: 0; font-weight: 700;">📖 ${escapeHtml(s.book)}</p>
        </div>
      </div>
    </button>
  `;

  render(`
    <button class="share-button" onclick="openShareSheet()" title="Share">📤</button>
    <button class="sound-toggle" onclick="toggleSounds(); renderBibleStories();">${soundsEnabled ? "🔊" : "🔇"}</button>
    <div class="home" style="background: linear-gradient(180deg, #fff 0%, #fef3c7 50%, #d1fae5 100%); border-radius: 22px; padding: 22px 16px;">

      <div style="display: flex; justify-content: center; align-items: center; gap: 8px; margin-bottom: 14px; flex-wrap: wrap;">
        <button onclick="renderHome()" style="background: linear-gradient(180deg, #fff 0%, #fef3c7 100%); border: 3px solid #d97706; color: #92400e; font-family: 'Quicksand', sans-serif; font-weight: 700; padding: 10px 20px; border-radius: 16px; cursor: pointer; font-size: 0.95rem; box-shadow: 0 4px 0 #d97706;">
          🏠 ← All Categories
        </button>
        <button onclick="printCategory('bible')" title="Print all stories" style="background: linear-gradient(180deg, #fff 0%, #fef3c7 100%); border: 2px solid #d97706; color: #92400e; font-family: 'Quicksand', sans-serif; font-weight: 700; padding: 8px 12px; border-radius: 14px; cursor: pointer; font-size: 0.85rem; box-shadow: 0 3px 0 #d97706;">
          🖨️
        </button>
      </div>

      <div style="text-align: center;">
        <div style="font-size: 4rem;">📖 ✝️ 🌟</div>
        <h1 style="font-family: 'Pacifico', cursive; color: #92400e; font-size: 2.2rem; text-shadow: 2px 2px 0 #fff; margin: 6px 0;">Bible Stories for Kids</h1>
        <p style="font-family: 'Caveat', cursive; color: #be185d; font-size: 1.3rem;">~ Mga Sugilanon sa Bibliya ~</p>
      </div>

      <!-- Intro -->
      <div style="background: linear-gradient(135deg, #fff, #fef3c7); border: 3px solid #d97706; border-radius: 18px; padding: 16px; margin: 18px 0; box-shadow: 0 4px 0 #d97706;">
        <h2 style="font-family: 'Pacifico', cursive; color: #92400e; font-size: 1.4rem; margin: 0 0 8px;">📚 What Will I Learn?</h2>
        <p style="font-family: 'Quicksand', sans-serif; color: var(--plum-deep); line-height: 1.6; font-size: 0.95rem;">
          The Bible is God's true story, told over thousands of years. Here you'll find <strong>14 essential stories</strong> — 7 from the <strong>Old Testament</strong> (before Jesus) and 7 from the <strong>New Testament</strong> (the life of Jesus). Each story includes English and Bisaya, with a lesson at the end!
        </p>
      </div>

      <!-- Old Testament -->
      <h2 style="font-family: 'Pacifico', cursive; color: #92400e; font-size: 1.5rem; text-align: center; margin: 18px 0 4px;">📜 Old Testament</h2>
      <p style="font-family: 'Caveat', cursive; color: #be185d; text-align: center; font-size: 1.1rem; margin-bottom: 12px;">~ Karaang Tugon ~ Before Jesus came</p>
      ${oldTestament.map(s => buildCard(s, '#fef3c7')).join('')}

      <!-- New Testament -->
      <h2 style="font-family: 'Pacifico', cursive; color: #5b21b6; font-size: 1.5rem; text-align: center; margin: 22px 0 4px;">✝️ New Testament</h2>
      <p style="font-family: 'Caveat', cursive; color: #be185d; text-align: center; font-size: 1.1rem; margin-bottom: 12px;">~ Bag-ong Tugon ~ The Life of Jesus</p>
      ${newTestament.map(s => buildCard(s, '#ede9fe')).join('')}

    </div>
  `);
}

function renderBibleStory(storyId) {
  if (!activeStudent) return renderWhoIsPlaying();
  const s = BIBLE_STORIES.find(x => x.id === storyId);
  if (!s) return renderBibleStories();

  const isOld = s.testament === 'Old';
  const accentColor = isOld ? '#92400e' : '#5b21b6';
  const bgColor = isOld ? '#fef3c7' : '#ede9fe';

  render(`
    <button class="sound-toggle" onclick="toggleSounds(); renderBibleStory('${storyId}');">${soundsEnabled ? "🔊" : "🔇"}</button>

        <p style="font-family: 'Quicksand', sans-serif; color: var(--plum-deep); font-size: 0.9rem; font-weight: 700; margin: 6px 0;">📖 ${escapeHtml(s.book)}</p>
      </div>

      <!-- ENGLISH STORY -->

        <div style="font-family: 'Quicksand', sans-serif; font-weight: 700; color: ${accentColor}; font-size: 0.85rem; letter-spacing: 0.15em; margin-bottom: 8px;">📖 THE STORY</div>
        <p style="font-family: 'Quicksand', sans-serif; color: var(--plum-deep); line-height: 1.7; font-size: 1rem;">${escapeHtml(s.en)}</p>
      </div>

        <div style="font-size: 2rem;">💕</div>

        </p>
      </div>

        <div style="font-size: 4rem;">🙏 ✝️ 💕</div>
        <h1 style="font-family: 'Pacifico', cursive; color: #5b21b6; font-size: 2rem; margin: 8px 0; text-shadow: 1px 1px 0 #fff;">Guide to Confession</h1>
        <p style="font-family: 'Caveat', cursive; color: #be185d; font-size: 1.3rem;">~ Giya sa Pagkumpisal ~</p>
      </div>

      <!-- Why Confession -->
      <div style="background: linear-gradient(135deg, #fff, #ede9fe); border: 3px solid #7c3aed; border-radius: 18px; padding: 16px; margin: 16px 0; box-shadow: 0 4px 0 #7c3aed;">
        <h2 style="font-family: 'Pacifico', cursive; color: #5b21b6; font-size: 1.4rem; margin: 0 0 8px;">💕 Why Do We Go to Confession?</h2>
        <p style="font-family: 'Quicksand', sans-serif; color: var(--plum-deep); line-height: 1.6; font-size: 0.95rem;">
          When we sin, we hurt our friendship with Jesus. Confession (also called <strong>Penance</strong> or <strong>Reconciliation</strong>) is a beautiful Sacrament where Jesus washes away our sins through the priest! It's like a big <strong>spiritual bath</strong> 🛁 — we come out clean and white as snow!
        </p>
        <p style="font-family: 'Quicksand', sans-serif; color: var(--plum-deep); line-height: 1.6; font-size: 0.95rem; margin-top: 8px;">
          Jesus gave the priests this power on Easter Sunday: <em>"Whose sins you shall forgive, they are forgiven them" (John 20:23)</em>. The priest acts <strong>"in persona Christi"</strong> — in the person of Christ. <strong>Jesus Himself forgives you</strong> through the priest!
        </p>
        <p style="font-family: 'Quicksand', sans-serif; font-style: italic; color: var(--pastel-lavender-darker); font-size: 0.88rem; line-height: 1.5; margin-top: 8px;">
          ~ Ang pagkumpisal mao ang pagsuluk-an sa kalag. Si Hesus mismo ang nagpasaylo kanato pinaagi sa pari! ~
        </p>
      </div>

      <!-- Two Kinds of Sin -->
      <div style="background: linear-gradient(135deg, #fff, #fef3c7); border: 3px solid #d97706; border-radius: 18px; padding: 16px; margin: 14px 0;">
        <h2 style="font-family: 'Pacifico', cursive; color: #92400e; font-size: 1.4rem; margin: 0 0 10px;">⚖️ Two Kinds of Sin</h2>

        <div style="background: rgba(255,255,255,0.85); border-left: 4px solid #fbbf24; padding: 12px 14px; margin: 8px 0; border-radius: 8px;">
          <h4 style="font-family: 'Pacifico', cursive; color: #d97706; margin: 0 0 4px; font-size: 1.1rem;">💛 Venial Sin (Small Sin)</h4>
          <p style="font-family: 'Quicksand', sans-serif; color: var(--plum-deep); font-size: 0.92rem; line-height: 1.5; margin: 0;">
            Small sins that hurt our friendship with Jesus but don't break it. Example: telling a small lie, saying a mean word, being lazy with prayers.
          </p>
        </div>

        <div style="background: rgba(255,255,255,0.85); border-left: 4px solid #dc2626; padding: 12px 14px; margin: 8px 0; border-radius: 8px;">
          <h4 style="font-family: 'Pacifico', cursive; color: #b91c1c; margin: 0 0 4px; font-size: 1.1rem;">❤️‍🩹 Mortal Sin (Big Sin)</h4>
          <p style="font-family: 'Quicksand', sans-serif; color: var(--plum-deep); font-size: 0.92rem; line-height: 1.5; margin: 0 0 6px;">
            Serious sins that <strong>break</strong> our friendship with Jesus. Three things make a sin mortal:
          </p>
          <ul style="font-family: 'Quicksand', sans-serif; color: var(--plum-deep); font-size: 0.9rem; line-height: 1.5; margin: 0; padding-left: 20px;">
            <li>Serious matter (like a big lie, hating someone)</li>
            <li>You knew it was wrong</li>
            <li>You did it anyway with full will</li>
          </ul>
          <p style="font-family: 'Quicksand', sans-serif; color: #b91c1c; font-size: 0.88rem; line-height: 1.5; margin: 6px 0 0; font-weight: 700;">
            ⚠️ A person in mortal sin must NOT receive Holy Communion until going to Confession!
          </p>
        </div>
      </div>

      <!-- Step 1 Examination -->
      <div style="background: linear-gradient(135deg, #fff, #dbeafe); border: 3px solid #2563eb; border-radius: 18px; padding: 16px; margin: 14px 0; box-shadow: 0 4px 0 #2563eb;">
        <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 10px;">
          <div style="background: #2563eb; color: #fff; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Pacifico', cursive; font-size: 1.4rem; box-shadow: 0 3px 0 #1e40af;">1</div>
          <h2 style="font-family: 'Pacifico', cursive; color: #1e40af; font-size: 1.4rem; margin: 0;">Examination of Conscience</h2>
        </div>
        <p style="font-family: 'Quicksand', sans-serif; color: var(--plum-deep); line-height: 1.6; font-size: 0.95rem; margin-bottom: 10px;">
          Before going to Confession, find a quiet place and think back. Ask yourself questions based on the Ten Commandments:
        </p>
        <div style="background: rgba(255,255,255,0.85); border-left: 4px solid #2563eb; padding: 12px 14px; border-radius: 8px;">
          <ul style="font-family: 'Quicksand', sans-serif; color: var(--plum-deep); font-size: 0.92rem; line-height: 1.7; margin: 0; padding-left: 18px;">
            <li>🙏 Did I skip my prayers? Did I miss Mass on Sunday?</li>
            <li>✝️ Did I say "Oh my God" or use Jesus' name carelessly?</li>
            <li>👨‍👩‍👧 Did I disobey or talk back to my parents?</li>
            <li>💚 Did I hit, bully, or hate someone?</li>
            <li>💝 Did I look at bad pictures or watch bad shows?</li>
            <li>🤝 Did I steal or cheat in school or games?</li>
            <li>🗣️ Did I lie or gossip?</li>
            <li>🎁 Was I jealous or greedy?</li>
            <li>🙏 Did I miss my Easter duty (yearly Confession + Communion)?</li>
          </ul>
        </div>
        <p style="font-family: 'Quicksand', sans-serif; font-style: italic; color: var(--pastel-lavender-darker); font-size: 0.88rem; margin-top: 8px;">
          💡 Tip: Try to remember <strong>how many times</strong> for each sin (e.g., "I lied about 3 times").
        </p>
      </div>

      <!-- Step 2 -->
      <div style="background: linear-gradient(135deg, #fff, #fce7f3); border: 3px solid #ec4899; border-radius: 18px; padding: 16px; margin: 14px 0; box-shadow: 0 4px 0 #ec4899;">
        <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 10px;">
          <div style="background: #ec4899; color: #fff; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Pacifico', cursive; font-size: 1.4rem; box-shadow: 0 3px 0 #be185d;">2</div>
          <h2 style="font-family: 'Pacifico', cursive; color: #be185d; font-size: 1.4rem; margin: 0;">Be Sorry (Contrition)</h2>
        </div>
        <p style="font-family: 'Quicksand', sans-serif; color: var(--plum-deep); line-height: 1.6; font-size: 0.95rem;">
          Tell Jesus you are sorry — not because you got caught, but because <strong>you love Him</strong> and don't want to hurt Him anymore. <strong>Promise to try not to sin again</strong>, with God's help.
        </p>
      </div>

      <!-- Step 3 -->
      <div style="background: linear-gradient(135deg, #fff, #d1fae5); border: 3px solid #10b981; border-radius: 18px; padding: 16px; margin: 14px 0; box-shadow: 0 4px 0 #10b981;">
        <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 10px;">
          <div style="background: #10b981; color: #fff; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Pacifico', cursive; font-size: 1.4rem; box-shadow: 0 3px 0 #047857;">3</div>
          <h2 style="font-family: 'Pacifico', cursive; color: #047857; font-size: 1.4rem; margin: 0;">In the Confessional</h2>
        </div>
        <p style="font-family: 'Quicksand', sans-serif; color: var(--plum-deep); line-height: 1.6; font-size: 0.95rem; margin-bottom: 10px;">
          Walk to the priest. You can <strong>kneel behind the screen</strong> (traditional way, very holy!) or sit face-to-face. Then say:
        </p>

        <div style="background: rgba(255,255,255,0.85); border-left: 4px solid #10b981; padding: 14px 16px; border-radius: 8px; margin: 10px 0;">
          <h4 style="font-family: 'Pacifico', cursive; color: #047857; margin: 0 0 6px; font-size: 1.1rem;">📜 The Script:</h4>
          <p style="font-family: 'Quicksand', sans-serif; color: var(--plum-deep); font-size: 0.95rem; line-height: 1.7; margin: 0;">
            ✝️ <strong>"Bless me Father, for I have sinned. It has been [time] since my last Confession."</strong><br>
            <span style="color: var(--pastel-lavender-darker); font-style: italic;">(Example: "...one week since my last Confession")</span>
          </p>
        </div>

        <div style="background: rgba(255,255,255,0.85); border-left: 4px solid #10b981; padding: 14px 16px; border-radius: 8px; margin: 10px 0;">
          <h4 style="font-family: 'Pacifico', cursive; color: #047857; margin: 0 0 6px; font-size: 1.1rem;">🗣️ Then Tell Your Sins:</h4>
          <p style="font-family: 'Quicksand', sans-serif; color: var(--plum-deep); font-size: 0.95rem; line-height: 1.7; margin: 0;">
            Say each sin clearly with how many times. <strong>Tell ALL mortal sins</strong> — don't hide any! Examples:<br>
            • "I disobeyed my parents 4 times."<br>
            • "I lied 2 times."<br>
            • "I missed Mass on Sunday 1 time."
          </p>
        </div>

        <div style="background: rgba(255,255,255,0.85); border-left: 4px solid #10b981; padding: 14px 16px; border-radius: 8px; margin: 10px 0;">
          <h4 style="font-family: 'Pacifico', cursive; color: #047857; margin: 0 0 6px; font-size: 1.1rem;">🙏 Then Say:</h4>
          <p style="font-family: 'Quicksand', sans-serif; color: var(--plum-deep); font-size: 0.95rem; line-height: 1.7; margin: 0;">
            <strong>"For these and all the sins of my past life, I am heartily sorry."</strong>
          </p>
        </div>
      </div>

      <!-- Step 4 -->
      <div style="background: linear-gradient(135deg, #fff, #fef3c7); border: 3px solid #d97706; border-radius: 18px; padding: 16px; margin: 14px 0; box-shadow: 0 4px 0 #d97706;">
        <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 10px;">
          <div style="background: #d97706; color: #fff; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Pacifico', cursive; font-size: 1.4rem; box-shadow: 0 3px 0 #92400e;">4</div>
          <h2 style="font-family: 'Pacifico', cursive; color: #92400e; font-size: 1.4rem; margin: 0;">Listen to the Priest</h2>
        </div>
        <p style="font-family: 'Quicksand', sans-serif; color: var(--plum-deep); line-height: 1.6; font-size: 0.95rem;">
          The priest may give you advice. Then he will give you a <strong>penance</strong> — usually some prayers to say (like 3 Hail Marys or 1 Our Father). <strong>Listen carefully and remember it!</strong> 👂
        </p>
      </div>

      <!-- Step 5 - Act of Contrition -->
      <div style="background: linear-gradient(135deg, #fff, #ede9fe); border: 3px solid #7c3aed; border-radius: 18px; padding: 16px; margin: 14px 0; box-shadow: 0 4px 0 #7c3aed;">
        <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 10px;">
          <div style="background: #7c3aed; color: #fff; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Pacifico', cursive; font-size: 1.4rem; box-shadow: 0 3px 0 #5b21b6;">5</div>
          <h2 style="font-family: 'Pacifico', cursive; color: #5b21b6; font-size: 1.4rem; margin: 0;">Pray the Act of Contrition</h2>
        </div>
        <p style="font-family: 'Quicksand', sans-serif; color: var(--plum-deep); line-height: 1.6; font-size: 0.95rem; margin-bottom: 10px;">
          When the priest tells you, pray this prayer slowly and with love. Memorize it!
        </p>

        <div style="background: rgba(255,255,255,0.95); border: 2px solid #7c3aed; padding: 14px 16px; border-radius: 12px; margin: 10px 0;">
          <h4 style="font-family: 'Pacifico', cursive; color: #5b21b6; margin: 0 0 8px; font-size: 1.15rem; text-align: center;">📜 Act of Contrition</h4>
          <p style="font-family: 'Georgia', serif; color: var(--plum-deep); font-style: italic; font-size: 0.95rem; line-height: 1.7; margin: 0; text-align: center;">
            O my God, I am heartily sorry for having offended Thee, and I detest all my sins because of Thy just punishments, but most of all because they offend Thee, my God, who art all good and deserving of all my love. I firmly resolve, with the help of Thy grace, to confess my sins, to do penance, and to amend my life. Amen.
          </p>
        </div>

        <div style="background: rgba(255,255,255,0.85); border-left: 4px solid #7c3aed; padding: 12px 14px; margin: 10px 0; border-radius: 8px;">
          <h4 style="font-family: 'Pacifico', cursive; color: #6d28d9; margin: 0 0 6px; font-size: 1rem;">🇵🇭 Bisaya Version:</h4>
          <p style="font-family: 'Quicksand', sans-serif; color: var(--pastel-lavender-darker); font-style: italic; font-size: 0.92rem; line-height: 1.6; margin: 0;">
            O Diyos ko, masulub-on gayud ako sa akong nahimong kasaypanan Kanimo, ug akong gikalain ang akong mga sala tungod sa Imong matarong nga silot, apan labaw sa tanan tungod kay nakahatag silag kasakit Kanimo, akong Diyos, nga puno sa kaayo ug takus sa tanan kong gugma. Naghimo ako og lig-on nga tinguha, pinaagi sa Imong grasya, sa pagkumpisal sa akong mga sala, sa pagpenitensiya, ug sa pag-usab sa akong kinabuhi. Amen.
          </p>
        </div>
      </div>

      <!-- Step 6 - Absolution -->
      <div style="background: linear-gradient(135deg, #fff, #fef3c7); border: 3px solid #fbbf24; border-radius: 18px; padding: 16px; margin: 14px 0; box-shadow: 0 4px 0 #d97706;">
        <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 10px;">
          <div style="background: linear-gradient(135deg, #fbbf24, #d97706); color: #fff; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Pacifico', cursive; font-size: 1.4rem; box-shadow: 0 3px 0 #92400e;">6</div>
          <h2 style="font-family: 'Pacifico', cursive; color: #92400e; font-size: 1.4rem; margin: 0;">✨ Absolution! ✨</h2>
        </div>
        <p style="font-family: 'Quicksand', sans-serif; color: var(--plum-deep); line-height: 1.6; font-size: 0.95rem;">
          The priest will raise his hand and say beautiful words ending with: <em>"...and I absolve you from your sins, in the name of the Father, and of the Son, and of the Holy Spirit. Amen."</em>
        </p>
        <p style="font-family: 'Quicksand', sans-serif; color: var(--plum-deep); line-height: 1.6; font-size: 0.95rem; margin-top: 8px;">
          🌟 <strong>This is the moment Jesus forgives ALL your sins!</strong> Make the sign of the cross. You can answer: "Amen."
        </p>
        <p style="font-family: 'Quicksand', sans-serif; color: var(--plum-deep); line-height: 1.6; font-size: 0.95rem; margin-top: 8px;">
          The priest may say: <em>"Go in peace."</em> You can answer: <strong>"Thanks be to God"</strong> (or "Salamat sa Diyos").
        </p>
      </div>

      <!-- Step 7 - Penance -->
      <div style="background: linear-gradient(135deg, #fff, #d1fae5); border: 3px solid #10b981; border-radius: 18px; padding: 16px; margin: 14px 0; box-shadow: 0 4px 0 #10b981;">
        <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 10px;">
          <div style="background: #10b981; color: #fff; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Pacifico', cursive; font-size: 1.4rem; box-shadow: 0 3px 0 #047857;">7</div>
          <h2 style="font-family: 'Pacifico', cursive; color: #047857; font-size: 1.4rem; margin: 0;">Do Your Penance</h2>
        </div>
        <p style="font-family: 'Quicksand', sans-serif; color: var(--plum-deep); line-height: 1.6; font-size: 0.95rem;">
          Right after Confession, kneel before the Tabernacle (or near the altar) and <strong>pray your penance</strong>. Don't forget! Then thank Jesus for the beautiful gift of forgiveness. 🙏
        </p>
      </div>

      <!-- Tips -->
      <div style="background: linear-gradient(135deg, #fff, #fef3c7); border: 3px dashed #d97706; border-radius: 18px; padding: 16px; margin: 14px 0;">
        <h2 style="font-family: 'Pacifico', cursive; color: #92400e; font-size: 1.3rem; margin: 0 0 10px;">💡 Helpful Tips</h2>
        <ul style="font-family: 'Quicksand', sans-serif; color: var(--plum-deep); line-height: 1.8; font-size: 0.92rem; margin: 0; padding-left: 20px;">
          <li>🌹 <strong>Go often!</strong> Once a month is great. Saints went weekly.</li>
          <li>📓 Write your sins down on paper (then tear it up after).</li>
          <li>😌 Don't be afraid! The priest cannot tell anyone — it's the <strong>Seal of Confession</strong>.</li>
          <li>👼 If you forget a sin, that's okay! Mention it next time.</li>
          <li>💕 Ask Mama Mary to help you make a good confession before you go.</li>
          <li>✨ After Confession, your soul is whiter than snow!</li>
        </ul>
      </div>

      <!-- Final Encouragement -->
      <div style="background: linear-gradient(135deg, #fff, #fce7f3); border: 3px solid #ec4899; border-radius: 20px; padding: 18px; margin: 14px 0; text-align: center; box-shadow: 0 4px 0 #ec4899;">
        <div style="font-size: 2.5rem;">💕✨🌹</div>
        <h3 style="font-family: 'Pacifico', cursive; color: #be185d; font-size: 1.4rem; margin: 6px 0;">Jesus is Waiting for You!</h3>
        <p style="font-family: 'Quicksand', sans-serif; color: var(--plum-deep); line-height: 1.6; font-size: 0.95rem;">
          Don't be afraid! Jesus loves you SO much that He waits in the confessional just for YOU. Even if your sins are big, His mercy is BIGGER. Come back to Him often. 🙏
        </p>
        <p style="font-family: 'Caveat', cursive; color: var(--pastel-lavender-darker); font-size: 1.1rem; margin: 8px 0 0;">
          ~ Si Hesus naghulat kanimo. Ayaw kahadlok — labaw pa kadako ang iyang kalooy kay sa imong sala! ~
        </p>
      </div>

      <button onclick="renderTenCommandments()" style="width: 100%; background: linear-gradient(180deg, #ede9fe 0%, #7c3aed 100%); color: #fff; border: 3px solid #5b21b6; border-radius: 18px; padding: 14px 18px; cursor: pointer; font-family: 'Quicksand', sans-serif; font-weight: 700; font-size: 1.05rem; box-shadow: 0 5px 0 #5b21b6; margin: 8px 0;">
        ← Back to Ten Commandments
      </button>
      <button onclick="renderBibleStory('moses')" style="width: 100%; background: linear-gradient(180deg, #fef3c7 0%, #d97706 100%); color: #fff; border: 3px solid #92400e; border-radius: 18px; padding: 14px 18px; cursor: pointer; font-family: 'Quicksand', sans-serif; font-weight: 700; font-size: 1.05rem; box-shadow: 0 5px 0 #92400e; margin: 8px 0;">
        📖 Back to Moses Story
      </button>
    </div>
  `);
}
