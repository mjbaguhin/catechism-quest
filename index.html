// Calculate scoring
function calculatePoints(score, total, mode, maxStreak) {
  if (mode !== 'challenge') return 0; // points only from challenge
  const percent = Math.round((score / total) * 100);
  if (percent < 75) return 0; // No points for failing the challenge (below Silver tier)
  const basePoints = score * 10;
  let bonus = 0;
  if (percent === 100) bonus += 50;       // Perfect bonus
  else if (percent >= 90) bonus += 25;
  else if (percent >= 75) bonus += 10;
  if (maxStreak >= 5) bonus += 15;        // Streak bonus
  if (maxStreak >= 10) bonus += 30;
  return basePoints + bonus;
}

function getCurrentRank(totalPoints) {
  let current = RANKS[0];
  for (const rank of RANKS) {
    if (totalPoints >= rank.minPoints) current = rank;
  }
  return current;
}

function getNextRank(totalPoints) {
  for (const rank of RANKS) {
    if (totalPoints < rank.minPoints) return rank;
  }
  return null; // already max rank
}

function getRankProgress(totalPoints) {
  const current = getCurrentRank(totalPoints);
  const next = getNextRank(totalPoints);
  if (!next) return { percent: 100, current, next: null, pointsToNext: 0 };
  const range = next.minPoints - current.minPoints;
  const earned = totalPoints - current.minPoints;
  return {
    percent: Math.round((earned / range) * 100),
    current, next,
    pointsToNext: next.minPoints - totalPoints
  };
}

function checkBadges(student) {
  // Returns array of badge IDs that student has earned
  const earned = new Set(student.badges || []);
  const stats = student.stats || {};
  const allChallenges = Object.values(student.challenges || {});
  // Only count PASSED challenges (75%+) for completion-based badges
  const passedChallenges = allChallenges.filter(c => (c.percent || 0) >= 75);

  if (passedChallenges.length >= 1) earned.add('first_lesson');
  if ((stats.practiceCount || 0) >= 5) earned.add('practice_5');

  const perfects = passedChallenges.filter(c => c.percent === 100).length;
  if (perfects >= 1) earned.add('perfect_1');
  if (perfects >= 3) earned.add('perfect_3');

  if ((stats.bestStreak || 0) >= 5) earned.add('streak_5');
  if ((stats.bestStreak || 0) >= 10) earned.add('streak_10');

  if (passedChallenges.length >= 4) earned.add('half_done');
  if (passedChallenges.length >= 8) earned.add('all_done');
  if (perfects >= 8) earned.add('all_perfect');

  const totalPts = stats.totalPoints || 0;
  if (totalPts >= 500) earned.add('rosary');
  if (totalPts >= 1000) earned.add('cathedral');

  if ((stats.lessonsPracticed || []).length >= 8) earned.add('angel');

  return Array.from(earned);
}

function startQuiz(mode) {
  const lesson = state.currentLesson;

  if (mode === 'challenge') {
    // Block if already completed
    if (completedChallenges[lesson.id]) {
      showModal('🔒 Already Done!', 'You have already finished Challenge Mode for this lesson. Practice Mode is always open if you want to keep learning!');
      return;
    }
    // Block if practice not yet perfected
    const student = getCurrentStudent();
    const perfected = (student.stats && student.stats.lessonsPerfectedInPractice) || [];
    if (!perfected.includes(lesson.id)) {
      showModal('🔒 Challenge Locked!', 'You must first get a PERFECT 7/7 in Practice Mode before you can take the Challenge. Keep practicing — you can do it! 💪');
      return;
    }
    // Show prayer/promise screen before Challenge
    renderPrayerScreen();
    return;
  }

  // Practice mode goes straight to quiz
  beginQuiz(mode);
}

function beginQuiz(mode) {
  const lesson = state.currentLesson;
  state.currentMode = mode;
  state.currentQuestionIndex = 0;
  state.answers = [];
  state.startTime = Date.now();
  state.currentStreak = 0;
  state.maxStreak = 0;

  state.shuffledQuestions = shuffle(lesson.questions);
  state.shuffledChoices = state.shuffledQuestions.map(q => {
    const indices = q.choices.map((_, i) => i);
    return shuffle(indices);
  });

  renderQuestion();
}

function renderQuestion() {
  // Keep music playing throughout the quiz
  if (ambientEnabled && soundsEnabled && firstInteractionDone) playMp3Music();

  const q = state.shuffledQuestions[state.currentQuestionIndex];
  const choiceMap = state.shuffledChoices[state.currentQuestionIndex];
  const total = state.shuffledQuestions.length;
  const idx = state.currentQuestionIndex;
  const progress = ((idx) / total) * 100;
  const letters = ['A', 'B', 'C', 'D'];

  const choicesHtml = choiceMap.map((origIdx, displayIdx) => `
    <button class="choice" onclick="answerQuestion(${displayIdx}, ${origIdx})" id="choice-${displayIdx}">
      <span class="letter">${letters[displayIdx]}</span>
      <span class="choice-text">
        <span class="choice-english">${escapeHtml(q.choices[origIdx])}</span>
        ${q.choicesBisaya && q.choicesBisaya[origIdx] ? `<span class="choice-bisaya">${escapeHtml(q.choicesBisaya[origIdx])}</span>` : ''}
      </span>
    </button>
  `).join('');

  const streakBadge = state.currentStreak >= 2
    ? `<span class="streak-display">🔥 ${state.currentStreak} streak!</span>`
    : '';

  const practiceReminder = state.currentMode === 'practice' ? `
    <div style="background: linear-gradient(135deg, var(--pastel-lavender-light), var(--pastel-sky-light)); border: 2px dashed var(--pastel-lavender-deep); border-radius: 16px; padding: 10px 14px; margin-bottom: 14px; text-align: center; font-family: 'Quicksand', sans-serif; font-size: 0.9rem; color: var(--pastel-lavender-darker); font-weight: 700;">
      📖 Practice Mode — no rewards here, but you're learning! Take the ⚔️ Challenge after to earn rewards.
    </div>
  ` : '';

  // Quit button — only available in Practice (Challenge is one-attempt-only)
  const quitButton = state.currentMode === 'practice' ? `
    <div style="text-align: right; margin-bottom: 10px;">
      <button onclick="confirmQuitQuiz()" style="background: rgba(255,255,255,0.9); border: 2px solid var(--pastel-pink); color: var(--pastel-pink-darker); font-family: 'Quicksand', sans-serif; font-weight: 700; padding: 6px 14px; border-radius: 14px; cursor: pointer; font-size: 0.85rem; box-shadow: 0 2px 0 var(--pastel-pink);">
        ✕ Back to Menu
      </button>
    </div>
  ` : '';

  render(`
    <div class="quiz-screen">
      ${quitButton}
      ${practiceReminder}
      <div class="quiz-header">

        <span class="progress-text">Q ${idx + 1} of ${total}</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" style="width: ${progress}%"></div>
      </div>
      <div class="question">${escapeHtml(q.q)}</div>
      ${q.qBisaya ? `<div class="q-bisaya">${escapeHtml(q.qBisaya)}</div>` : ''}

      <div id="feedback"></div>
      <div id="next-area" style="text-align: center; margin-top: 20px;"></div>

}

function confirmQuitQuiz() {
  // Show a confirmation modal before quitting
  const backdrop = document.createElement('div');
  backdrop.className = 'modal-backdrop';
  backdrop.innerHTML = `
    <div class="modal">
      <div style="font-size: 2.2rem; margin-bottom: 8px;">🤔</div>
      <h3>Quit Practice?</h3>
      <p>Your progress in this lesson won't be saved. Are you sure you want to go back to the menu?</p>
      <p style="font-style: italic; color: var(--pastel-lavender-darker); font-size: 0.85rem; margin-top: 6px;">Sigurado ka nga mobalik sa menu?</p>

        <button class="btn" id="quit-confirm" style="background: linear-gradient(180deg, #fff 0%, #fee2e2 100%); border-color: var(--pastel-pink-deep); color: var(--pastel-pink-darker);">Yes, quit</button>
      </div>
    </div>
  `;
  document.body.appendChild(backdrop);
  backdrop.querySelector('#quit-cancel').onclick = () => backdrop.remove();
  backdrop.querySelector('#quit-confirm').onclick = () => {
    backdrop.remove();
    // Reset quiz state and go back to lesson menu
    state.currentLesson = null;
    state.currentMode = null;
    state.shuffledQuestions = [];
    state.answers = [];
    renderHome();
  };
  backdrop.onclick = (e) => { if (e.target === backdrop) backdrop.remove(); };
}

function answerQuestion(displayIdx, origIdx) {
  const q = state.shuffledQuestions[state.currentQuestionIndex];
  const correctOrigIdx = q.correct;
  const isCorrect = origIdx === correctOrigIdx;

  state.answers.push({
    questionIndex: state.currentQuestionIndex,
    chosen: origIdx,
    correct: correctOrigIdx,
    isCorrect: isCorrect
  });

  // Update streak
  if (isCorrect) {
    state.currentStreak++;
    if (state.currentStreak > state.maxStreak) state.maxStreak = state.currentStreak;
  } else {
    state.currentStreak = 0;
  }

  document.querySelectorAll('.choice').forEach(btn => btn.disabled = true);

  if (state.currentMode === 'practice') {
    const choiceMap = state.shuffledChoices[state.currentQuestionIndex];
    const correctDisplayIdx = choiceMap.indexOf(correctOrigIdx);

    document.getElementById(`choice-${correctDisplayIdx}`).classList.add('correct');
    if (!isCorrect) {
      // WRONG: play boop sound + shake animation
      playWrongSound();
      const wrongBtn = document.getElementById(`choice-${displayIdx}`);
      wrongBtn.classList.add('wrong');
      wrongBtn.classList.add('wrong-flash');
    } else {
      // CORRECT: play ding + sparkle burst + correct flash
      playCorrectSound();
      const correctBtn = document.getElementById(`choice-${correctDisplayIdx}`);
      correctBtn.classList.add('correct-flash');

      // Sparkle burst from the correct button center
      const rect = correctBtn.getBoundingClientRect();
      spawnSparkleBurst(rect.left + rect.width / 2, rect.top + rect.height / 2, 8);

      shootConfetti(true);

      // Streak milestone sound at 3, 5, 10
      if (state.currentStreak === 3 || state.currentStreak === 5 || state.currentStreak === 10) {
        setTimeout(() => playStreakSound(), 350);
      }

      // Practice mode: show encouragement (NOT points - those are only for Challenge Mode)
      const encouragement = state.currentStreak >= 5 ? `🔥 ${state.currentStreak} streak!`
                          : state.currentStreak >= 3 ? `Nice! 🔥${state.currentStreak}`
                          : '✨ Correct! ✨';
      showPointReward(encouragement, displayIdx);
    }

    document.getElementById('feedback').innerHTML = `
      <div class="feedback ${isCorrect ? '' : 'wrong'}">
        <strong>${isCorrect ? '✨ Correct! ✨' : '✗ Not quite...'}</strong>
        ${q.explainBisaya ? `<div class="explain-bisaya">${escapeHtml(q.explainBisaya)}</div>` : ''}
        <div class="explain-english">${escapeHtml(q.explain)}</div>
      </div>
    `;

    document.getElementById('next-area').innerHTML = `
      <button class="btn" onclick="nextQuestion()">${state.currentQuestionIndex < state.shuffledQuestions.length - 1 ? 'Next →' : 'See Results 🎯'}</button>
    `;
  } else {
    // Challenge mode: highlight selection but don't reveal correct/wrong, no points shown yet
    playTapSound();
    document.getElementById(`choice-${displayIdx}`).classList.add('selected-challenge');
    setTimeout(() => nextQuestion(), 600);
  }
}

function showPointReward(text, choiceDisplayIdx) {
  const choice = document.getElementById(`choice-${choiceDisplayIdx}`);
  if (!choice) return;
  const rect = choice.getBoundingClientRect();
  const reward = document.createElement('div');
  reward.className = 'point-reward';
  reward.textContent = text;
  reward.style.left = (rect.left + rect.width / 2) + 'px';
  reward.style.top = (rect.top + rect.height / 2) + 'px';
  document.body.appendChild(reward);
  setTimeout(() => reward.remove(), 1600);
}

function nextQuestion() {
  state.currentQuestionIndex++;
  if (state.currentQuestionIndex >= state.shuffledQuestions.length) {
    renderResults();
  } else {
    renderQuestion();
  }
}

function renderResults() {
  // Keep music playing on results too
  if (ambientEnabled && soundsEnabled && firstInteractionDone) playMp3Music();

  const total = state.shuffledQuestions.length;
  const score = state.answers.filter(a => a.isCorrect).length;
  const percent = Math.round((score / total) * 100);
  const tier = getTier(percent);

  // Play celebration sound + big confetti based on outcome
  setTimeout(() => {
    if (state.currentMode === 'challenge') {
      if (percent === 100) {
        // CROWN tier — applause + heavenly chime + huge confetti
        playApplause(4.0);
        setTimeout(() => playHeavenlyChime(), 500);
        spawnConfetti(80);
      } else if (percent >= 75) {
        playHeavenlyChime();
        spawnConfetti(40);
      } else {
        playFailedChallengeSound();
      }
    } else {
      // Practice mode
      if (percent === 100) {
        // PRACTICE PERFECT — applause + fanfare + confetti
        playApplause(3.5);
        setTimeout(() => playPracticePerfectSound(), 400);
        spawnConfetti(50);
      } else if (percent >= 75) {
        playCorrectSound();
        spawnConfetti(20);
      }
    }
  }, 200);

  let code = '';
  let pointsEarned = 0;
  let oldRank = null;
  let newRank = null;
  let leveledUp = false;
  let newBadges = [];
  let newlyUnlockedMiniGames = []; // Track which games newly unlocked from this quiz

  const student = getCurrentStudent();
  if (!student.stats) student.stats = { totalPoints: 0, bestStreak: 0, practiceCount: 0, lessonsPracticed: [] };

  // Snapshot mini-games unlocked BEFORE this quiz outcome was saved
  const miniGamesBefore = new Set(getUnlockedMiniGames());

  if (state.currentMode === 'challenge') {
    code = generateCode(state.currentLesson.id, score, total, state.studentName);
    pointsEarned = calculatePoints(score, total, 'challenge', state.maxStreak);

    // Capture old rank before adding points
    oldRank = getCurrentRank(student.stats.totalPoints);
    const oldBadges = checkBadges(student);

    // Save the challenge result (only if percent >= 75 — otherwise just record attempt)
    student.challenges[state.currentLesson.id] = {
      score, total, code,
      date: new Date().toISOString().slice(0, 10),
      name: state.studentName,
      percent
    };
    completedChallenges = student.challenges;

    // Update stats
    student.stats.totalPoints = (student.stats.totalPoints || 0) + pointsEarned;
    if (state.maxStreak > (student.stats.bestStreak || 0)) {
      student.stats.bestStreak = state.maxStreak;
    }

    // Check for new rank
    newRank = getCurrentRank(student.stats.totalPoints);
    if (newRank.name !== oldRank.name) leveledUp = true;

    // Check for new badges
    const updatedBadges = checkBadges(student);
    newBadges = updatedBadges.filter(b => !oldBadges.includes(b));
    student.badges = updatedBadges;

    saveAllStudents();
  } else {
    // Practice mode: increment practice count, track lessons practiced
    student.stats.practiceCount = (student.stats.practiceCount || 0) + 1;
    if (!student.stats.lessonsPracticed) student.stats.lessonsPracticed = [];
    if (!student.stats.lessonsPracticed.includes(state.currentLesson.id)) {
      student.stats.lessonsPracticed.push(state.currentLesson.id);
    }
    // NEW: Track lessons perfected in practice (100% score) — unlocks Challenge Mode

    var firstTimeUnlock = false;
    if (percent === 100 && !student.stats.lessonsPerfectedInPractice.includes(state.currentLesson.id)) {
      student.stats.lessonsPerfectedInPractice.push(state.currentLesson.id);

    if (state.maxStreak > (student.stats.bestStreak || 0)) {

    }

// Check which mini-games are unlocked for current student
function getUnlockedMiniGames() {
  const student = getCurrentStudent();
  if (!student) return [];
  const perfected = (student.stats && student.stats.lessonsPerfectedInPractice) || [];
  const passedChallenges = student.challenges || {};

  // A lesson counts as "mastered" if EITHER:
  // - Practice was perfected (100% in Practice), OR
  // - Challenge was passed (75%+ in Challenge — even better proof of mastery)
  const masteredLessonIds = new Set(perfected);
  Object.keys(passedChallenges).forEach(lessonIdStr => {
    const lessonId = parseInt(lessonIdStr, 10);
    if (!isNaN(lessonId)) masteredLessonIds.add(lessonId);
  });

  const unlocked = [];
  for (const game of MINI_GAMES) {
    if (game.unlockLesson === 'all') {
      // Special: unlocks when ALL 8 lessons are mastered
      if (masteredLessonIds.size >= 8) unlocked.push(game.id);
    } else if (masteredLessonIds.has(game.unlockLesson)) {
      unlocked.push(game.id);
    }
  }
  return unlocked;
}

  // Music should be playing on the hub (only mini-games themselves silence it)
  if (ambientEnabled && soundsEnabled && firstInteractionDone) playMp3Music();

  const unlocked = getUnlockedMiniGames();
  const student = getCurrentStudent();
  const perfected = (student.stats && student.stats.lessonsPerfectedInPractice) || [];
  const passedChallenges = student.challenges || {};
  const masteredCount = new Set([
    ...perfected,
    ...Object.keys(passedChallenges).map(k => parseInt(k, 10)).filter(n => !isNaN(n))
  ]).size;

  const gamesHtml = MINI_GAMES.map(game => {
    const isUnlocked = unlocked.includes(game.id);
    const isAvailable = game.available;
    const lockText = game.unlockLesson === 'all'
      ? `🔒 Master ALL 8 lessons to unlock`
      : `🔒 Master Lesson ${game.unlockLesson} to unlock`;

    if (isUnlocked && isAvailable) {
      return `
        <div class="lesson-card" data-color="${game.color}" onclick="startMiniGame('${game.id}')">
          <div class="lesson-icon">${game.icon}</div>
          <div class="lesson-num">Mini-Game</div>

          <div style="font-family: 'Quicksand', sans-serif; font-style: italic; color: var(--pastel-lavender-darker); font-size: 0.85rem; margin-top: 4px;">${escapeHtml(game.nameBisaya)}</div>
          <div class="lesson-status" style="color: var(--pastel-mint-deep); font-weight: 700; margin-top: 6px;">▶ Tap to play</div>
        </div>
      `;
    } else if (isUnlocked && !isAvailable) {
      return `
        <div class="lesson-card" data-color="${game.color}" style="opacity: 0.55; cursor: not-allowed;">
          <div class="lesson-icon">${game.icon}</div>
          <div class="lesson-num">Mini-Game</div>
          <div class="lesson-title">${escapeHtml(game.name)}</div>
          <div style="font-family: 'Quicksand', sans-serif; font-style: italic; color: var(--pastel-lavender-darker); font-size: 0.85rem; margin-top: 4px;">${escapeHtml(game.nameBisaya)}</div>
          <div class="lesson-status" style="color: var(--pastel-pink-darker); font-weight: 700; margin-top: 6px;">⏳ Coming soon!</div>
        </div>
      `;
    } else {
      return `
        <div class="lesson-card" data-color="${game.color}" style="opacity: 0.45; cursor: not-allowed;">
          <div class="lesson-icon" style="filter: grayscale(0.6);">${game.icon}</div>
          <div class="lesson-num">Mini-Game</div>
          <div class="lesson-title" style="color: var(--pastel-lavender-darker);">${escapeHtml(game.name)}</div>
          <div style="font-family: 'Quicksand', sans-serif; font-style: italic; color: var(--pastel-lavender-darker); font-size: 0.8rem; margin-top: 4px; opacity: 0.7;">${escapeHtml(game.nameBisaya)}</div>
          <div class="lesson-status" style="color: var(--pastel-pink-darker); font-size: 0.85rem; margin-top: 6px;">${lockText}</div>
        </div>
      `;
    }
  }).join('');

  render(`
    <button class="sound-toggle" onclick="toggleSounds(); renderMiniGamesHub();" title="Toggle Sounds">${soundsEnabled ? "🔊" : "🔇"}</button>
    <button class="settings-gear" onclick="renderTeacherSettings()" title="Teacher Settings">⚙️</button>
    <div class="home">
      <h1 class="title" style="font-size: 2rem;">🎮 Mini-Games</h1>
      <p class="subtitle">~ Sweet Rewards for Perfect Practice ~</p>
      <div style="text-align: center;">
        <span class="teacher-banner">📖 ${escapeHtml(teacherName)}'s Class</span>
      </div>

      <div style="background: linear-gradient(135deg, var(--pastel-mint-light, #d1fae5), var(--pastel-sky-light)); border: 2px dashed var(--pastel-mint); border-radius: 14px; padding: 12px 16px; margin: 16px 0; font-family: 'Quicksand', sans-serif; color: var(--plum-deep); font-size: 0.92rem; line-height: 1.5;">
        🎯 <strong>${masteredCount} of 8 lessons mastered.</strong>
        Get 100% Practice or pass a Challenge to unlock more games!
      </div>

      <div class="lesson-grid">
        ${gamesHtml}
      </div>

      <div style="text-align: center; margin-top: 20px;">
        <button class="btn btn-secondary" onclick="renderHome()">← Back to Lessons</button>
      </div>
    </div>
  `);
}

function startMiniGame(gameId) {
  if (gameId === 'memory-match') {
    startMemoryMatch();
  } else {
    showModal('⏳ Coming Soon!', 'This mini-game is being built. Check back soon! / Pa-andam pa kini.');
  }
}

// ============================================
// MEMORY MATCH GAME
// ============================================
let memoryState = null;

function startMemoryMatch() {
  // Stop background music for mini-games (per MJ's request)
  stopMp3Music();

  // Pick 6 random pairs from MEMORY_PAIRS (12 cards total = 4x3 grid)
  const shuffledPairs = shuffle(MEMORY_PAIRS).slice(0, 6);

  // Build cards array: each pair becomes 2 cards (one EN, one BS)
  const cards = [];
  shuffledPairs.forEach((pair, pairIdx) => {
    cards.push({ id: `card-${pairIdx}-en`, pairId: pairIdx, text: pair.en, lang: 'en', emoji: pair.emoji, bgColor: pair.bgColor, flipped: false, matched: false });
    cards.push({ id: `card-${pairIdx}-bs`, pairId: pairIdx, text: pair.bs, lang: 'bs', emoji: pair.emoji, bgColor: pair.bgColor, flipped: false, matched: false });
  });

  // Shuffle the deck
  const deck = shuffle(cards);

  memoryState = {
    deck: deck,
    flippedCards: [],
    matchedPairs: 0,
    totalPairs: 6,
    moves: 0,
    locked: false,
    startTime: Date.now()
  };

  renderMemoryMatch();
}

function renderMemoryMatch() {
  const s = memoryState;
  if (!s) return;

  const cardsHtml = s.deck.map((card, idx) => {
    const isFlipped = card.flipped || card.matched;
    const isMatched = card.matched;
    const langClass = card.lang === 'en' ? 'mm-card-en' : 'mm-card-bs';
    const theme = MM_COLOR_THEMES[card.bgColor] || MM_COLOR_THEMES.rose;

    // Inline style for theme color when flipped (and not matched - matched uses green)
    const themeStyle = (isFlipped && !isMatched) ? `style="background: ${theme.bg}; border-color: ${theme.border}; box-shadow: 0 4px 0 ${theme.shadow}, 0 6px 14px ${theme.border}33;"` : '';

    return `
      <button class="mm-card ${isFlipped ? 'mm-flipped' : ''} ${isMatched ? 'mm-matched' : ''} ${langClass}"
        ${themeStyle}
        onclick="flipMemoryCard(${idx})"
        ${isMatched || s.locked ? 'disabled' : ''}>
        <span class="mm-card-back">✦</span>
        <span class="mm-card-front">
          <span class="mm-emoji">${card.emoji}</span>
          <span class="mm-text">${escapeHtml(card.text)}</span>
        </span>
      </button>
    `;
  }).join('');

  const progress = Math.round((s.matchedPairs / s.totalPairs) * 100);

  render(`
    <button class="sound-toggle" onclick="toggleSounds(); renderMemoryMatch();" title="Toggle Sounds">${soundsEnabled ? "🔊" : "🔇"}</button>
    <div class="quiz-screen">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; flex-wrap: wrap; gap: 8px;">
        <div style="font-family: 'Pacifico', cursive; font-size: 1.4rem; color: var(--pastel-pink-darker);">🃏 Memory Match</div>
        <div style="font-family: 'Quicksand', sans-serif; font-weight: 700; color: var(--plum-deep); font-size: 0.95rem;">
          Pairs: ${s.matchedPairs}/${s.totalPairs} • Moves: ${s.moves}
        </div>
      </div>

      <div class="progress-bar"><div class="progress-fill" style="width: ${progress}%"></div></div>

      <div style="background: linear-gradient(135deg, var(--pastel-lavender-light), var(--pastel-sky-light)); border: 2px dashed var(--pastel-lavender-deep); border-radius: 14px; padding: 10px 14px; margin: 12px 0; text-align: center; font-family: 'Quicksand', sans-serif; font-size: 0.9rem; color: var(--pastel-lavender-darker); font-weight: 700;">
        Tap two cards to match the English with its Bisaya!<br>
        <span style="font-size: 0.82rem; font-style: italic; font-weight: 500;">Tagboa ang English sa iyang Bisaya nga pulong</span>
      </div>

      <div class="mm-grid">
        ${cardsHtml}
      </div>

      <div style="text-align: center; margin-top: 24px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;">
        <button class="btn btn-secondary" onclick="exitMemoryMatch()">← Quit</button>
        <button class="btn" onclick="startMemoryMatch()" style="background: linear-gradient(180deg, #fff 0%, var(--pastel-sky-light) 100%); border-color: var(--pastel-sky); color: var(--plum-deep); box-shadow: 0 4px 0 var(--pastel-sky), 0 6px 12px rgba(125, 211, 252, 0.3);">🔄 New Game</button>
      </div>
    </div>
  `);
}

function flipMemoryCard(idx) {
  const s = memoryState;
  if (!s || s.locked) return;
  const card = s.deck[idx];
  if (card.flipped || card.matched) return;
  if (s.flippedCards.length >= 2) return;

  // Flip the card
  card.flipped = true;
  s.flippedCards.push(idx);
  playTapSound();

  // ALWAYS render immediately so the user SEES the flip
  renderMemoryMatch();

  // If two cards flipped, check for match (after a moment so user can see them)
  if (s.flippedCards.length === 2) {
    s.moves++;
    s.locked = true;
    const [idx1, idx2] = s.flippedCards;
    const card1 = s.deck[idx1];
    const card2 = s.deck[idx2];

    if (card1.pairId === card2.pairId) {
      // MATCH! Wait so user can see both cards
      setTimeout(() => {
        card1.matched = true;
        card2.matched = true;
        s.matchedPairs++;
        s.flippedCards = [];
        s.locked = false;
        playCorrectSound();

        // Sparkle burst on each matched card
        setTimeout(() => {
          const cardEls = document.querySelectorAll('.mm-card');
          [idx1, idx2].forEach(i => {
            const el = cardEls[i];
            if (el) {
              const rect = el.getBoundingClientRect();
              spawnSparkleBurst(rect.left + rect.width/2, rect.top + rect.height/2, 6);
            }
          });
        }, 50);

        if (s.matchedPairs >= s.totalPairs) {
          // GAME COMPLETE!
          setTimeout(() => {
            playApplause(2.5);
            setTimeout(() => playPracticePerfectSound(), 400);
            spawnConfetti(50);
            setTimeout(() => renderMemoryMatchComplete(), 800);
          }, 600);
        } else {
          renderMemoryMatch();
        }
      }, 900); // Long enough to see both cards
    } else {
      // NO MATCH — give user time to memorize before flipping back
      setTimeout(() => playWrongSound(), 900);
      setTimeout(() => {
        card1.flipped = false;
        card2.flipped = false;
        s.flippedCards = [];
        s.locked = false;
        renderMemoryMatch();
      }, 1800); // Longer so user can memorize the cards
    }
  }
}

function renderMemoryMatchComplete() {
  const s = memoryState;
  if (!s) return;

  const elapsedSec = Math.round((Date.now() - s.startTime) / 1000);
  const minutes = Math.floor(elapsedSec / 60);
  const seconds = elapsedSec % 60;
  const timeText = minutes > 0 ? `${minutes}m ${seconds}s` : `${seconds}s`;

  // Award holy points based on performance
  // Base: 30 points. Less moves = more bonus.
  const perfectMoves = s.totalPairs; // 6 moves = perfect
  const bonusMoves = Math.max(0, perfectMoves * 2 - s.moves);
  const pointsEarned = 30 + (bonusMoves * 5);

  // Save points to student
  const student = getCurrentStudent();
  if (student && student.stats) {
    student.stats.totalPoints = (student.stats.totalPoints || 0) + pointsEarned;
    saveAllStudents();
  }

  let rating = '⭐';
  let ratingText = 'Good!';
  if (s.moves <= 8) { rating = '⭐⭐⭐'; ratingText = 'Excellent!'; }
  else if (s.moves <= 12) { rating = '⭐⭐'; ratingText = 'Very Good!'; }

  render(`
    <div class="result-screen">
      <div class="result-medal">🃏</div>
      <h1 class="result-title">Mini-Game Complete!</h1>
      <div class="result-tier" style="font-family: 'Pacifico', cursive; color: var(--pastel-pink-darker); font-size: 1.6rem;">${rating} ${ratingText}</div>

      <div style="margin: 20px 0; padding: 18px; background: linear-gradient(135deg, #fff 0%, var(--pastel-pink-light) 100%); border: 3px solid var(--pastel-pink); border-radius: 18px; box-shadow: 0 4px 0 var(--pastel-pink);">
        <div style="font-family: 'Quicksand', sans-serif; font-weight: 700; font-size: 1.05rem; color: var(--plum-deep); line-height: 1.8;">
          Pairs Matched: <strong>${s.totalPairs}/${s.totalPairs}</strong> ✨<br>
          Moves Used: <strong>${s.moves}</strong><br>
          Time: <strong>${timeText}</strong>
        </div>
      </div>

      <div style="margin: 20px 0; padding: 18px; background: linear-gradient(135deg, #fff, var(--pastel-yellow, #fef3c7)); border: 3px solid #fbbf24; border-radius: 20px; box-shadow: 0 0 30px rgba(251, 191, 36, 0.3), 0 4px 0 #fbbf24;">
        <div style="font-family: 'Quicksand', sans-serif; font-weight: 700; color: #d97706; font-size: 0.85rem; letter-spacing: 0.2em; margin-bottom: 8px;">✨ HOLY POINTS EARNED ✨</div>
        <div style="font-family: 'Pacifico', cursive; font-size: 3rem; color: #d97706; text-shadow: 2px 2px 0 #fef3c7;">+${pointsEarned}</div>
      </div>

      <div style="text-align: center; margin-top: 24px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;">
        <button class="btn" onclick="startMemoryMatch()">🔄 Play Again</button>
        <button class="btn btn-secondary" onclick="exitMemoryMatch()">← Back to Mini-Games</button>
      </div>
    </div>
  `);
}

function exitMemoryMatch() {
  memoryState = null;
  // Resume background music
  if (ambientEnabled && soundsEnabled && firstInteractionDone) playMp3Music();
  renderMiniGamesHub();
}

// ============================================
// INIT
// ============================================
loadAllStudents();
loadTeacherName();
loadSoundPref();
loadAmbientPref();
setupFirstInteractionListener();
if (!teacherName) {
  renderTeacherSetup();
} else {
  renderHome();
}
</script>
